              <div className="space-y-4">
                {currentResources.length === 0 ? (
                  <div className="glass-premium rounded-2xl md:rounded-[2.5rem] p-12 md:p-20 text-center text-gray-500 text-sm tracking-[0.2em] uppercase border border-white/10 shadow-inner font-bold">Empty Section</div>
                ) : (
                  currentResources.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0)).map(r => (
                    <div key={r.id} onClick={() => r.isFolder ? openFolder(r.id) : handleViewResource(r)} className="glass p-4 sm:p-5 md:p-6 rounded-2xl md:rounded-[1.5rem] flex items-center justify-between group cursor-pointer hover-lift border border-white/10 hover:border-[#D4AF37]/40 shadow-md">
                      <div className="flex items-center gap-4 sm:gap-5 pr-4 overflow-hidden relative z-10 w-full">
                        <div className={`w-14 h-14 md:w-16 md:h-16 rounded-xl md:rounded-2xl flex items-center justify-center shrink-0 border border-white/10 transition-colors shadow-inner ${r.isFolder ? 'bg-gradient-to-br from-[#D4AF37]/20 to-black text-[#D4AF37]' : 'bg-gradient-to-br from-gray-800 to-black text-gray-400 group-hover:text-white'}`}>
                           {r.isFolder ? <Folder size={28} className="fill-[#D4AF37]/20"/> : 
                            r.type === 'video' ? <Video size={28}/> : 
                            r.type === 'youtube' ? <PlayCircle size={28} className="text-red-400"/> : 
                            r.type === 'image' || r.type === 'collage' ? <ImageIcon size={28}/> : 
                            r.type === 'link' ? <LinkIcon size={28}/> : 
                            <FileText size={28}/>}
                        </div>
                        <div className="flex-1 min-w-0">
                          <h4 className="text-white text-sm sm:text-base md:text-lg font-bold tracking-wide mb-1 md:mb-2 break-words line-clamp-2 leading-tight">{r.title}</h4>
                          <span className="text-[#D4AF37] opacity-90 text-[10px] md:text-xs uppercase tracking-widest font-bold block">{r.isFolder ? 'Folder' : r.type}</span>
                        </div>
                      </div>
                      <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeResource(r.id); }} className="text-gray-500 hover:text-red-400 p-3 md:p-4 rounded-xl hover:bg-red-500/10 transition-colors shrink-0 ml-2 bg-black/40 border border-white/5"><Trash2 size={22} /></button>
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* SCHEDULE PANEL */}
            <div className="space-y-8 md:space-y-10">
              <div className="flex items-center justify-between">
                <h3 className="serif text-3xl md:text-4xl text-white italic">Lecture Schedule</h3>
                <button onClick={() => setShowScheduleModal(true)} className="px-5 py-3 glass border border-white/20 text-gray-300 rounded-xl flex items-center justify-center hover:text-white hover:border-[#D4AF37]/50 transition-all shadow-lg text-xs font-bold uppercase tracking-widest gap-2">
                   <Plus size={20} /> Schedule
                </button>
              </div>
              <div className="space-y-6">
                {(!course.schedule || course.schedule.length === 0) ? (
                  <div className="glass-premium rounded-2xl md:rounded-[2.5rem] p-12 md:p-20 text-center text-gray-500 text-sm tracking-[0.2em] uppercase border border-white/10 shadow-inner font-bold">No schedule created.</div>
                ) : (
                  course.schedule.sort((a,b) => new Date(a.date) - new Date(b.date)).map((s, idx) => (
                    <ScheduleCard key={s.id} schedule={s} index={idx} onRemove={removeSchedule} />
                  ))
                )}
              </div>
            </div>

          </div>
          
          {showResourceModal && <ResourceCreatorModal docId={course.id} parentId={currentFolderId} collectionName="courses" onClose={() => setShowResourceModal(false)} />}
          {showFolderModal && <CreateFolderModal docId={course.id} parentId={currentFolderId} collectionName="courses" onClose={() => setShowFolderModal(false)} />}
          {showScheduleModal && <ScheduleCreatorModal courseId={course.id} onClose={() => setShowScheduleModal(false)} />}
          {showEditCourseModal && <EditCourseModal course={course} onClose={() => setShowEditCourseModal(false)} />}
        </div>
      );
    }

    function CourseViewer({ course, userData, onBack, onViewResource }) {
      const [activeTab, setActiveTab] = useState('materials'); 
      const [currentFolderId, setCurrentFolderId] = useState(null);

      useHardwareBack(!!currentFolderId, () => {
         const folder = course.resources?.find(res => res.id === currentFolderId);
         setCurrentFolderId(folder?.parentId || null);
      });

      const openFolder = (id) => {
          window.history.pushState({ internalNav: true }, "");
          setCurrentFolderId(id);
      };

      const myAttendance = course.attendance?.filter(a => a.userId === userData.id) || [];
      const presentCount = myAttendance.filter(a => a.status === 'present').length;
      const totalLogs = myAttendance.length;
      const rate = totalLogs === 0 ? 0 : Math.round((presentCount / totalLogs) * 100);

      const allResources = course.resources || [];
      const currentResources = allResources.filter(r => (r.parentId || null) === currentFolderId);
      const breadcrumbs = buildBreadcrumbs(currentFolderId, allResources);

      return (
        <div className="animate-in fade-in duration-500">
          <SmartBackButton label="Dashboard" />

          <header className="mb-10 md:mb-14 relative rounded-[2rem] md:rounded-[3rem] overflow-hidden glass-premium p-8 sm:p-12 md:p-16 border border-[#D4AF37]/30 shadow-[0_20px_50px_rgba(0,0,0,0.6)]">
            {course.coverImage && (
              <div className="absolute inset-0 z-0">
                <img src={course.coverImage} alt="Cover" className="w-full h-full object-cover opacity-20 mix-blend-overlay" />
                <div className="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/90 to-transparent"></div>
              </div>
            )}
            <div className="relative z-10">
              <h1 className="serif text-4xl sm:text-5xl md:text-6xl lg:text-7xl mb-4 md:mb-6 text-white leading-tight break-words">{course.title}</h1>
              <p className="text-gray-300 text-sm md:text-base lg:text-lg max-w-4xl leading-relaxed font-light break-words">{course.desc}</p>
            </div>
          </header>

          <div className="flex items-center gap-6 md:gap-14 border-b border-white/10 mb-8 md:mb-12 overflow-x-auto custom-scrollbar">
             {['materials', 'schedule', 'ledger'].map(tab => (
               <button 
                 key={tab} 
                 onClick={() => setActiveTab(tab)}
                 className={`pb-4 md:pb-5 text-sm uppercase tracking-widest font-bold transition-all border-b-[3px] md:border-b-[4px] shrink-0 whitespace-nowrap ${activeTab === tab ? 'text-[#D4AF37] border-[#D4AF37]' : 'text-gray-500 border-transparent hover:text-gray-300'}`}
               >
                 {tab === 'materials' ? 'Materials' : tab === 'schedule' ? 'Schedule' : 'Attendance'}
               </button>
             ))}
          </div>

          <div>
            {activeTab === 'materials' && (
              <div className="space-y-8 md:space-y-10">
                <div className="flex items-center gap-3 text-xs md:text-sm text-gray-400 uppercase tracking-widest font-bold bg-black/60 p-5 rounded-2xl border border-white/10 backdrop-blur-md overflow-x-auto custom-scrollbar shadow-inner">
                  <button onClick={() => setCurrentFolderId(null)} className="hover:text-white transition-colors flex items-center gap-2 shrink-0 bg-white/5 px-4 py-2 rounded-xl">
                    <FolderOpen size={20}/> Root
                  </button>
                  {breadcrumbs.map((f, i) => (
                    <React.Fragment key={f.id}>
                      <ChevronRight size={20} className="text-[#D4AF37]/50 shrink-0" />
                      <button onClick={() => openFolder(f.id)} className={`hover:text-white transition-colors break-words line-clamp-1 max-w-[150px] md:max-w-[250px] shrink-0 ${i === breadcrumbs.length-1 ? 'text-[#D4AF37] bg-black/40 px-4 py-2 rounded-xl border border-[#D4AF37]/20' : ''}`}>
                        {f.title}
                      </button>
                    </React.Fragment>
                  ))}
                </div>

                {currentResources.length === 0 ? (
                  <div className="glass-premium rounded-2xl md:rounded-[3rem] p-16 md:p-24 text-center text-gray-500 text-sm tracking-widest uppercase flex flex-col items-center border border-white/10 font-bold shadow-inner">
                    <FolderOpen size={56} className="mb-5 opacity-40 text-[#D4AF37]" />
                    Empty Section
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-8 pb-16">
                    {currentResources.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0)).map(r => (
                      <button 
                        key={r.id}
                        onClick={() => r.isFolder ? openFolder(r.id) : onViewResource(r)}
                        className="glass p-5 md:p-6 lg:p-8 rounded-2xl md:rounded-[1.5rem] flex items-center justify-between group text-left hover-lift border border-white/10 hover:border-[#D4AF37]/40 shadow-lg"
                      >
                        {(r.type === 'video' || r.type === 'youtube') && r.thumbnailUrl && (
                          <div className="absolute inset-0 opacity-[0.15] group-hover:opacity-[0.3] transition-opacity z-0 pointer-events-none rounded-2xl md:rounded-[1.5rem] overflow-hidden">
                            <img src={r.thumbnailUrl} className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/60 to-transparent"></div>
                          </div>
                        )}

                        <div className="flex items-center gap-5 relative z-10 overflow-hidden pr-3 w-full">
                          <div className={`w-14 h-14 md:w-16 md:h-16 rounded-xl md:rounded-2xl flex items-center justify-center shrink-0 border border-white/10 transition-colors shadow-inner ${r.isFolder ? 'bg-gradient-to-br from-[#D4AF37]/20 to-black text-[#D4AF37]' : 'bg-gradient-to-br from-gray-800 to-black text-gray-400 group-hover:text-white'}`}>
                            {r.isFolder ? <Folder size={28} className="fill-[#D4AF37]/20"/> : 
                             r.type === 'video' ? <Video size={28}/> : 
                             r.type === 'youtube' ? <PlayCircle size={28} className="text-red-400"/> : 
                             r.type === 'image' || r.type === 'collage' ? <ImageIcon size={28}/> : 
                             r.type === 'link' ? <LinkIcon size={28}/> : <FileText size={28}/>}
                          </div>
                          <div className="flex-1 min-w-0">
                            <h4 className="text-white text-base md:text-lg font-bold tracking-wider mb-2 break-words line-clamp-2 leading-tight">{r.title}</h4>
                            <p className="text-gray-400 text-[10px] md:text-xs uppercase tracking-widest font-bold block bg-black/40 px-2 py-1 rounded w-fit border border-white/5">{r.isFolder ? 'Folder' : `${r.type}`}</p>
                          </div>
                        </div>
                        <ChevronRight size={28} className={`${r.isFolder ? 'text-[#D4AF37]' : 'text-gray-600 group-hover:text-white'} transition-colors shrink-0 relative z-10 ml-2`} />
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'schedule' && (
               <div className="flex flex-col gap-6 md:gap-8 animate-in fade-in pb-16 max-w-5xl mx-auto">
                  {(!course.schedule || course.schedule.length === 0) ? (
                    <div className="glass-premium rounded-2xl md:rounded-[3rem] p-16 md:p-24 text-center text-gray-500 text-sm font-bold tracking-widest uppercase border border-white/10 shadow-inner">
                      Schedule not yet published.
                    </div>
                  ) : (
                    course.schedule.sort((a,b) => new Date(a.date) - new Date(b.date)).map((s, idx) => (
                       <ScheduleCard key={s.id} schedule={s} index={idx} />
                    ))
                  )}
               </div>
            )}

            {activeTab === 'ledger' && (
              <div className="max-w-4xl mx-auto glass-premium p-8 md:p-16 rounded-[2.5rem] md:rounded-[3rem] border border-[#D4AF37]/30 shadow-[0_20px_50px_rgba(0,0,0,0.5)] animate-in fade-in mb-16">
                <div className="flex flex-col sm:flex-row items-center sm:items-start gap-8 md:gap-12 mb-10 pb-10 border-b border-white/10 text-center sm:text-left">
                  <div className="w-32 h-32 md:w-40 md:h-40 rounded-full border-[5px] border-[#111] border-t-[#D4AF37] border-r-[#D4AF37] flex items-center justify-center shrink-0 shadow-[0_0_50px_rgba(212,175,55,0.2)] bg-black/60">
                    <span className="text-4xl md:text-5xl serif text-white">{rate}%</span>
                  </div>
                  <div className="flex-1 mt-4 sm:mt-0">
                    <h3 className="serif text-4xl md:text-5xl text-white mb-4 italic">Attendance Record</h3>
                    <p className="text-sm md:text-lg text-gray-400 font-light leading-relaxed">Your current standing for this specific course. Maintain high attendance to access premium completion benefits.</p>
                  </div>
                </div>
                
                <div className="space-y-5">
                  {myAttendance.length === 0 ? (
                    <p className="text-xs md:text-sm text-gray-500 font-bold tracking-widest uppercase text-center p-8 bg-black/30 rounded-2xl border border-white/5">No records logged.</p>
                  ) : (
                    myAttendance.sort((a,b) => new Date(b.markedAt || 0) - new Date(a.markedAt || 0)).map((log, idx) => {
                      const lecture = course.schedule?.find(s => s.id === log.scheduleId);
                      return (
                        <div key={idx} className="flex flex-col sm:flex-row justify-between sm:items-center gap-5 glass p-5 md:p-6 rounded-2xl border border-white/10 hover:border-[#D4AF37]/30 transition-colors shadow-md">
                          <div className="flex flex-col pr-4 flex-1">
                             <span className="text-base md:text-lg text-white font-bold mb-2 break-words line-clamp-2">{lecture ? lecture.title : "Lecture Entry"}</span>
                             {lecture && <span className="text-xs text-gray-400 uppercase tracking-widest font-bold flex items-center gap-2"><Calendar size={16}/> {formatDDMMYYYY(lecture.date)}</span>}
                          </div>
                          <span className={`text-xs uppercase tracking-widest font-bold px-6 py-3 rounded-xl shrink-0 border shadow-inner text-center sm:w-auto w-full ${log.status === 'present' ? 'bg-green-900/30 text-green-400 border-green-500/40' : 'bg-red-900/30 text-red-400 border-red-500/40'}`}>
                            {log.status}
                          </span>
                        </div>
                      )
                    })
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ResourcePreviewer({ resource, course, userData, onClose, showConfirm }) {
      const isLessonView = resource.type === 'youtube' || resource.type === 'video';
      const [viewingAttachment, setViewingAttachment] = useState(null);

      useHardwareBack(!!viewingAttachment, () => setViewingAttachment(null));

      const handleOpenAttachment = (att) => {
          window.history.pushState({ internalNav: true }, "");
          setViewingAttachment(att);
      }

      if (isLessonView) {
        if (viewingAttachment) {
           return <StandardPreviewLayout resource={viewingAttachment} onClose={() => window.history.back()} />;
        }
        return (
          <LessonPlayerLayout 
            resource={resource} 
            course={course} 
            userData={userData} 
            onClose={onClose} 
            showConfirm={showConfirm}
            onOpenAttachment={handleOpenAttachment}
          />
        )
      }

      return <StandardPreviewLayout resource={resource} onClose={onClose} />;
    }

    function LessonPlayerLayout({ resource, course, userData, onClose, showConfirm, onOpenAttachment }) {
      const isTeacher = userData?.roles?.includes('teacher') || userData?.roles?.includes('admin');
      const attachments = course?.resources?.filter(r => r.parentId === resource.id) || [];
      const [activeTab, setActiveTab] = useState('overview'); 
      const [showCreator, setShowCreator] = useState(false);

      const deleteAttachment = async (attId, e) => {
        e.stopPropagation();
        if(showConfirm) {
          showConfirm("Delete Attachment", "Permanently delete this attachment?", async () => {
            const newRes = course.resources.filter(r => r.id !== attId);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { resources: newRes });
            toast("Attachment removed");
          });
        }
      };

      return (
        <div className="flex flex-col h-full w-full animate-in fade-in bg-app z-[100] absolute inset-0 pb-0 lg:pb-8">
          <div className="p-4 sm:p-6 pb-2 md:pb-4 bg-app shrink-0 flex items-center shadow-lg border-b border-white/5 z-20 min-h-[64px] md:min-h-[80px]">
             <SmartBackButton label="Back to Content" />
          </div>

          <div className="flex flex-col lg:flex-row flex-1 overflow-hidden lg:mx-8 lg:mb-8 lg:glass-premium lg:rounded-[3rem] lg:border border-[#D4AF37]/30 lg:shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
            <div className="w-full lg:w-[65%] xl:w-[70%] bg-black relative flex flex-col shrink-0 border-b lg:border-b-0 lg:border-r border-white/10 z-10 lg:min-h-[500px]">
              <div className="relative w-full aspect-video lg:aspect-auto lg:h-full lg:flex-1">
                {resource.type === 'youtube' ? (
                  <iframe
                    className="absolute inset-0 w-full h-full"
                    src={getYoutubeEmbedUrl(resource.url)}
                    title={resource.title}
                    frameBorder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerPolicy="strict-origin-when-cross-origin"
                    allowFullScreen
                  ></iframe>
                ) : (
                  <video className="absolute inset-0 w-full h-full object-contain outline-none bg-black" controls controlsList="nodownload" poster={resource.thumbnailUrl || ''} playsInline>
                    <source src={resource.url} />
                  </video>
                )}
              </div>
            </div>

            <div className="w-full lg:w-[35%] xl:w-[30%] bg-[#080808] flex flex-col flex-1 lg:h-full overflow-hidden shrink-0">
               <div className="flex border-b border-white/10 bg-black shrink-0 relative z-10 shadow-md">
                 <button onClick={() => setActiveTab('overview')} className={`flex-1 py-5 text-xs sm:text-sm font-bold uppercase tracking-widest transition-all ${activeTab === 'overview' ? 'text-[#D4AF37] border-b-[4px] border-[#D4AF37] bg-white/5' : 'text-gray-500 hover:text-gray-300'}`}>
                    Info
                 </button>
                 {course?.id && (
                   <button onClick={() => setActiveTab('attachments')} className={`flex-1 py-5 text-xs sm:text-sm font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${activeTab === 'attachments' ? 'text-[#D4AF37] border-b-[4px] border-[#D4AF37] bg-white/5' : 'text-gray-500 hover:text-gray-300'}`}>
                      Notes ({attachments.length})
                   </button>
                 )}
               </div>

               <div className="flex-1 overflow-y-auto p-6 md:p-8 lg:p-10 custom-scrollbar bg-gradient-to-b from-[#080808] to-[#050505]">
                  {activeTab === 'overview' && (
                    <div className="animate-in fade-in pb-20">
                      <p className="text-[#D4AF37] text-xs font-bold uppercase tracking-widest mb-4 flex items-center gap-2 bg-[#D4AF37]/10 w-fit px-3 py-1.5 rounded-lg border border-[#D4AF37]/20"><PlayCircle size={18}/> {resource.type}</p>
                      <h2 className="serif text-3xl md:text-4xl text-white mb-6 leading-tight break-words">{resource.title}</h2>
                      <div className="prose prose-invert max-w-none">
                         {resource.description ? (
                           <p className="text-gray-300 whitespace-pre-wrap leading-relaxed font-light text-sm md:text-base">
                             {resource.description}
                           </p>
                         ) : (
                           <p className="text-gray-600 text-sm font-light italic bg-black/40 p-5 rounded-2xl border border-white/5">No extra info provided for this lesson.</p>
                         )}
                      </div>
                    </div>
                  )}

                  {activeTab === 'attachments' && course?.id && (
                    <div className="animate-in fade-in space-y-5 pb-24">
                       {isTeacher && (
                         <button onClick={() => setShowCreator(true)} className="w-full bg-gradient-to-r from-[#D4AF37] to-[#B38D22] text-black py-5 rounded-2xl text-xs sm:text-sm font-bold uppercase tracking-widest flex items-center justify-center gap-3 hover:shadow-[0_10px_20px_rgba(212,175,55,0.4)] hover:-translate-y-1 transition-all mb-8">
                           <Plus size={20} /> Add Note / Link / File
                         </button>
                       )}
                       
                       {attachments.length === 0 ? (
                         <div className="text-center py-12 border border-dashed border-white/10 rounded-3xl bg-black/40">
                           <Paperclip size={40} className="mx-auto text-gray-600 mb-5 opacity-50" />
                           <p className="text-gray-500 text-sm font-bold uppercase tracking-widest">No notes attached.</p>
                         </div>
                       ) : (
                         attachments.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt)).map(att => (
                           <div key={att.id} onClick={() => {
                               if(att.type === 'link') window.open(att.url, '_blank');
                               else onOpenAttachment(att);
                           }} className="glass p-5 rounded-2xl flex items-center justify-between group cursor-pointer hover-lift border border-white/10 hover:border-[#D4AF37]/40 transition-all shadow-md">
                              <div className="flex items-center gap-4 overflow-hidden">
                                <div className="w-12 h-12 md:w-14 md:h-14 rounded-xl bg-black/60 border border-white/10 flex items-center justify-center text-gray-400 group-hover:text-white group-hover:bg-[#D4AF37]/20 transition-colors shrink-0 shadow-inner">
                                  {att.type === 'pdf' ? <FileText size={22}/> : 
                                   att.type === 'image' || att.type === 'collage' ? <ImageIcon size={22}/> :
                                   att.type === 'text' ? <FileText size={22}/> :
                                   att.type === 'link' ? <LinkIcon size={22}/> : <Paperclip size={22}/>}
                                </div>
                                <div className="truncate flex-1">
                                  <h4 className="text-white text-sm md:text-base font-bold break-words line-clamp-1 mb-1 group-hover:text-[#D4AF37] transition-colors">{att.title}</h4>
                                  <span className="text-gray-400 text-[10px] md:text-xs uppercase tracking-widest font-bold block">
                                    {att.type === 'link' ? 'External Link' : att.type === 'text' ? 'Note' : att.type}
                                  </span>
                                </div>
                              </div>
                              {isTeacher ? (
                                  <button onClick={(e) => deleteAttachment(att.id, e)} className="text-gray-500 hover:text-red-400 p-3 rounded-xl hover:bg-red-500/10 transition-colors shrink-0 ml-2 bg-black/40 border border-white/5">
                                    <Trash2 size={20} />
                                  </button>
                              ) : (
                                  <ChevronRight size={24} className="text-gray-600 group-hover:text-[#D4AF37] transition-colors shrink-0 ml-2" />
                              )}
                           </div>
                         ))
                       )}
                    </div>
                  )}
               </div>
            </div>

            {showCreator && <ResourceCreatorModal docId={course.id} parentId={resource.id} collectionName="courses" onClose={() => setShowCreator(false)} defaultType="text" />}
          </div>
        </div>
      );
    }

    function StandardPreviewLayout({ resource, onClose }) {
      return (
        <div className="flex flex-col h-full w-full animate-in fade-in bg-app z-[110] absolute inset-0 pb-0 lg:pb-10">
          <div className="p-4 sm:p-6 pb-2 md:pb-6 bg-app shrink-0 flex items-center shadow-lg border-b border-white/5 z-20 min-h-[64px] md:min-h-[80px]">
             <SmartBackButton label="Back" />
          </div>
          
          <div className="mb-6 md:mb-8 text-left relative z-10 shrink-0 px-6 sm:px-10 pt-6 max-w-6xl mx-auto w-full">
            <p className="text-[#D4AF37] text-xs uppercase tracking-widest font-bold mb-3 flex items-center gap-2 bg-[#D4AF37]/10 w-fit px-3 py-1.5 rounded-lg border border-[#D4AF37]/20">Viewing {resource.type}</p>
            <h2 className="serif text-4xl md:text-5xl lg:text-6xl text-white break-words line-clamp-2">{resource.title}</h2>
          </div>
          
          <div className="flex-1 w-full lg:max-w-[calc(100%-4rem)] lg:mx-auto lg:glass-premium lg:rounded-[3rem] overflow-hidden relative lg:border border-white/20 lg:shadow-[0_20px_50px_rgba(0,0,0,0.8)] flex items-center justify-center bg-[#050505]">

            {resource.type === 'pdf' && (
               <iframe src={`${resource.url}#toolbar=0`} className="w-full h-full bg-[#111]"></iframe>
            )}

            {resource.type === 'image' && (
              <div className="w-full h-full p-4 sm:p-8 md:p-12 overflow-auto flex items-center justify-center custom-scrollbar">
                 <img src={resource.url} alt={resource.title} className="max-w-full max-h-full object-contain rounded-2xl md:rounded-[2rem] border border-white/10 shadow-2xl" />
              </div>
            )}

            {resource.type === 'collage' && <CollageSlider resource={resource} />}

            {resource.type === 'text' && (
              <div className="w-full h-full flex flex-col items-center p-6 sm:p-10 md:p-16 overflow-y-auto custom-scrollbar bg-black/60">
                <div className="max-w-4xl w-full glass p-8 sm:p-12 md:p-20 rounded-[2rem] md:rounded-[3rem] border border-white/10 shadow-2xl relative">
                  <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#D4AF37] to-[#FFDF73]"></div>
                  <FileText size={56} className="text-[#D4AF37] mb-10 mx-auto opacity-60" />
                  <p className="text-gray-200 whitespace-pre-wrap leading-relaxed font-light text-base md:text-lg lg:text-xl font-sans">
                    {resource.url}
                  </p>
                </div>
              </div>
            )}

            {resource.type === 'link' && (
              <div className="w-full h-full flex flex-col items-center justify-center p-8 text-center bg-black/60">
                <div className="glass-premium p-10 sm:p-14 md:p-20 rounded-[2.5rem] md:rounded-[3rem] border border-white/20 max-w-xl w-full shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
                  <div className="w-24 h-24 bg-black/60 rounded-full flex items-center justify-center mx-auto mb-8 border border-[#D4AF37]/30 shadow-inner">
                    <LinkIcon size={48} className="text-[#D4AF37]" />
                  </div>
                  <h3 className="serif text-3xl md:text-4xl text-white mb-6">External Link</h3>
                  <p className="text-gray-300 mb-10 text-sm md:text-base font-light leading-relaxed">This asset points to an external site. Click below to open it securely in a new tab.</p>
                  <a href={resource.url} target="_blank" rel="noreferrer" className="inline-flex bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black px-10 py-5 rounded-2xl text-sm font-bold uppercase tracking-widest hover:-translate-y-1 active:scale-95 transition-all shadow-[0_10px_30px_rgba(212,175,55,0.4)] items-center justify-center gap-3 w-full sm:w-auto">
                    Open Link Now <ChevronRight size={20} />
                  </a>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function TeacherAttendance({ user, userData, courses, users, isAdmin, showConfirm }) {
      const taughtCourses = isAdmin ? courses : courses.filter(c => userData.enrolledCourses?.includes(c.id));
      
      const [selectedCourseId, setSelectedCourseId] = useState(null);
      const [selectedLectureId, setSelectedLectureId] = useState(null);

      useHardwareBack(!!selectedCourseId, () => setSelectedCourseId(null));
      useHardwareBack(!!selectedLectureId, () => setSelectedLectureId(null));

      const handleOpenCourse = (id) => {
          window.history.pushState({ internalNav: true }, "");
          setSelectedCourseId(id);
      }
      
      const handleOpenLecture = (id) => {
          window.history.pushState({ internalNav: true }, "");
          setSelectedLectureId(id);
      }

      const activeCourse = courses.find(c => c.id === selectedCourseId);
      const activeLecture = activeCourse?.schedule?.find(s => s.id === selectedLectureId);
      const enrolledStudents = activeCourse ? users.filter(u => u.enrolledCourses?.includes(activeCourse.id) && u.roles.includes('student')) : [];

      const markAttendance = async (studentId, status) => {
        try {
          const existingRecords = activeCourse.attendance?.filter(a => !(a.userId === studentId && a.scheduleId === activeLecture.id)) || [];
          const newRecord = { userId: studentId, scheduleId: activeLecture.id, status, markedAt: new Date().toISOString() };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', activeCourse.id), {
            attendance: [...existingRecords, newRecord]
          });
          toast(`Marked ${status}`);
        } catch(err) {
          toast("Error marking attendance");
        }
      };

      const clearAttendance = async (studentId) => {
        showConfirm("Delete Attendance", "Are you sure you want to delete this attendance record?", async () => {
          try {
            const existingRecords = activeCourse.attendance?.filter(a => !(a.userId === studentId && a.scheduleId === activeLecture.id)) || [];
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', activeCourse.id), {
              attendance: existingRecords
            });
            toast("Attendance Deleted");
          } catch(err) {
            toast("Error deleting attendance");
          }
        });
      };

      if (activeLecture) {
        return (
          <div className="animate-in fade-in duration-500">
            <SmartBackButton label="Back to Lectures" />
            <header className="mb-10 md:mb-14">
              <div className="bg-[#D4AF37]/10 border border-[#D4AF37]/30 text-[#D4AF37] px-5 py-3 rounded-xl text-xs sm:text-sm font-bold uppercase tracking-widest mb-6 inline-flex items-center gap-3 shadow-md">
                 <Calendar size={18} /> {formatDDMMYYYY(activeLecture.date)}
                 {activeLecture.time && <><Clock size={18} className="ml-3 border-l border-[#D4AF37]/30 pl-3"/> {formatTime(activeLecture.time)}</>}
              </div>
              <h1 className="serif text-4xl sm:text-5xl lg:text-7xl mb-4 text-white break-words leading-tight">Lecture Attendance</h1>
              <p className="text-gray-300 text-base md:text-lg font-light break-words">{activeLecture.title}</p>
            </header>
            <div className="glass-premium p-6 sm:p-10 md:p-14 rounded-[2rem] md:rounded-[3rem] mb-16 shadow-2xl border border-white/10">
              <h3 className="serif text-3xl md:text-4xl text-white mb-8 border-b border-white/10 pb-5 italic">Student Roster</h3>
              {enrolledStudents.length === 0 ? (
                <div className="bg-black/30 p-10 rounded-3xl border border-white/5 text-center">
                  <p className="text-gray-500 text-sm font-bold tracking-[0.2em] uppercase">No students enrolled.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 md:gap-8">
                  {enrolledStudents.map(student => {
                    const markedRecord = activeCourse.attendance?.find(a => a.userId === student.id && a.scheduleId === activeLecture.id);
                    return (
                      <div key={student.id} className="glass border border-white/10 p-5 md:p-6 rounded-2xl md:rounded-[1.5rem] flex flex-col sm:flex-row sm:items-center justify-between hover-lift shadow-md gap-4">
                        <div className="truncate pr-4 flex items-center gap-4 w-full sm:w-auto">
                          <div className="w-14 h-14 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-gray-800 to-black border border-white/10 flex items-center justify-center text-white serif text-2xl md:text-3xl shrink-0 overflow-hidden shadow-inner">
                            {student.profilePic ? <img src={student.profilePic} className="w-full h-full object-cover" /> : student.name.charAt(0)}
                          </div>
                          <div className="flex-1 min-w-0">
                            <p className="text-white font-bold text-sm md:text-base truncate mb-1">{student.name}</p>
                            <p className="text-gray-400 text-[10px] md:text-xs uppercase tracking-widest font-bold">Student</p>
                          </div>
                        </div>
                        <div className="flex gap-3 shrink-0 w-full sm:w-auto justify-end mt-2 sm:mt-0">
                          <button onClick={() => markAttendance(student.id, 'present')} className={`w-12 h-12 md:w-14 md:h-14 rounded-xl flex items-center justify-center font-bold transition-all text-base md:text-lg border ${markedRecord?.status === 'present' ? 'bg-green-900/40 text-green-400 border-green-500/60 shadow-[0_0_20px_rgba(34,197,94,0.3)]' : 'bg-black/40 border-white/10 text-gray-500 hover:border-green-500/50 hover:text-green-400 hover:bg-green-500/10'}`}>P</button>
                          <button onClick={() => markAttendance(student.id, 'absent')} className={`w-12 h-12 md:w-14 md:h-14 rounded-xl flex items-center justify-center font-bold transition-all text-base md:text-lg border ${markedRecord?.status === 'absent' ? 'bg-red-900/40 text-red-400 border-red-500/60 shadow-[0_0_20px_rgba(239,68,68,0.3)]' : 'bg-black/40 border-white/10 text-gray-500 hover:border-red-500/50 hover:text-red-400 hover:bg-red-500/10'}`}>A</button>
                          {(isAdmin || markedRecord) && (
                            <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); clearAttendance(student.id); }} title="Delete Record" className="w-12 h-12 md:w-14 md:h-14 rounded-xl flex items-center justify-center transition-all border bg-black/40 border-white/10 text-gray-500 hover:border-red-500/50 hover:text-red-400 hover:shadow-[0_0_20px_rgba(239,68,68,0.3)] hover:bg-red-500/10 ml-2">
                              <Trash2 size={20} />
                            </button>
                          )}
                        </div>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
          </div>
        );
      }

      if (activeCourse) {
        return (
          <div className="animate-in fade-in duration-500">
            <SmartBackButton label="Back to Courses" />
            <header className="mb-10 md:mb-14">
              <h1 className="serif text-4xl sm:text-5xl lg:text-7xl mb-4 text-white break-words leading-tight">Select <span className="gold-gradient-text italic">Lecture</span></h1>
              <p className="text-gray-300 text-sm md:text-base font-light break-words">{activeCourse.title}</p>
            </header>
            {(!activeCourse.schedule || activeCourse.schedule.length === 0) ? (
              <div className="glass-premium rounded-2xl md:rounded-[3rem] p-16 md:p-24 text-center text-gray-500 text-sm tracking-widest uppercase font-bold border border-white/10 shadow-inner">No lectures scheduled yet.</div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 pb-16">
                 {activeCourse.schedule.sort((a,b) => new Date(a.date) - new Date(b.date)).map((s, idx) => {
                    const dateParts = s.date ? s.date.split('-') : ['','',''];
                    const year = dateParts[0];
                    const month = dateParts[1];
                    const day = dateParts[2] || s.date;

                    return (
                      <button key={s.id} onClick={() => handleOpenLecture(s.id)} className="glass-premium p-0 rounded-[2rem] text-left hover-lift flex flex-col border border-white/10 relative overflow-hidden group shadow-xl">
                         <div className="flex border-b border-white/10 h-full min-h-[140px]">
                             <div className="bg-black/60 p-5 md:p-6 flex flex-col items-center justify-center border-r border-white/10 shrink-0 w-28 md:w-32 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#D4AF37] to-[#B38D22]"></div>
                                <span className="text-[#D4AF37] text-4xl md:text-5xl serif leading-none mb-2 drop-shadow-md">{day}</span>
                                <span className="text-gray-400 text-xs font-bold tracking-[0.2em] uppercase mt-1 text-center">{month}-{year}</span>
                             </div>
                             <div className="p-5 md:p-6 flex-1 flex flex-col justify-center min-w-0 bg-white/[0.02]">
                                <h4 className="serif text-xl md:text-2xl text-white group-hover:text-[#D4AF37] transition-colors break-words line-clamp-2 mb-3 font-bold">{s.title}</h4>
                                <span className="text-[#D4AF37] text-xs font-bold tracking-widest uppercase flex items-center gap-2 bg-black/40 w-fit px-3 py-1.5 rounded-lg border border-[#D4AF37]/20">
                                   <Clock size={16} /> {formatTime(s.time) || "TBA"}
                                </span>
                             </div>
                         </div>
                         <div className="p-5 md:p-6 bg-black/40 flex-1">
                             <p className="text-gray-400 text-sm font-light line-clamp-2 break-words leading-relaxed">{s.description}</p>
                         </div>
                      </button>
                    );
                 })}
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="animate-in fade-in duration-500 pb-16">
          <header className="mb-10 md:mb-16">
            <h1 className="serif text-5xl sm:text-6xl lg:text-8xl mb-4 text-white break-words leading-tight">Attendance <span className="gold-gradient-text italic">Ledger</span></h1>
            <p className="text-gray-300 text-sm md:text-base font-light">Select a course to mark lecture attendance.</p>
          </header>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
            {taughtCourses.map(c => (
              <button key={c.id} onClick={() => handleOpenCourse(c.id)} className="glass-premium p-6 sm:p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] flex flex-col text-left relative overflow-hidden group min-h-[260px] md:min-h-[300px] hover-lift border border-[#D4AF37]/20 shadow-[0_10px_30px_rgba(0,0,0,0.4)]">
                {c.coverImage ? (
                  <div className="absolute inset-0 z-0 opacity-[0.15] group-hover:opacity-[0.3] transition-opacity duration-500">
                    <img src={c.coverImage} className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent"></div>
                  </div>
                ) : null}
                <div className="relative z-10 flex flex-col h-full w-full">
                  <h3 className="serif text-3xl md:text-4xl text-white mb-4 break-words line-clamp-2 leading-tight">{c.title}</h3>
                  <div className="mt-auto flex items-center justify-between pt-6 border-t border-white/10">
                     <span className="text-gray-300 text-xs uppercase tracking-widest font-bold bg-black/60 px-5 py-3 rounded-xl border border-white/10 backdrop-blur-md shadow-inner">{c.schedule?.length || 0} Lectures</span>
                     <div className="w-12 h-12 rounded-full bg-black/60 border border-white/20 flex items-center justify-center group-hover:bg-[#D4AF37] group-hover:text-black transition-colors shadow-lg">
                        <ChevronRight size={24} />
                     </div>
                  </div>
                </div>
              </button>
            ))}
            {taughtCourses.length === 0 && <div className="glass p-10 rounded-3xl col-span-full text-center"><p className="text-gray-500 text-sm tracking-widest uppercase font-bold">No courses available.</p></div>}
          </div>
        </div>
      );
    }

    function UserProfile({ user, userData, setUserData }) {
      const [uploading, setUploading] = useState(false);
      const [name, setName] = useState(userData.name || '');

      const handleUpdate = async (e) => {
        e.preventDefault();
        setUploading(true);
        try {
          const newProfile = { ...userData, name };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { name });
          await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), { name });
          setUserData(newProfile);
          toast("Profile Updated");
        } catch (err) {
          toast("Error updating profile");
        } finally {
          setUploading(false);
        }
      };

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const sRef = storageRef(storage, `artifacts/${appId}/public/data/profiles_${user.uid}_${file.name}`);
          const uploadTask = uploadBytesResumable(sRef, file);
          uploadTask.on('state_changed', null, 
            (error) => { toast("Upload failed"); setUploading(false); }, 
            async () => {
              const url = await getDownloadURL(uploadTask.snapshot.ref);
              const newProfile = { ...userData, profilePic: url };
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { profilePic: url });
              await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), { profilePic: url });
              setUserData(newProfile);
              toast("Profile Picture Updated");
              setUploading(false);
            }
          );
        } catch(err) {
          toast("Error uploading image");
          setUploading(false);
        }
      };

      return (
        <div className="animate-in fade-in duration-500 max-w-4xl mx-auto pb-16">
          <header className="mb-10 md:mb-16 text-center">
            <h1 className="serif text-5xl sm:text-6xl lg:text-7xl mb-4 text-white">Your <span className="gold-gradient-text italic">Profile</span></h1>
            <p className="text-gray-300 text-sm md:text-base font-light">Manage your conservatory identity.</p>
          </header>

          <div className="glass-premium p-8 sm:p-12 md:p-16 rounded-[2.5rem] md:rounded-[3rem] border border-[#D4AF37]/30 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative overflow-hidden">
             <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#D4AF37] to-transparent opacity-70"></div>
             
             <div className="flex flex-col md:flex-row items-center gap-10 md:gap-14 mb-12 pb-12 border-b border-white/10">
                <div className="relative group shrink-0">
                   <div className="w-40 h-40 md:w-48 md:h-48 rounded-full bg-gradient-to-br from-[#111] to-black border-4 border-[#D4AF37]/30 flex items-center justify-center text-white serif text-6xl md:text-7xl shadow-[0_0_50px_rgba(212,175,55,0.2)] overflow-hidden">
                     {userData.profilePic ? <img src={userData.profilePic} className="w-full h-full object-cover" /> : userData.name?.charAt(0) || 'U'}
                   </div>
                   <label className="absolute inset-0 flex items-center justify-center bg-black/70 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity backdrop-blur-sm">
                     <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} disabled={uploading} />
                     <ImageIcon size={48} className="text-[#D4AF37] drop-shadow-lg" />
                   </label>
                   {uploading && <div className="absolute -bottom-5 left-1/2 -translate-x-1/2 text-xs text-[#D4AF37] uppercase tracking-widest font-bold bg-black px-5 py-2.5 rounded-xl border border-[#D4AF37]/40 shadow-lg whitespace-nowrap">Processing...</div>}
                </div>
                <div className="text-center md:text-left w-full">
                  <h3 className="text-3xl md:text-4xl font-bold text-white mb-3 md:mb-4 break-words serif">{userData.name}</h3>
                  <p className="text-gray-400 text-sm md:text-base mb-6 md:mb-8 font-light break-words">{userData.email}</p>
                  <div className="flex flex-wrap justify-center md:justify-start gap-4">
                    {userData.roles?.map(r => (
                       <span key={r} className="text-xs sm:text-sm bg-black text-[#D4AF37] border border-[#D4AF37]/40 px-5 py-2.5 rounded-xl font-bold uppercase tracking-[0.2em] shadow-inner">{r}</span>
                    ))}
                  </div>
                </div>
             </div>

             <form onSubmit={handleUpdate} className="space-y-8">
               <div>
                 <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-4 block">Display Name</label>
                 <input type="text" value={name} onChange={(e) => setName(e.target.value)} required disabled={uploading} className="w-full bg-black/60 border border-white/10 p-5 md:p-6 rounded-2xl md:rounded-[1.5rem] text-sm md:text-base outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-600 shadow-inner" />
               </div>
               
               <div className="pt-6">
                 <button type="submit" disabled={uploading || name === userData.name} className="w-full bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black py-5 md:py-6 rounded-2xl md:rounded-[1.5rem] text-sm font-bold tracking-widest uppercase hover:shadow-[0_10px_30px_rgba(212,175,55,0.4)] hover:-translate-y-1 transition-all shadow-lg disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-none">
                   {uploading ? 'Updating...' : 'Update Profile'}
                 </button>
               </div>
             </form>
          </div>
        </div>
      );
    }

    function ScheduleCreatorModal({ courseId, onClose }) {
      const handleSubmit = async (e) => {
        e.preventDefault();
        const form = e.target;
        
        const newSchedule = {
          id: crypto.randomUUID(),
          title: form.title.value,
          description: form.description.value,
          date: form.date.value,
          time: form.time.value,
        };

        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', courseId), {
            schedule: arrayUnion(newSchedule)
          });
          toast("Schedule Added");
          onClose();
        } catch (err) {
          toast("Error adding schedule");
        }
      };

      return (
        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 sm:p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
          <div className="glass-premium p-6 sm:p-10 md:p-14 w-full max-w-2xl rounded-[2rem] md:rounded-[3rem] relative border border-[#D4AF37]/40 shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-400 hover:text-white bg-black/40 p-2 rounded-full border border-white/10"><X size={24}/></button>
            <h2 className="serif text-4xl md:text-5xl mb-3 text-white italic">Add Schedule</h2>
            <p className="text-[#D4AF37] text-xs uppercase tracking-widest font-bold mb-8">Plan Course Syllabus</p>
            <form onSubmit={handleSubmit} className="space-y-6">
              <div>
                <input name="title" type="text" placeholder="LECTURE TITLE" required className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-600" />
              </div>
              <div>
                <textarea name="description" placeholder="LECTURE DESCRIPTION" rows="3" required className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Date</label>
                  <input name="date" type="date" required className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white" />
                </div>
                <div>
                  <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Time</label>
                  <input name="time" type="time" required className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white" />
                </div>
              </div>
              <div className="flex flex-col sm:flex-row gap-4 pt-4">
                <button type="button" onClick={onClose} className="w-full sm:flex-1 py-4 md:py-5 border border-white/20 rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase text-gray-300 hover:text-white transition-colors bg-black/40">Cancel</button>
                <button type="submit" className="w-full sm:flex-1 bg-[#D4AF37] text-black rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase hover:bg-[#F9E29D] transition-colors shadow-[0_10px_20px_rgba(212,175,55,0.3)] hover:-translate-y-1">Add Schedule</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function EditCourseModal({ course, onClose }) {
      const handleUpdate = async (e) => {
        e.preventDefault();
        const form = e.target;
        
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), {
            title: form.title.value,
            desc: form.desc.value,
            coverImage: form.coverImage.value
          });
          toast("Course Updated");
          onClose();
        } catch(err) {
          toast("Error updating course");
        }
      };

      return (
        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 sm:p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
          <div className="glass-premium p-6 sm:p-10 md:p-14 rounded-[2rem] md:rounded-[3rem] w-full max-w-2xl relative border border-[#D4AF37]/40 shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-400 hover:text-white p-2 bg-black/40 rounded-full border border-white/10"><X size={24}/></button>
            <h2 className="serif text-4xl md:text-5xl mb-3 text-white italic">Edit Course</h2>
            <p className="text-[#D4AF37] text-xs uppercase tracking-widest font-bold mb-8">Update Registry Details</p>
            <form onSubmit={handleUpdate} className="space-y-6">
              <div>
                 <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Course Title</label>
                 <input name="title" type="text" defaultValue={course.title} required className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-500" />
              </div>
              <div>
                 <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Cover Image URL (Optional)</label>
                 <input name="coverImage" type="url" defaultValue={course.coverImage} className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-500" />
              </div>
              <div>
                 <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Course Description</label>
                 <textarea name="desc" defaultValue={course.desc} required rows={5} className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-500 leading-relaxed" />
              </div>
              <div className="flex flex-col sm:flex-row gap-4 pt-6">
                <button type="button" onClick={onClose} className="w-full sm:flex-1 py-4 md:py-5 border border-white/20 rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase text-gray-300 hover:text-white transition-colors bg-black/40">Cancel</button>
                <button type="submit" className="w-full sm:flex-1 bg-[#D4AF37] text-black rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase hover:bg-[#F9E29D] hover:-translate-y-1 transition-all shadow-[0_10px_20px_rgba(212,175,55,0.3)]">Save Details</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
