    function ResourceCreatorModal({ courseId, parentId, onClose }) {
      const [type, setType] = useState('pdf');
      const [inputMode, setInputMode] = useState('upload');
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);

      const [singleFile, setSingleFile] = useState(null);
      const [multiFiles, setMultiFiles] = useState([]);
      const [thumbnailFile, setThumbnailFile] = useState(null);

      const allowsUpload = ['pdf', 'video', 'image', 'collage'].includes(type);

      useEffect(() => {
        if (!allowsUpload) setInputMode('url');
      }, [type, allowsUpload]);

      const uploadToStorage = (file, pathPrefix) => {
        return new Promise((resolve, reject) => {
          if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 1000;
                let { width, height } = img;
                if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                else if (height > MAX) { width *= MAX / height; height = MAX; }
                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.6));
              };
            };
            reader.onerror = () => reject(new Error("Failed to read image file"));
            return;
          }

          try {
            const uniqueName = `${crypto.randomUUID()}_${file.name}`;
            const sRef = storageRef(storage, `artifacts/${appId}/public/data/${pathPrefix}_${uniqueName}`);
            const uploadTask = uploadBytesResumable(sRef, file);

            uploadTask.on('state_changed', 
              (snapshot) => setProgress(Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100)), 
              (error) => reject(new Error("Storage Error. Check limits.")), 
              async () => resolve(await getDownloadURL(uploadTask.snapshot.ref))
            );
          } catch (err) {
            reject(new Error("Storage Error. Use 'External URL' mode."));
          }
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        setProgress(0);
        const form = e.target;
        
        try {
          let finalUrl = "";
          let finalThumbnailUrl = null;
          let finalDesc = form.desc ? form.desc.value : "";

          if (inputMode === 'upload' && allowsUpload) {
            if (type === 'collage') {
              if (multiFiles.length === 0) throw new Error("No files selected.");
              const urls = await Promise.all(Array.from(multiFiles).map(f => uploadToStorage(f, 'collages')));
              finalUrl = urls.join(',');
            } else {
              if (!singleFile) throw new Error("No file selected.");
              finalUrl = await uploadToStorage(singleFile, type);
              if (type === 'video' && thumbnailFile) {
                finalThumbnailUrl = await uploadToStorage(thumbnailFile, 'thumbnails');
              }
            }
          } else {
            finalUrl = form.url.value;
            if (type === 'youtube') {
               if (thumbnailFile) {
                 finalThumbnailUrl = await uploadToStorage(thumbnailFile, 'thumbnails');
               } else {
                 const yId = extractYoutubeId(finalUrl);
                 if (yId) finalThumbnailUrl = `https://img.youtube.com/vi/${yId}/hqdefault.jpg`;
               }
            }
          }

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', courseId), {
            resources: arrayUnion({ 
              id: crypto.randomUUID(),
              type, 
              url: finalUrl, 
              thumbnailUrl: finalThumbnailUrl,
              title: form.title.value,
              description: finalDesc,
              parentId: parentId || null, 
              createdAt: new Date().toISOString()
            })
          });

          toast("Material Published");
          onClose();
        } catch(err) {
          toast(err.message || "Error publishing material");
        } finally {
          setUploading(false);
        }
      };

      const getAcceptType = () => {
        if (type === 'pdf') return 'application/pdf';
        if (type === 'video') return 'video/*';
        if (type === 'image' || type === 'collage') return 'image/*';
        return '*/*';
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#050505]/90 backdrop-blur-md animate-in fade-in">
          <div className="glass-premium p-6 md:p-10 w-full max-w-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar rounded-[2rem] md:rounded-[3rem] border border-[#D4AF37]/30 shadow-2xl">
            {!uploading && <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-500 hover:text-white"><X size={24}/></button>}
            <h2 className="serif text-3xl md:text-4xl mb-2 text-white italic">Upload Material</h2>
            <p className="text-[#D4AF37] text-[9px] uppercase tracking-widest font-bold mb-8">Add to Course Folder</p>
            <form onSubmit={handleSubmit} className="space-y-6 md:space-y-8">
              <div>
                <label className="text-[9px] text-gray-400 uppercase tracking-widest font-bold mb-3 block">Material Type</label>
                <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                  {['pdf', 'video', 'image', 'collage', 'youtube', 'text', 'link'].map(t => (
                    <button key={t} type="button" onClick={() => setType(t)} disabled={uploading} className={`px-4 py-2.5 rounded-lg text-[9px] uppercase tracking-widest font-bold whitespace-nowrap transition-all border ${type === t ? 'bg-[#D4AF37]/10 text-[#D4AF37] border-[#D4AF37]/50 shadow-[0_0_10px_rgba(212,175,55,0.2)]' : 'bg-black/30 text-gray-500 border-white/5 hover:border-white/20'}`}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <input name="title" type="text" placeholder="MATERIAL TITLE (e.g. Intro to Piano)" required disabled={uploading} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
              </div>
              
              {allowsUpload && (
                <div className="flex bg-black/40 border border-white/5 rounded-xl p-1.5 w-fit">
                   <button type="button" disabled={uploading} onClick={() => setInputMode('upload')} className={`px-5 py-2 rounded-lg text-[9px] uppercase tracking-widest font-bold transition-all ${inputMode === 'upload' ? 'bg-[#D4AF37] text-black shadow-md' : 'text-gray-500 hover:text-white'}`}>Upload</button>
                   <button type="button" disabled={uploading} onClick={() => setInputMode('url')} className={`px-5 py-2 rounded-lg text-[9px] uppercase tracking-widest font-bold transition-all ${inputMode === 'url' ? 'bg-[#D4AF37] text-black shadow-md' : 'text-gray-500 hover:text-white'}`}>URL</button>
                </div>
              )}
              
              <div className="glass border border-white/5 rounded-2xl p-5 md:p-8">
                {inputMode === 'upload' && allowsUpload ? (
                  <div className="space-y-6">
                    <div>
                      <label className="text-[9px] text-gray-400 uppercase tracking-widest font-bold mb-3 block">{type === 'collage' ? 'Select Multiple Files' : 'Select Source File'}</label>
                      <div className="relative border border-dashed border-[#D4AF37]/30 rounded-2xl p-10 text-center hover:border-[#D4AF37]/60 transition-colors bg-black/30 group">
                        <input type="file" accept={getAcceptType()} multiple={type === 'collage'} required disabled={uploading} onChange={(e) => type === 'collage' ? setMultiFiles(e.target.files) : setSingleFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                        <FileIcon size={32} className="mx-auto text-[#D4AF37] group-hover:scale-110 mb-4 transition-transform opacity-70" />
                        <p className="text-[#D4AF37] text-[10px] font-bold tracking-[0.2em] uppercase mb-2">Drag & Drop or Browse</p>
                        <p className="text-gray-500 text-[9px] font-medium">{type === 'collage' ? (multiFiles.length > 0 ? `${multiFiles.length} files selected` : `Supported: Images (Multiple)`) : (singleFile ? singleFile.name : `Supported: ${type.toUpperCase()}`)}</p>
                      </div>
                    </div>
                    {type === 'video' && (
                      <div className="pt-6 border-t border-white/5">
                        <label className="text-[9px] text-gray-400 uppercase tracking-widest font-bold mb-3 flex items-center gap-2"><ImagePlus size={14}/> Video Cover Thumbnail (Optional)</label>
                        <input type="file" accept="image/*" disabled={uploading} onChange={(e) => setThumbnailFile(e.target.files[0])} className="w-full text-gray-400 text-xs" />
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="space-y-5">
                    {type === 'text' ? (
                      <textarea name="url" placeholder="Type or paste text content here..." required disabled={uploading} rows={8} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[12px] outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar" />
                    ) : type === 'collage' ? (
                      <textarea name="url" placeholder="COMMA SEPARATED IMAGE URLS" required disabled={uploading} rows={4} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
                    ) : type === 'youtube' ? (
                      <>
                        <input name="url" type="url" placeholder="YOUTUBE URL (e.g. https://youtu.be/...)" required disabled={uploading} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                        <div className="pt-5 border-t border-white/5">
                          <label className="text-[9px] text-gray-400 uppercase tracking-widest font-bold mb-3 flex items-center gap-2"><ImagePlus size={14}/> Custom Thumbnail (Optional)</label>
                          <input type="file" accept="image/*" disabled={uploading} onChange={(e) => setThumbnailFile(e.target.files[0])} className="w-full text-gray-400 text-xs" />
                        </div>
                        <div className="pt-5 border-t border-white/5">
                          <textarea name="desc" placeholder="ADDITIONAL NOTES OR DESCRIPTION..." disabled={uploading} rows={4} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
                        </div>
                      </>
                    ) : (
                      <input name="url" type="url" placeholder="DIRECT URL LINK" required disabled={uploading} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                    )}
                  </div>
                )}
              </div>
              
              {uploading && (
                <div className="w-full bg-black/50 border border-[#D4AF37]/30 rounded-2xl p-6 flex flex-col items-center justify-center animate-in fade-in shadow-[0_0_20px_rgba(212,175,55,0.1)]">
                  <div className="w-full bg-black rounded-full h-2 mb-3 overflow-hidden border border-white/5">
                    <div className="bg-gradient-to-r from-[#D4AF37] to-[#FFDF73] h-2 rounded-full transition-all duration-300 shadow-[0_0_10px_#D4AF37]" style={{ width: `${progress}%` }}></div>
                  </div>
                  <p className="text-center text-[9px] text-[#D4AF37] font-bold uppercase tracking-[0.2em]">Uploading {progress}%</p>
                </div>
              )}
              
              <div className="flex gap-4 pt-4">
                <button type="button" onClick={onClose} disabled={uploading} className="flex-1 py-4 border border-white/10 rounded-xl text-[9px] font-bold tracking-[0.2em] uppercase text-gray-400 hover:text-white transition-colors disabled:opacity-50">Cancel</button>
                <button type="submit" disabled={uploading} className="flex-1 bg-[#D4AF37] text-black rounded-xl text-[9px] font-bold tracking-[0.2em] uppercase hover:bg-[#F9E29D] transition-colors flex items-center justify-center gap-2 disabled:opacity-50 shadow-lg">
                   {uploading ? <div className="w-4 h-4 border-2 border-black/20 border-t-black rounded-full animate-spin"></div> : <UploadCloud size={16} />}
                   {uploading ? 'Processing' : 'Publish Asset'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function TeacherDashboard({ user, userData, courses, users, showConfirm }) {
      const [activeCourseId, setActiveCourseId] = useState(null);
      const [currentFolderId, setCurrentFolderId] = useState(null);
      
      const [showResourceModal, setShowResourceModal] = useState(false);
      const [showFolderModal, setShowFolderModal] = useState(false);
      const [previewResource, setPreviewResource] = useState(null);

      const activeCourse = courses.find(c => c.id === activeCourseId);
      const taughtCourses = courses.filter(c => userData.enrolledCourses?.includes(c.id));

      const removeResource = async (resId) => {
        showConfirm("Remove Material", "Remove this permanently? (Deletes all contents if it's a folder)", async () => {
          const allRes = activeCourse.resources || [];
          let toDelete = [resId];
          const resource = allRes.find(r => r.id === resId);
          
          if(resource?.isFolder) {
              toDelete = toDelete.concat(getAllChildrenIds(resId, allRes));
          }

          const newResources = allRes.filter(r => !toDelete.includes(r.id));
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', activeCourse.id), {
            resources: newResources
          });
          toast("Removed Successfully");
        });
      };

      if (activeCourse) {
        const enrolledStudents = users.filter(u => u.enrolledCourses?.includes(activeCourse.id) && u.roles.includes('student'));
        const allResources = activeCourse.resources || [];
        const currentResources = allResources.filter(r => (r.parentId || null) === currentFolderId);
        const breadcrumbs = buildBreadcrumbs(currentFolderId, allResources);

        return (
          <div className="animate-in fade-in duration-500">
            <button onClick={() => { setActiveCourseId(null); setCurrentFolderId(null); }} className="text-[#D4AF37] text-[10px] font-bold uppercase tracking-[0.2em] mb-8 hover:text-white transition-colors flex items-center gap-2">
              <ChevronLeft size={14} /> Back to Dashboard
            </button>
            
            <header className="mb-10 md:mb-12 relative rounded-[2.5rem] overflow-hidden glass-premium p-8 md:p-12 border border-[#D4AF37]/20 shadow-2xl">
              {activeCourse.coverImage && (
                <div className="absolute inset-0 z-0">
                  <img src={activeCourse.coverImage} alt="Cover" className="w-full h-full object-cover opacity-20 mix-blend-overlay" />
                  <div className="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/80 to-transparent"></div>
                </div>
              )}
              <div className="relative z-10">
                <span className="bg-[#D4AF37] text-black px-3 py-1 rounded text-[8px] font-bold uppercase tracking-widest mb-4 inline-block">Management Mode</span>
                <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-3 text-white leading-tight">Manage: {activeCourse.title}</h1>
                <p className="text-gray-400 text-sm md:text-base max-w-2xl font-light">{activeCourse.desc}</p>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
              <div>
                <div className="flex items-center justify-between mb-8">
                   <h3 className="serif text-3xl gold-gradient-text italic font-bold">Syllabus</h3>
                   <div className="flex gap-3">
                     <button onClick={() => setShowFolderModal(true)} title="New Folder" className="w-10 h-10 glass text-gray-400 rounded-xl flex items-center justify-center hover:text-white transition-colors border border-white/10 hover:border-[#D4AF37]/50">
                       <FolderPlus size={18} />
                     </button>
                     <button onClick={() => setShowResourceModal(true)} title="Upload Material" className="w-10 h-10 bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black rounded-xl flex items-center justify-center hover:shadow-[0_0_15px_rgba(212,175,55,0.4)] transition-all">
                       <Plus size={20} />
                     </button>
                   </div>
                </div>

                <div className="flex items-center gap-2 text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold mb-6 bg-black/40 p-4 rounded-xl border border-white/5 backdrop-blur-md overflow-x-auto custom-scrollbar">
                  <button onClick={() => setCurrentFolderId(null)} className="hover:text-white transition-colors flex items-center gap-2 shrink-0">
                    <FolderOpen size={14}/> Root
                  </button>
                  {breadcrumbs.map((f, i) => (
                    <React.Fragment key={f.id}>
                      <ChevronRight size={12} className="text-[#D4AF37]/50 shrink-0" />
                      <button onClick={() => setCurrentFolderId(f.id)} className={`hover:text-white transition-colors truncate max-w-[80px] md:max-w-[150px] shrink-0 ${i === breadcrumbs.length-1 ? 'text-[#D4AF37]' : ''}`}>
                        {f.title}
                      </button>
                    </React.Fragment>
                  ))}
                </div>

                <div className="space-y-4">
                   {currentResources.length === 0 ? (
                     <div className="glass-premium rounded-[2rem] p-10 text-center text-gray-500 text-[10px] font-bold tracking-[0.2em] uppercase border border-white/5">Empty Section</div>
                   ) : (
                     currentResources.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0)).map(r => (
                       <div key={r.id} onClick={() => r.isFolder ? setCurrentFolderId(r.id) : setPreviewResource(r)} className="glass p-5 rounded-2xl flex items-center justify-between group cursor-pointer hover-lift border border-white/5 hover:border-[#D4AF37]/30">
                          <div className="flex items-center gap-5 pr-2 overflow-hidden relative z-10">
                            <div className={`shrink-0 w-12 h-12 rounded-xl flex items-center justify-center border border-white/10 shadow-inner ${r.isFolder ? 'bg-gradient-to-br from-[#D4AF37]/20 to-black text-[#D4AF37]' : 'bg-gradient-to-br from-gray-800 to-black text-gray-400 group-hover:text-white'}`}>
                              {r.isFolder ? <Folder size={20} className="fill-[#D4AF37]/20"/> : 
                               r.type === 'video' ? <PlayCircle size={20} /> : 
                               r.type === 'youtube' ? <PlayCircle size={20} /> : 
                               r.type === 'link' ? <LinkIcon size={20}/> : 
                               r.type === 'image' || r.type === 'collage' ? <ImageIcon size={20}/> : 
                               <FileText size={20}/>}
                            </div>
                            <div className="truncate">
                              <h4 className="text-white text-sm font-medium tracking-wide truncate mb-1">{r.title}</h4>
                              <span className="text-[#D4AF37] opacity-80 text-[8px] uppercase tracking-widest font-bold">{r.isFolder ? 'Folder' : r.type}</span>
                            </div>
                          </div>
                          <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeResource(r.id); }} className="text-gray-600 hover:text-red-400 p-3 rounded-xl hover:bg-red-500/10 transition-colors shrink-0">
                            <Trash2 size={16} />
                          </button>
                       </div>
                     ))
                   )}
                </div>
              </div>

              <div>
                <h3 className="serif text-3xl gold-gradient-text italic font-bold mb-8">Enrolled Students</h3>
                <div className="glass-premium p-6 md:p-8 rounded-[2rem] border border-white/5">
                   {enrolledStudents.length === 0 ? (
                     <p className="text-gray-500 text-center text-[10px] font-bold tracking-[0.2em] uppercase py-8">No students assigned.</p>
                   ) : (
                     <div className="space-y-4 max-h-[400px] overflow-y-auto custom-scrollbar pr-2">
                       {enrolledStudents.map(student => (
                         <div key={student.id} className="flex items-center gap-4 p-4 rounded-2xl glass border border-white/5">
                            <div className="w-10 h-10 md:w-12 h-12 rounded-full bg-gradient-to-br from-gray-800 to-black border border-white/10 flex items-center justify-center text-white serif font-medium shrink-0 overflow-hidden shadow-inner">
                              {student.profilePic ? <img src={student.profilePic} className="w-full h-full object-cover" /> : student.name.charAt(0)}
                            </div>
                            <div className="truncate">
                              <h4 className="text-white text-sm font-medium truncate">{student.name}</h4>
                            </div>
                         </div>
                       ))}
                     </div>
                   )}
                </div>
              </div>
            </div>
            
            {showResourceModal && <ResourceCreatorModal courseId={activeCourse.id} parentId={currentFolderId} onClose={() => setShowResourceModal(false)} />}
            {showFolderModal && <CreateFolderModal courseId={activeCourse.id} parentId={currentFolderId} courseResources={activeCourse.resources} onClose={() => setShowFolderModal(false)} />}
            {previewResource && <ResourcePreviewer resource={previewResource} onClose={() => setPreviewResource(null)} />}
          </div>
        );
      }

      return (
        <div className="animate-in fade-in duration-700">
          <header className="mb-10 md:mb-12">
            <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-2 text-white">Teacher <span className="gold-gradient-text italic">Dashboard</span></h1>
            <p className="text-gray-400 text-sm font-light">Welcome back, <span className="text-white">{userData.name}</span></p>
          </header>

          <div className="mb-8 flex items-center gap-6">
            <h3 className="serif text-3xl gold-gradient-text italic font-bold">Assigned Courses</h3>
            <div className="h-[1px] flex-1 bg-gradient-to-r from-[#D4AF37]/50 to-transparent"></div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            {taughtCourses.map(course => (
              <div key={course.id} className="glass-premium p-6 md:p-8 rounded-[2rem] flex flex-col relative overflow-hidden group hover-lift min-h-[260px] border border-[#D4AF37]/10">
                {course.coverImage && (
                  <div className="absolute inset-0 z-0 opacity-[0.15] group-hover:opacity-30 transition-opacity duration-500">
                    <img src={course.coverImage} className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent"></div>
                  </div>
                )}
                <div className="relative z-10 flex flex-col h-full">
                  <h4 className="serif text-3xl text-white mb-3">{course.title}</h4>
                  <p className="text-[#D4AF37] text-[10px] uppercase tracking-[0.2em] font-bold mb-8 border-b border-white/10 pb-4 inline-block w-fit">
                    {course.resources?.length || 0} Assets
                  </p>
                  <button onClick={() => setActiveCourseId(course.id)} className="mt-auto w-full py-4 bg-black/50 hover:bg-[#D4AF37] rounded-xl text-[10px] font-bold uppercase tracking-[0.2em] transition-all text-white hover:text-black border border-white/10 hover:border-[#D4AF37] shadow-lg">
                    Manage Syllabus
                  </button>
                </div>
              </div>
            ))}
            {taughtCourses.length === 0 && (
              <p className="text-gray-500 text-[10px] font-bold tracking-[0.2em] uppercase col-span-full">No courses assigned to your profile.</p>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // ADMIN VIEWS (Users & Course Setup)
    // ==========================================
    function AdminUsers({ users, courses, showConfirm }) {
      const toggleRole = async (userId, userRoles, targetRole) => {
        try {
          const targetUser = users.find(u => u.id === userId);
          if (targetRole === 'admin' && targetUser?.email !== 'chandrashekharkolhe7@gmail.com') {
             toast("Admin role restricted to chandrashekharkolhe7@gmail.com");
             return;
          }

          let newRoles = [...userRoles];
          if (newRoles.includes(targetRole)) newRoles = newRoles.filter(r => r !== targetRole);
          else newRoles.push(targetRole);
          if (newRoles.length === 0) newRoles = ['student']; 

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { roles: newRoles });
          await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), { roles: newRoles });
          toast("Role Updated");
        } catch(err) { toast("Error updating role"); }
      };

      const handleEnrollment = async (userId, userCourses, courseId) => {
        try {
          let updatedCourses = [...(userCourses || [])];
          if (updatedCourses.includes(courseId)) updatedCourses = updatedCourses.filter(id => id !== courseId);
          else updatedCourses.push(courseId);

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { enrolledCourses: updatedCourses });
          await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), { enrolledCourses: updatedCourses });
          toast("Enrollment Updated");
        } catch(err) { toast("Error updating enrollment"); }
      };

      const removeUser = async (userId) => {
        showConfirm("Delete Profile", "Permanently delete this user profile? This action cannot be undone.", async () => {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId));
            toast("User Profile Deleted");
          } catch(err) { toast("Error deleting user"); }
        });
      };

      return (
        <div className="animate-in fade-in duration-500">
          <header className="mb-10 md:mb-12">
            <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-2 md:mb-4 text-white">User <span className="gold-gradient-text italic">Directory</span></h1>
            <p className="text-gray-400 text-xs md:text-sm font-light">Manage accounts, roles, and course placements.</p>
          </header>
          <div className="space-y-4 pb-40">
            {users.map(u => (
              <div key={u.id} className="relative z-0 hover:z-50 focus-within:z-50 glass-premium p-5 md:p-8 rounded-[1.5rem] md:rounded-[2rem] flex flex-col md:flex-row md:items-center justify-between gap-5 md:gap-6 border border-white/5">
                <div className="flex items-center gap-4 md:gap-6">
                  <div className="w-12 h-12 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-gray-800 to-black border border-white/10 flex items-center justify-center text-white serif text-xl md:text-2xl shadow-inner shrink-0 overflow-hidden">
                    {u.profilePic ? <img src={u.profilePic} className="w-full h-full object-cover" /> : u.name.charAt(0)}
                  </div>
                  <div className="overflow-hidden">
                    <h4 className="text-sm md:text-base font-medium text-white mb-2 truncate">{u.name}</h4>
                    <div className="flex flex-wrap gap-2">
                      {u.roles?.map(r => <span key={r} className="text-[8px] md:text-[9px] bg-black text-[#D4AF37] border border-[#D4AF37]/30 px-2 py-1 rounded font-bold uppercase tracking-[0.2em]">{r}</span>)}
                    </div>
                  </div>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 md:gap-4 items-stretch md:items-center">
                  <div className="flex bg-black/50 p-1 md:p-1.5 rounded-xl border border-white/10">
                    {['student', 'teacher', 'admin'].map(r => (
                       <button key={r} onClick={() => toggleRole(u.id, u.roles || [], r)} className={`px-3 md:px-4 py-2 md:py-2.5 text-[8px] md:text-[9px] font-bold uppercase tracking-[0.2em] rounded-lg transition-all ${u.roles?.includes(r) ? 'bg-[#D4AF37] text-black shadow-md' : 'text-gray-500 hover:text-white'}`}>{r.substring(0,3)}</button>
                    ))}
                  </div>
                  <div className="relative group">
                    <button className="w-full bg-black/50 border border-white/10 px-5 py-3 md:py-3.5 rounded-xl text-[9px] md:text-[10px] font-bold uppercase tracking-[0.2em] text-gray-300 hover:text-white hover:border-[#D4AF37]/50 transition-all">Courses</button>
                    <div className="absolute right-0 top-full mt-2 w-full sm:w-64 glass-premium p-4 md:p-5 rounded-[1.5rem] opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-all z-20 max-h-56 overflow-y-auto shadow-2xl border border-[#D4AF37]/30 custom-scrollbar">
                       <p className="text-[9px] text-[#D4AF37] uppercase tracking-[0.2em] font-bold mb-3 border-b border-white/10 pb-3">Available Courses</p>
                       {courses.length === 0 ? <p className="text-[10px] text-gray-400">No courses exist.</p> : courses.map(c => {
                         const isEnrolled = u.enrolledCourses?.includes(c.id);
                         return (
                           <label key={c.id} className="flex items-center gap-3 p-2.5 hover:bg-white/5 rounded-xl cursor-pointer transition-colors">
                             <input type="checkbox" checked={isEnrolled} onChange={() => handleEnrollment(u.id, u.enrolledCourses, c.id)} className="accent-[#D4AF37] w-4 h-4 rounded" />
                             <span className="text-xs md:text-sm text-white truncate font-light">{c.title}</span>
                           </label>
                         )
                       })}
                    </div>
                  </div>
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeUser(u.id); }} className="px-4 py-3 bg-black/50 hover:bg-red-500/20 text-gray-500 hover:text-red-400 border border-white/10 rounded-xl transition-all flex items-center justify-center shrink-0">
                    <Trash2 size={18} />
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AdminCourses({ courses, showConfirm }) {
      const [showModal, setShowModal] = useState(false);
      const [managingCourseId, setManagingCourseId] = useState(null);

      const managingCourse = courses.find(c => c.id === managingCourseId);

      const createCourse = async (e) => {
        e.preventDefault();
        const form = e.target;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'courses'), {
            title: form.title.value,
            desc: form.desc.value,
            coverImage: form.coverImage.value,
            resources: [], attendance: [], schedule: [],
            createdAt: new Date().toISOString()
          });
          toast("Course Created");
          setShowModal(false);
          form.reset();
        } catch(err) { toast("Error creating course"); }
      };

      const deleteCourseRecord = async (id) => {
        showConfirm("Delete Course", "Permanently delete this course and ALL its materials? This action is irreversible.", async () => {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', id));
            toast("Course Deleted");
          } catch(err) { toast("Error deleting course"); }
        });
      };

      if (managingCourse) return <AdminCourseEditor course={managingCourse} onBack={() => setManagingCourseId(null)} showConfirm={showConfirm} />;

      return (
        <div className="animate-in fade-in duration-500 relative min-h-full">
          <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-10 md:mb-12">
            <div>
              <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-2 md:mb-4 text-white">Course <span className="gold-gradient-text italic">Registry</span></h1>
              <p className="text-gray-400 text-sm font-light">Create and manage courses.</p>
            </div>
            <button onClick={() => setShowModal(true)} className="bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black px-6 py-4 rounded-xl text-[10px] font-bold uppercase tracking-[0.2em] transition-all shadow-[0_0_20px_rgba(212,175,55,0.3)] hover:scale-105 flex items-center justify-center gap-2 shrink-0"><Plus size={18} /> New Course</button>
          </header>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            {courses.map(c => (
              <div key={c.id} onClick={() => setManagingCourseId(c.id)} className="glass-premium p-6 md:p-8 rounded-[2rem] flex flex-col cursor-pointer hover-lift relative overflow-hidden min-h-[300px] border border-[#D4AF37]/10">
                {c.coverImage && (
                  <div className="absolute inset-0 z-0 opacity-20 group-hover:opacity-30 transition-opacity duration-500">
                    <img src={c.coverImage} alt={c.title} className="w-full h-full object-cover mix-blend-overlay" />
                    <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/60 to-transparent"></div>
                  </div>
                )}
                <div className="relative z-10 flex flex-col h-full">
                  <div className="flex justify-between items-start mb-4 md:mb-6">
                    <h3 className="serif text-3xl text-white pr-4 leading-tight">{c.title}</h3>
                    <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); deleteCourseRecord(c.id); }} className="w-10 h-10 rounded-xl bg-black/50 border border-white/10 flex items-center justify-center text-gray-500 hover:text-red-400 transition-colors shrink-0"><Trash2 size={16} /></button>
                  </div>
                  <p className="text-gray-400 text-xs md:text-sm mb-6 md:mb-8 line-clamp-3 font-light leading-relaxed">{c.desc}</p>
                  <div className="mt-auto pt-5 border-t border-white/5 flex items-center justify-between text-[#D4AF37] text-[9px] font-bold uppercase tracking-[0.2em]">
                     <span className="bg-[#D4AF37]/10 px-3 py-1.5 rounded-lg">{c.resources?.length || 0} Assets</span>
                     <span className="bg-[#D4AF37]/10 px-3 py-1.5 rounded-lg">{c.schedule?.length || 0} Lectures</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {showModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#050505]/90 backdrop-blur-md animate-in fade-in">
              <div className="glass-premium p-8 md:p-10 rounded-[2.5rem] w-full max-w-xl relative border border-[#D4AF37]/30 shadow-2xl">
                <button onClick={() => setShowModal(false)} className="absolute top-8 right-8 text-gray-500 hover:text-white"><X size={24}/></button>
                <h2 className="serif text-4xl mb-2 text-white italic">Create Course</h2>
                <p className="text-[#D4AF37] text-[9px] uppercase tracking-widest font-bold mb-8">Add to Course Registry</p>
                <form onSubmit={createCourse} className="space-y-6">
                  <div><input name="title" type="text" placeholder="COURSE TITLE" required className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" /></div>
                  <div><input name="coverImage" type="url" placeholder="COVER IMAGE URL (OPTIONAL)" className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" /></div>
                  <div><textarea name="desc" placeholder="COURSE DESCRIPTION" required rows={4} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-xs md:text-sm outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" /></div>
                  <div className="flex gap-4 pt-2">
                    <button type="button" onClick={() => setShowModal(false)} className="flex-1 py-4 border border-white/10 rounded-xl text-[9px] font-bold tracking-[0.2em] uppercase text-gray-400 hover:text-white transition-colors">Cancel</button>
                    <button type="submit" className="flex-1 bg-[#D4AF37] text-black rounded-xl text-[9px] font-bold tracking-[0.2em] uppercase hover:bg-[#F9E29D] transition-colors shadow-lg">Create</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    function AdminCourseEditor({ course, onBack, showConfirm }) {
      const [currentFolderId, setCurrentFolderId] = useState(null);
      const [showResourceModal, setShowResourceModal] = useState(false);
      const [showFolderModal, setShowFolderModal] = useState(false);
      const [showScheduleModal, setShowScheduleModal] = useState(false);
      const [showEditCourseModal, setShowEditCourseModal] = useState(false);
      const [previewResource, setPreviewResource] = useState(null);

      const removeResource = async (resId) => {
        showConfirm("Remove Material", "Remove this material permanently? (If it's a folder, all contents inside will also be deleted)", async () => {
          const allRes = course.resources || [];
          let toDelete = [resId];
          const resource = allRes.find(r => r.id === resId);
          
          if(resource?.isFolder) {
              toDelete = toDelete.concat(getAllChildrenIds(resId, allRes));
          }

          const newResources = allRes.filter(r => !toDelete.includes(r.id));
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { resources: newResources });
          toast("Material Removed Successfully");
        });
      };

      const removeSchedule = async (scheduleId) => {
        showConfirm("Remove Schedule", "Remove this lecture schedule from the syllabus?", async () => {
          const newSchedule = (course.schedule || []).filter(s => s.id !== scheduleId);
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { schedule: newSchedule });
          toast("Schedule Removed");
        });
      };

      const allResources = course.resources || [];
      const currentResources = allResources.filter(r => (r.parentId || null) === currentFolderId);
      const breadcrumbs = buildBreadcrumbs(currentFolderId, allResources);

      return (
        <div className="animate-in fade-in slide-in-from-right-8 duration-500">
          <button onClick={() => { onBack(); setCurrentFolderId(null); }} className="text-[#D4AF37] text-[9px] md:text-[10px] font-bold uppercase tracking-[0.2em] mb-6 md:mb-10 hover:text-white transition-colors flex items-center gap-2 relative z-10">
             <ChevronLeft size={14} /> Back to Courses
          </button>
          
          <header className="mb-10 md:mb-16 relative rounded-[2.5rem] overflow-hidden glass-premium border border-[#D4AF37]/20 p-8 md:p-12 shadow-2xl">
            {course.coverImage && (
              <div className="absolute inset-0 z-0">
                <img src={course.coverImage} alt="Cover" className="w-full h-full object-cover opacity-20 mix-blend-overlay" />
                <div className="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/80 to-transparent"></div>
              </div>
            )}
            <div className="relative z-10 flex flex-col md:flex-row md:justify-between md:items-start gap-4">
              <div>
                <span className="bg-[#D4AF37] text-black px-3 py-1 rounded text-[8px] font-bold uppercase tracking-widest mb-4 inline-block">Management Mode</span>
                <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-4 text-white leading-tight">{course.title}</h1>
                <p className="text-gray-400 text-sm max-w-3xl leading-relaxed font-light">{course.desc}</p>
              </div>
              <button onClick={() => setShowEditCourseModal(true)} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-[0.2em] transition-colors flex items-center gap-2 shrink-0 backdrop-blur-md">
                <Edit3 size={14} /> Edit Details
              </button>
            </div>
          </header>
          
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
            
            {/* RESOURCES PANEL */}
            <div className="space-y-6 md:space-y-8">
              <div className="flex items-center justify-between">
                <h3 className="serif text-3xl text-white italic">Materials</h3>
                <div className="flex gap-3">
                   <button onClick={() => setShowFolderModal(true)} title="New Folder" className="w-10 h-10 glass text-gray-400 rounded-xl flex items-center justify-center hover:text-white transition-all border border-white/10 hover:border-[#D4AF37]/50">
                     <FolderPlus size={18} />
                   </button>
                   <button onClick={() => setShowResourceModal(true)} title="Upload Material" className="w-10 h-10 bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black rounded-xl flex items-center justify-center hover:shadow-[0_0_15px_rgba(212,175,55,0.4)] transition-all">
                     <Plus size={20} />
                   </button>
                </div>
              </div>

              <div className="flex items-center gap-2 text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold bg-black/40 p-4 rounded-xl border border-white/5 backdrop-blur-md overflow-x-auto custom-scrollbar">
                <button onClick={() => setCurrentFolderId(null)} className="hover:text-white transition-colors flex items-center gap-2 shrink-0">
                  <FolderOpen size={14}/> Root
                </button>
                {breadcrumbs.map((f, i) => (
                  <React.Fragment key={f.id}>
                    <ChevronRight size={12} className="text-[#D4AF37]/50 shrink-0" />
                    <button onClick={() => setCurrentFolderId(f.id)} className={`hover:text-white transition-colors truncate max-w-[100px] md:max-w-[200px] shrink-0 ${i === breadcrumbs.length-1 ? 'text-[#D4AF37]' : ''}`}>
                      {f.title}
                    </button>
                  </React.Fragment>
                ))}
              </div>

              <div className="space-y-4">
                {currentResources.length === 0 ? (
                  <div className="glass-premium rounded-[2rem] p-10 text-center text-gray-500 text-[10px] font-bold tracking-[0.2em] uppercase border border-white/5">Empty Section</div>
                ) : (
                  currentResources.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0)).map(r => (
                    <div key={r.id} onClick={() => r.isFolder ? setCurrentFolderId(r.id) : setPreviewResource(r)} className="glass p-5 rounded-2xl flex items-center justify-between group cursor-pointer hover-lift border border-white/5 hover:border-[#D4AF37]/30">
                      <div className="flex items-center gap-5 pr-2 overflow-hidden relative z-10">
                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 border border-white/10 shadow-inner ${r.isFolder ? 'bg-gradient-to-br from-[#D4AF37]/20 to-black text-[#D4AF37]' : 'bg-gradient-to-br from-gray-800 to-black text-gray-400 group-hover:text-white'}`}>
                           {r.isFolder ? <Folder size={20} className="fill-[#D4AF37]/20"/> : 
                            r.type === 'video' ? <PlayCircle size={20}/> : 
                            r.type === 'youtube' ? <PlayCircle size={20}/> : 
                            r.type === 'image' || r.type === 'collage' ? <ImageIcon size={20}/> : 
                            r.type === 'link' ? <LinkIcon size={20}/> : 
                            <FileText size={20}/>}
                        </div>
                        <div className="truncate">
                          <h4 className="text-white text-sm font-medium tracking-wide mb-1 truncate">{r.title}</h4>
                          <span className="text-[#D4AF37] opacity-80 text-[8px] uppercase tracking-widest font-bold">{r.isFolder ? 'Folder' : r.type}</span>
                        </div>
                      </div>
                      <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeResource(r.id); }} className="text-gray-600 hover:text-red-400 p-3 rounded-xl hover:bg-red-500/10 transition-colors shrink-0"><Trash2 size={16} /></button>
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* SCHEDULE PANEL */}
            <div className="space-y-6 md:space-y-8">
              <div className="flex items-center justify-between">
                <h3 className="serif text-3xl text-white italic">Lecture Schedule</h3>
                <button onClick={() => setShowScheduleModal(true)} className="w-10 h-10 glass border border-white/10 text-gray-300 rounded-xl flex items-center justify-center hover:text-white hover:border-[#D4AF37]/50 transition-all"><Plus size={18} /></button>
              </div>
              <div className="space-y-4">
                {(!course.schedule || course.schedule.length === 0) ? (
                  <div className="glass-premium rounded-[2rem] p-10 text-center text-gray-500 text-[10px] font-bold tracking-[0.2em] uppercase border border-white/5">No schedule created.</div>
                ) : (
                  course.schedule.sort((a,b) => new Date(a.date) - new Date(b.date)).map((s, idx) => (
                    <div key={s.id} className="glass p-6 border-l-[4px] border-l-[#D4AF37] rounded-2xl hover-lift">
                      <div className="flex justify-between items-start mb-3">
                        <div>
                          <p className="text-[#D4AF37] text-[9px] uppercase tracking-widest font-bold mb-2">Lecture {idx + 1} • {s.date}</p>
                          <h4 className="serif text-2xl text-white">{s.title}</h4>
                        </div>
                        <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeSchedule(s.id); }} className="text-gray-600 hover:text-red-400 p-2 rounded-lg hover:bg-red-500/10 transition-colors shrink-0"><Trash2 size={16} /></button>
                      </div>
                      <p className="text-gray-400 text-xs md:text-sm leading-relaxed font-light">{s.description}</p>
                    </div>
                  ))
                )}
              </div>
            </div>

          </div>
          
          {showResourceModal && <ResourceCreatorModal courseId={course.id} parentId={currentFolderId} onClose={() => setShowResourceModal(false)} />}
          {showFolderModal && <CreateFolderModal courseId={course.id} parentId={currentFolderId} courseResources={course.resources} onClose={() => setShowFolderModal(false)} />}
          {showScheduleModal && <ScheduleCreatorModal courseId={course.id} onClose={() => setShowScheduleModal(false)} />}
          {showEditCourseModal && <EditCourseModal course={course} onClose={() => setShowEditCourseModal(false)} />}
          {previewResource && <ResourcePreviewer resource={previewResource} onClose={() => setPreviewResource(null)} />}
        </div>
      );
    }
    
    function EditCourseModal({ course, onClose }) {
      const handleEditSubmit = async (e) => {
        e.preventDefault();
        const form = e.target;
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), {
            title: form.title.value,
            desc: form.desc.value,
            coverImage: form.coverImage.value
          });
          toast("Course Updated Successfully");
          onClose();
        } catch(err) { toast("Error updating course"); }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#050505]/90 backdrop-blur-md animate-in fade-in">
          <div className="glass-premium p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] w-full max-w-xl border border-[#D4AF37]/30 shadow-2xl relative">
            <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-500 hover:text-white text-xl md:text-2xl font-light">&times;</button>
            <h2 className="serif text-3xl md:text-4xl mb-1 md:mb-2 text-white italic">Edit Course</h2>
            <p className="text-[#D4AF37] text-[9px] md:text-[10px] uppercase tracking-widest font-bold mb-6 md:mb-10">Update Course Details</p>
            <form onSubmit={handleEditSubmit} className="space-y-4 md:space-y-6">
              <div><input name="title" defaultValue={course.title} type="text" placeholder="COURSE TITLE" required className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl md:rounded-2xl text-[10px] md:text-[12px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" /></div>
              <div><input name="coverImage" defaultValue={course.coverImage} type="url" placeholder="COVER IMAGE URL (OPTIONAL)" className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl md:rounded-2xl text-[10px] md:text-[12px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" /></div>
              <div><textarea name="desc" defaultValue={course.desc} placeholder="COURSE DESCRIPTION" required rows={4} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl md:rounded-2xl text-xs md:text-sm outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600 resize-none font-light leading-relaxed custom-scrollbar" /></div>
              <div className="flex gap-3 md:gap-4 pt-2 md:pt-4">
                <button type="button" onClick={onClose} className="flex-1 py-4 md:py-5 border border-white/10 rounded-xl md:rounded-2xl text-[9px] md:text-[10px] uppercase tracking-[0.2em] font-bold text-gray-400 hover:text-white transition-colors">Cancel</button>
                <button type="submit" className="flex-1 bg-[#D4AF37] text-black rounded-xl md:rounded-2xl text-[9px] md:text-[10px] uppercase tracking-[0.2em] font-bold hover:bg-[#F9E29D] transition-colors shadow-lg">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function ScheduleCreatorModal({ courseId, onClose }) {
      const handleSubmit = async (e) => {
        e.preventDefault();
        const form = e.target;
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', courseId), {
            schedule: arrayUnion({ id: crypto.randomUUID(), date: form.date.value, title: form.title.value, description: form.desc.value })
          });
          toast("Lecture Scheduled");
          onClose();
        } catch(err) { toast("Error scheduling lecture"); }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#050505]/90 backdrop-blur-md animate-in fade-in">
          <div className="glass-premium p-8 md:p-12 w-full max-w-xl rounded-[2.5rem] relative border border-[#D4AF37]/30 shadow-2xl">
            <button onClick={onClose} className="absolute top-8 right-8 text-gray-500 hover:text-white"><X size={24}/></button>
            <h2 className="serif text-4xl mb-2 text-white italic">Schedule Lecture</h2>
            <p className="text-[#D4AF37] text-[9px] uppercase tracking-widest font-bold mb-8">Add to Course Itinerary</p>
            <form onSubmit={handleSubmit} className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                 <div>
                   <input name="date" type="date" required className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                 </div>
                 <div>
                   <input name="title" type="text" placeholder="LECTURE TITLE" required className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-[10px] tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                 </div>
              </div>
              <div>
                <textarea name="desc" placeholder="BRIEF LECTURE DESCRIPTION..." required rows={3} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-xs outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
              </div>
              <div className="flex gap-4 pt-4">
                <button type="button" onClick={onClose} className="flex-1 py-4 border border-white/10 rounded-xl text-[9px] font-bold tracking-[0.2em] uppercase text-gray-400 hover:text-white transition-colors">Cancel</button>
                <button type="submit" className="flex-1 bg-[#D4AF37] text-black rounded-xl text-[9px] font-bold tracking-[0.2em] uppercase hover:bg-[#F9E29D] transition-colors shadow-lg">Schedule</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function UserProfile({ user, userData, setUserData }) {
      const [loading, setLoading] = useState(false);
      const [formData, setFormData] = useState({
        name: userData.name || '',
        phone: userData.phone || '',
        bio: userData.bio || '',
      });
      const [profilePic, setProfilePic] = useState(userData.profilePic || '');

      const handleChange = (e) => setFormData({...formData, [e.target.name]: e.target.value});

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        setLoading(true);
        try {
          const uniqueName = `${crypto.randomUUID()}_${file.name}`;
          const sRef = storageRef(storage, `artifacts/${appId}/public/data/profiles_${uniqueName}`);
          const uploadTask = uploadBytesResumable(sRef, file);
          
          uploadTask.on('state_changed', 
            null, 
            (error) => { toast("Upload failed"); setLoading(false); }, 
            async () => {
              const url = await getDownloadURL(uploadTask.snapshot.ref);
              setProfilePic(url);
              setLoading(false);
            }
          );
        } catch(err) {
          toast("Error uploading image");
          setLoading(false);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const updates = { ...formData, profilePic };
          await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), updates);
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), updates);
          setUserData({ ...userData, ...updates });
          toast("Profile Updated Successfully");
        } catch(err) {
          console.error(err);
          toast("Error updating profile");
        }
        setLoading(false);
      };

      return (
         <div className="animate-in fade-in duration-500 max-w-4xl mx-auto pb-12">
            <header className="mb-10 md:mb-12">
              <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-2 text-white">My <span className="gold-gradient-text italic">Profile</span></h1>
              <p className="text-gray-400 text-sm font-light">Manage your personal information.</p>
            </header>

            <div className="glass-premium p-8 md:p-12 rounded-[2rem] md:rounded-[3rem] border border-[#D4AF37]/20 shadow-2xl">
               <form onSubmit={handleSubmit} className="space-y-8 md:space-y-10">
                  <div className="flex items-center gap-6 md:gap-10 pb-10 border-b border-white/5">
                     <div className="relative group cursor-pointer">
                       <div className="w-24 h-24 md:w-32 md:h-32 rounded-full overflow-hidden bg-gradient-to-br from-gray-800 to-black border border-white/10 flex items-center justify-center shrink-0 shadow-inner">
                          {profilePic ? <img src={profilePic} className="w-full h-full object-cover" /> : <UserIcon size={40} className="text-gray-600" />}
                       </div>
                       <label className="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer backdrop-blur-sm">
                         <ImagePlus size={24} className="text-white" />
                         <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} disabled={loading} />
                       </label>
                     </div>
                     <div>
                       <h3 className="serif text-3xl text-white mb-2 italic">Portrait</h3>
                       <p className="text-gray-500 text-xs font-light leading-relaxed">Max size: 2MB. 1:1 ratio recommended.</p>
                       {loading && <p className="text-[#D4AF37] text-[9px] uppercase tracking-widest font-bold mt-3 animate-pulse">Processing...</p>}
                     </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                     <div>
                       <label className="text-[9px] text-gray-500 uppercase tracking-widest font-bold mb-3 block">Full Name</label>
                       <input name="name" value={formData.name} onChange={handleChange} required disabled={loading} className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-sm outline-none focus:border-[#D4AF37] transition-all text-white" />
                     </div>
                     <div>
                       <label className="text-[9px] text-gray-500 uppercase tracking-widest font-bold mb-3 block">Email Address (Read-Only)</label>
                       <input value={userData.email} disabled className="w-full bg-black/30 border border-white/5 p-4 md:p-5 rounded-xl text-sm text-gray-600 cursor-not-allowed" />
                     </div>
                     <div className="md:col-span-2">
                       <label className="text-[9px] text-gray-500 uppercase tracking-widest font-bold mb-3 block">Phone Number</label>
                       <input name="phone" value={formData.phone} onChange={handleChange} disabled={loading} placeholder="+1 234 567 8900" className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-sm outline-none focus:border-[#D4AF37] transition-all text-white" />
                     </div>
                  </div>

                  <div>
                     <label className="text-[9px] text-gray-500 uppercase tracking-widest font-bold mb-3 block">Biography / Background</label>
                     <textarea name="bio" value={formData.bio} onChange={handleChange} disabled={loading} rows="5" placeholder="Tell us about yourself..." className="w-full bg-black/50 border border-white/10 p-4 md:p-5 rounded-xl text-sm outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar"></textarea>
                  </div>

                  <div className="pt-6 flex justify-end">
                     <button type="submit" disabled={loading} className="bg-gradient-to-r from-[#D4AF37] to-[#B38D22] text-black px-10 py-4 md:py-5 rounded-xl text-[10px] font-bold uppercase tracking-[0.2em] hover:shadow-[0_0_20px_rgba(212,175,55,0.4)] transition-all hover:scale-105 disabled:opacity-50">
                       {loading ? 'Saving...' : 'Save Profile'}
                     </button>
                  </div>
               </form>
            </div>
         </div>
      );
    }

    // --- RENDER MOUNT ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
