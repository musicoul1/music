    function LibraryAdminManager({ allLibrary, onOpenSection, onBackToBrowse, showConfirm }) {
        const [showModal, setShowModal] = useState(false);
        const [editSectionInfo, setEditSectionInfo] = useState(null);

        const handleSaveSection = async (e) => {
           e.preventDefault();
           const form = e.target;
           
           const dataToSave = {
              title: form.title.value,
              description: form.description.value,
              thumbnailUrl: form.thumbnailUrl.value || "",
              coverUrl: form.coverUrl.value || "",
              isFeatured: form.isFeatured?.checked || false
           };

           try {
             if (dataToSave.isFeatured) {
                const others = allLibrary.filter(s => s.isFeatured && s.id !== editSectionInfo?.id);
                for (const s of others) {
                   await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'library', s.id), { isFeatured: false });
                }
             }

             if (editSectionInfo) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'library', editSectionInfo.id), dataToSave);
                toast("Section Updated");
             } else {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'library', crypto.randomUUID()), {
                  ...dataToSave,
                  resources: [],
                  createdAt: new Date().toISOString()
                });
                toast("Library Section Created");
             }
             setShowModal(false);
             setEditSectionInfo(null);
           } catch(err) { toast("Error saving section"); }
        };

        const deleteSection = async (id, e) => {
           e.stopPropagation();
           showConfirm("Delete Section", "Permanently delete this entire library section and all assets inside it?", async () => {
             try {
               await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'library', id));
               toast("Section Deleted");
             } catch(err) { toast("Error deleting section"); }
           });
        };

        const openEditModal = (section, e) => {
           e.stopPropagation();
           setEditSectionInfo(section);
           setShowModal(true);
        };

        const closeModals = () => {
           setShowModal(false);
           setEditSectionInfo(null);
        }

        return (
           <div className="animate-in fade-in slide-in-from-right-8 duration-500 w-full min-h-full px-5 sm:px-8 md:px-12 py-8 bg-[#020813]">
               <button onClick={onBackToBrowse} className="text-[#D4AF37] text-sm font-bold uppercase tracking-widest mb-8 hover:text-white transition-colors flex items-center gap-2 bg-black/40 px-5 py-3 rounded-xl border border-[#D4AF37]/20 w-fit">
                  <ChevronLeft size={20} /> Back to Browse
               </button>
               
               <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-12">
                  <div>
                      <h1 className="serif text-4xl sm:text-5xl lg:text-6xl mb-3 text-white">Library <span className="gold-gradient-text italic">Manager</span></h1>
                      <p className="text-blue-200/60 text-sm font-light">Create and organize massive content rows & Netflix-style detail pages.</p>
                  </div>
                  <button onClick={() => setShowModal(true)} className="bg-gradient-to-br from-blue-900 to-[#0A1526] border border-blue-500/50 text-[#D4AF37] px-6 md:px-8 py-4 md:py-5 rounded-xl text-sm font-bold uppercase tracking-widest shadow-[0_10px_30px_rgba(30,58,138,0.4)] flex items-center justify-center gap-3 shrink-0 hover:-translate-y-1 transition-transform active:scale-95">
                      <Plus size={22} /> New Section
                  </button>
               </header>

               <div className="space-y-5 max-w-6xl pb-12">
                  {allLibrary.sort((a,b) => (a.createdAt > b.createdAt ? -1 : 1)).map(section => (
                     <div key={section.id} onClick={() => onOpenSection(section.id)} className="bg-[#0A1526]/50 p-5 md:p-8 rounded-2xl md:rounded-[2rem] flex flex-col md:flex-row md:items-center justify-between border border-blue-900/40 hover:border-blue-500/50 cursor-pointer group hover-lift shadow-[0_8px_25px_rgba(0,0,0,0.4)] gap-6 transition-all">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-5 overflow-hidden w-full">
                            <div className="w-full sm:w-40 md:w-48 aspect-video bg-[#020813] rounded-xl border border-blue-800/30 overflow-hidden shrink-0 shadow-inner relative">
                               <img src={section.coverUrl || section.thumbnailUrl || 'Assets/Images/Logo.png'} className={`w-full h-full object-cover ${!section.coverUrl && !section.thumbnailUrl ? 'opacity-30 p-4 object-contain' : ''}`} />
                            </div>
                            <div className="flex-1 min-w-0">
                               <div className="flex flex-wrap items-center gap-3 mb-2">
                                  <h3 className="serif text-2xl md:text-3xl text-white group-hover:text-[#D4AF37] transition-colors break-words line-clamp-1">{section.title}</h3>
                                  {section.isFeatured && <span className="bg-blue-900/50 border border-blue-400 text-blue-300 px-3 py-1 rounded-lg text-[10px] font-bold tracking-widest uppercase">Featured Hero</span>}
                               </div>
                               <p className="text-blue-100/50 text-sm font-light line-clamp-2 mb-3 leading-relaxed">{section.description}</p>
                               <p className="text-blue-400/80 text-xs font-bold uppercase tracking-widest">{section.resources?.length || 0} Assets Inside</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3 shrink-0 w-full md:w-auto justify-end">
                            <button onClick={(e) => openEditModal(section, e)} className="px-5 py-4 bg-[#020813]/60 border border-blue-800/40 rounded-xl text-xs font-bold uppercase tracking-widest text-blue-300 hover:text-[#D4AF37] hover:border-[#D4AF37]/50 transition-colors shadow-lg">
                               Edit Details
                            </button>
                            <button onClick={(e) => deleteSection(section.id, e)} className="w-12 h-12 md:w-14 md:h-14 bg-[#020813]/60 border border-blue-800/40 rounded-xl flex items-center justify-center text-blue-300/60 hover:text-red-400 hover:border-red-500/30 hover:bg-red-500/10 transition-all shadow-lg">
                               <Trash2 size={22} />
                            </button>
                            <ChevronRight size={28} className="text-blue-800 group-hover:text-blue-400 ml-2 transition-colors hidden md:block" />
                        </div>
                     </div>
                  ))}
                  {allLibrary.length === 0 && <div className="p-12 text-center bg-[#0A1526]/30 rounded-3xl border border-blue-900/30 text-blue-200/40 text-sm font-bold uppercase tracking-widest">No sections constructed yet.</div>}
               </div>

               {showModal && (
                  <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
                    <div className="glass-premium p-6 sm:p-8 md:p-12 rounded-[2rem] md:rounded-[3rem] w-full max-w-2xl border border-[#D4AF37]/30 shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                      <button onClick={closeModals} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-500 hover:text-white p-2 bg-black/40 rounded-full border border-white/10"><X size={24}/></button>
                      <h2 className="serif text-3xl sm:text-4xl md:text-5xl mb-3 text-white italic">{editSectionInfo ? 'Edit Section' : 'Create Section'}</h2>
                      <p className="text-[#D4AF37] text-xs uppercase tracking-widest font-bold mb-8">Define the Netflix-style Details</p>
                      
                      <form onSubmit={handleSaveSection} className="space-y-6">
                        <div>
                           <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Section Title</label>
                           <input name="title" type="text" defaultValue={editSectionInfo?.title} required className="w-full bg-black/60 border border-white/10 p-4 sm:p-5 rounded-xl md:rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white" />
                        </div>
                        <div>
                           <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Description</label>
                           <textarea name="description" defaultValue={editSectionInfo?.description} rows={4} className="w-full bg-black/60 border border-white/10 p-4 sm:p-5 rounded-xl md:rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white font-light resize-none custom-scrollbar"></textarea>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                           <div>
                              <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Hero Cover Image URL</label>
                              <input name="coverUrl" type="url" defaultValue={editSectionInfo?.coverUrl} className="w-full bg-black/60 border border-white/10 p-4 sm:p-5 rounded-xl md:rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white" />
                           </div>
                           <div>
                              <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2 block">Thumbnail Poster URL</label>
                              <input name="thumbnailUrl" type="url" defaultValue={editSectionInfo?.thumbnailUrl} className="w-full bg-black/60 border border-white/10 p-4 sm:p-5 rounded-xl md:rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white" />
                           </div>
                        </div>

                        <div className="pt-6 mt-4 border-t border-blue-900/40">
                           <label className="flex items-center gap-4 cursor-pointer group">
                              <div className="relative">
                                 <input type="checkbox" name="isFeatured" defaultChecked={editSectionInfo?.isFeatured} className="sr-only peer" />
                                 <div className="w-12 h-7 bg-[#0A1526] border border-blue-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-500 after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-500 shadow-inner"></div>
                              </div>
                              <span className="text-sm md:text-base text-blue-300 font-bold tracking-widest uppercase flex items-center gap-2 group-hover:text-white transition-colors">
                                <Crown size={20} /> Set as Featured Hero
                              </span>
                           </label>
                           <p className="text-xs text-blue-200/50 mt-3 font-bold tracking-widest uppercase ml-16">Displays this section at the very top of M-Library.</p>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4 pt-6">
                          <button type="button" onClick={closeModals} className="w-full sm:flex-1 py-4 md:py-5 border border-white/20 rounded-xl md:rounded-2xl text-xs md:text-sm font-bold tracking-widest uppercase text-gray-300 hover:text-white transition-colors bg-black/40">Cancel</button>
                          <button type="submit" className="w-full sm:flex-1 bg-[#D4AF37] text-black py-4 md:py-5 rounded-xl md:rounded-2xl text-xs md:text-sm font-bold tracking-widest uppercase hover:bg-[#F9E29D] transition-colors shadow-xl">
                             {editSectionInfo ? 'Save Details' : 'Create Section'}
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
               )}
           </div>
        );
    }

    function LibrarySectionEditor({ section, onBack, showConfirm }) {
      const [currentFolderId, setCurrentFolderId] = useState(null);
      const [showResourceModal, setShowResourceModal] = useState(false);
      const [showFolderModal, setShowFolderModal] = useState(false);
      
      const openFolder = (id) => {
          window.history.pushState({ internalNav: true }, "");
          setCurrentFolderId(id);
      };

      const removeResource = async (resId) => {
        showConfirm("Remove Material", "Remove this asset permanently?", async () => {
          const allRes = section.resources || [];
          let toDelete = [resId];
          const resource = allRes.find(r => r.id === resId);
          if(resource?.isFolder) toDelete = toDelete.concat(getAllChildrenIds(resId, allRes));
          const newResources = allRes.filter(r => !toDelete.includes(r.id));
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'library', section.id), { resources: newResources });
          toast("Asset Removed");
        });
      };

      const allResources = section.resources || [];
      const currentResources = allResources.filter(r => (r.parentId || null) === currentFolderId);
      const breadcrumbs = buildBreadcrumbs(currentFolderId, allResources);

      return (
         <div className="animate-in fade-in slide-in-from-right-8 duration-500 w-full min-h-full px-5 sm:px-8 md:px-12 py-8 bg-[#020813]">
            <button onClick={onBack} className="text-[#D4AF37] text-sm font-bold uppercase tracking-widest mb-8 hover:text-white transition-colors flex items-center gap-2 bg-black/40 px-5 py-3 rounded-xl border border-[#D4AF37]/20 w-fit">
               <ChevronLeft size={20} /> Back to Sections
            </button>

            <header className="mb-8 md:mb-12 relative rounded-[2rem] md:rounded-[3rem] overflow-hidden bg-[#0A1526]/40 border border-blue-800/40 p-8 md:p-14 shadow-[0_10px_40px_rgba(30,58,138,0.2)] flex flex-col md:flex-row gap-8 items-center md:items-start backdrop-blur-md">
              {(section.coverUrl || section.thumbnailUrl) && (
                  <div className="absolute inset-0 z-0">
                    <img src={section.coverUrl || section.thumbnailUrl} className="w-full h-full object-cover opacity-20 mix-blend-overlay"/>
                    <div className="absolute inset-0 bg-gradient-to-r from-[#020813] via-[#020813]/80 to-[#020813]"></div>
                  </div>
              )}
              <div className="relative z-10 flex-1 text-center md:text-left">
                <span className="bg-[#D4AF37] text-black px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest mb-5 inline-block shadow-md">Section Editor</span>
                <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-4 text-white leading-tight break-words">{section.title}</h1>
                <p className="text-blue-100/60 text-sm md:text-base font-light mb-6 line-clamp-2 max-w-3xl leading-relaxed">{section.description}</p>
                <p className="text-[#D4AF37] text-xs font-bold uppercase tracking-widest bg-black/40 w-fit mx-auto md:mx-0 px-4 py-2 rounded-lg border border-[#D4AF37]/20">{allResources.length} Total Assets Inside</p>
              </div>
            </header>

            <div className="space-y-8 md:space-y-10 max-w-6xl pb-12">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6">
                <h3 className="serif text-3xl md:text-4xl text-white italic">Assets Directory</h3>
                <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                   <button onClick={() => setShowFolderModal(true)} className="w-full sm:w-auto px-6 py-4 bg-[#0A1526]/80 text-blue-300 rounded-xl md:rounded-2xl flex items-center justify-center gap-3 hover:text-[#D4AF37] hover:border-[#D4AF37]/50 transition-all text-xs font-bold uppercase tracking-widest border border-blue-800/50 shadow-lg">
                     <FolderPlus size={20} /> New Folder
                   </button>
                   <button onClick={() => setShowResourceModal(true)} className="w-full sm:w-auto px-6 py-4 bg-gradient-to-br from-blue-900 to-[#0A1526] text-[#D4AF37] rounded-xl md:rounded-2xl flex items-center justify-center gap-3 hover:shadow-[0_10px_25px_rgba(30,58,138,0.5)] transition-all text-xs font-bold uppercase tracking-widest border border-blue-500/50 shadow-xl">
                     <Plus size={20} /> Upload Asset
                   </button>
                </div>
              </div>

              <div className="flex items-center gap-3 text-xs text-blue-400/80 uppercase tracking-widest font-bold bg-[#0A1526]/60 p-5 rounded-2xl border border-blue-900/50 overflow-x-auto custom-scrollbar shadow-inner">
                <button onClick={() => setCurrentFolderId(null)} className="hover:text-white transition-colors flex items-center gap-2 shrink-0 bg-black/40 px-3 py-1.5 rounded-lg">
                  <FolderOpen size={18}/> Root
                </button>
                {breadcrumbs.map((f, i) => (
                  <React.Fragment key={f.id}>
                    <ChevronRight size={18} className="text-blue-800 shrink-0" />
                    <button onClick={() => openFolder(f.id)} className={`hover:text-white transition-colors break-words line-clamp-1 max-w-[150px] sm:max-w-[250px] shrink-0 ${i === breadcrumbs.length-1 ? 'text-[#D4AF37] bg-black/40 px-3 py-1.5 rounded-lg border border-[#D4AF37]/20' : ''}`}>
                      {f.title}
                    </button>
                  </React.Fragment>
                ))}
              </div>

              <div className="space-y-4">
                {currentResources.length === 0 ? (
                  <div className="bg-[#0A1526]/30 rounded-[2rem] p-12 md:p-20 text-center text-blue-200/40 text-sm md:text-base font-bold tracking-[0.2em] uppercase border border-blue-900/30">Empty Location</div>
                ) : (
                  currentResources.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0)).map(r => (
                    <div key={r.id} onClick={() => r.isFolder ? openFolder(r.id) : null} className={`bg-[#0A1526]/50 p-5 md:p-6 rounded-2xl md:rounded-[1.5rem] flex flex-col sm:flex-row items-stretch sm:items-center justify-between group hover-lift border border-blue-900/40 hover:border-blue-500/50 transition-all shadow-md ${r.isFolder ? 'cursor-pointer' : ''}`}>
                      <div className="flex items-center gap-5 pr-4 overflow-hidden w-full mb-4 sm:mb-0">
                        {r.thumbnailUrl ? (
                           <img src={r.thumbnailUrl} className="w-20 h-14 md:w-24 md:h-16 object-cover rounded-xl bg-[#020813] shrink-0 border border-blue-800/30" />
                        ) : (
                           <div className={`w-14 h-14 md:w-16 md:h-16 rounded-xl flex items-center justify-center shrink-0 border border-blue-800/40 shadow-inner ${r.isFolder ? 'bg-gradient-to-br from-[#0A1526] to-[#020813] text-[#D4AF37]' : 'bg-gradient-to-br from-blue-900/40 to-[#020813] text-blue-400 group-hover:text-white transition-colors'}`}>
                             {r.isFolder ? <Folder size={26} className="fill-[#D4AF37]/20"/> : <FileText size={26}/>}
                           </div>
                        )}
                        <div className="flex-1 min-w-0">
                          <h4 className="text-white text-base md:text-lg font-bold tracking-wide mb-2 break-words line-clamp-2 leading-tight">{r.title}</h4>
                          <div className="flex items-center gap-3 flex-wrap">
                             <span className="text-blue-300/80 text-[10px] md:text-xs uppercase tracking-widest font-bold bg-blue-900/30 px-3 py-1 rounded-md">{r.isFolder ? 'Folder' : r.type}</span>
                             {r.isPremium && <span className="bg-[#D4AF37]/20 border border-[#D4AF37]/40 text-[#D4AF37] px-3 py-1 rounded-md text-[10px] md:text-xs font-bold uppercase tracking-widest flex items-center gap-1.5"><Crown size={14}/> Premium</span>}
                          </div>
                        </div>
                      </div>
                      <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeResource(r.id); }} className="w-full sm:w-auto text-blue-400/60 hover:text-red-400 px-5 py-4 sm:p-4 rounded-xl hover:bg-red-500/10 transition-colors bg-[#020813]/80 border border-blue-900/40 flex items-center justify-center shadow-inner group-hover:border-red-500/30">
                         <Trash2 size={20} className="sm:mr-0 mr-3" /> <span className="sm:hidden text-sm font-bold uppercase tracking-widest">Delete Asset</span>
                      </button>
                    </div>
                  ))
                )}
              </div>
            </div>

            {showResourceModal && <ResourceCreatorModal docId={section.id} parentId={currentFolderId} collectionName="library" onClose={() => setShowResourceModal(false)} />}
            {showFolderModal && <CreateFolderModal docId={section.id} parentId={currentFolderId} collectionName="library" onClose={() => setShowFolderModal(false)} />}
         </div>
      );
    }

    // ==========================================
    // ADMIN USERS 
    // ==========================================
    function AdminUsers({ users, courses, showConfirm }) {
      const [searchTerm, setSearchTerm] = useState('');
      const [roleFilter, setRoleFilter] = useState('all');

      const toggleRole = async (userId, userRoles, targetRole) => {
        try {
          const targetUser = users.find(u => u.id === userId);
          if (targetRole === 'admin' && targetUser?.email !== 'chandrashekharkolhe7@gmail.com') {
             toast("Admin role restricted to chandrashekharkolhe7@gmail.com");
             return;
          }

          let newRoles = [...(userRoles || [])];
          if (newRoles.includes(targetRole)) newRoles = newRoles.filter(r => r !== targetRole);
          else newRoles.push(targetRole);
          if (newRoles.length === 0) newRoles = ['user']; 

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { roles: newRoles });
          await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), { roles: newRoles });
          toast("Role Updated");
        } catch(err) { toast("Error updating role"); }
      };

      const handleEnrollment = async (userId, userRoles, userCourses, courseId) => {
        try {
          let updatedCourses = [...(userCourses || [])];
          if (updatedCourses.includes(courseId)) updatedCourses = updatedCourses.filter(id => id !== courseId);
          else updatedCourses.push(courseId);

          let newRoles = [...(userRoles || [])];
          if (updatedCourses.length > 0 && newRoles.length === 1 && newRoles[0] === 'user') {
             newRoles = ['student'];
          }

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { enrolledCourses: updatedCourses, roles: newRoles });
          await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), { enrolledCourses: updatedCourses, roles: newRoles });
          toast("Enrollment Updated");
        } catch(err) { toast("Error updating enrollment"); }
      };

      const removeUser = async (userId) => {
        showConfirm("Delete Profile", "Permanently delete this user profile? This action cannot be undone.", async () => {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId));
            toast("User Profile Deleted");
          } catch(err) { toast("Error deleting user"); }
        });
      };

      const filteredUsers = users.filter(u => {
          const matchesSearch = u.name.toLowerCase().includes(searchTerm.toLowerCase()) || u.email.toLowerCase().includes(searchTerm.toLowerCase());
          const matchesRole = roleFilter === 'all' || u.roles?.includes(roleFilter);
          return matchesSearch && matchesRole;
      });

      return (
        <div className="animate-in fade-in duration-500">
          <header className="mb-8 md:mb-12">
            <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-3 text-white">User <span className="gold-gradient-text italic">Directory</span></h1>
            <p className="text-gray-300 text-sm font-light">Manage accounts, roles, and course placements.</p>
          </header>

          {/* Search and Filters */}
          <div className="flex flex-col md:flex-row gap-4 mb-10">
             <div className="relative flex-1">
               <Search size={22} className="absolute left-6 top-1/2 -translate-y-1/2 text-gray-500" />
               <input type="text" placeholder="SEARCH BY NAME OR EMAIL..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-black/60 border border-white/10 p-5 sm:p-6 pl-14 sm:pl-16 rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-600 shadow-inner" />
             </div>
             <div className="relative md:w-72 shrink-0">
               <Filter size={22} className="absolute left-6 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none" />
               <select value={roleFilter} onChange={e => setRoleFilter(e.target.value)} className="w-full bg-black/60 border border-white/10 p-5 sm:p-6 pl-14 sm:pl-16 pr-12 rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-[#D4AF37] appearance-none cursor-pointer shadow-inner h-full">
                  <option value="all">All Roles</option>
                  <option value="user">User</option>
                  <option value="student">Student</option>
                  <option value="teacher">Teacher</option>
                  <option value="admin">Admin</option>
               </select>
               <ChevronDown size={20} className="absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"/>
             </div>
          </div>

          <div className="space-y-6 pb-16">
            {filteredUsers.length === 0 ? (

                       <div className="absolute right-0 top-full mt-3 w-full sm:w-80 glass-premium p-6 rounded-2xl opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-all z-20 max-h-72 overflow-y-auto shadow-[0_15px_40px_rgba(0,0,0,0.8)] border border-[#D4AF37]/40 custom-scrollbar">

            <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-400 hover:text-white bg-black/40 p-2 rounded-full border border-white/10"><X size={24}/></button>

                <button type="submit" className="w-full sm:flex-1 bg-[#D4AF37] text-black rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase hover:bg-[#F9E29D] transition-colors shadow-[0_10px_20px_rgba(212,175,55,0.3)] hover:-translate-y-1">Create</button>

    function ResourceCreatorModal({ docId, parentId, onClose, collectionName = 'courses', defaultType = 'pdf' }) {
      const [type, setType] = useState(defaultType);
      const [inputMode, setInputMode] = useState('upload');
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);

      const [singleFile, setSingleFile] = useState(null);
      const [multiFiles, setMultiFiles] = useState([]);
      const [thumbnailFile, setThumbnailFile] = useState(null);

      const allowsUpload = ['pdf', 'video', 'image', 'collage'].includes(type);

      useEffect(() => {
        if (!allowsUpload) setInputMode('url');
        else setInputMode('upload');
      }, [type, allowsUpload]);

      const uploadToStorage = (file, pathPrefix) => {
        return new Promise(async (resolve, reject) => {
          let fileToUpload = file;
          
          if (file.type.startsWith('image/')) {
            try {
              fileToUpload = await new Promise((res, rej) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                  const img = new Image();
                  img.src = event.target.result;
                  img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1920;
                    let { width, height } = img;
                    if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                    else if (height > MAX) { width *= MAX / height; height = MAX; }
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                      if(blob) {
                         const compressedFile = new File([blob], file.name || "image.jpg", { type: 'image/jpeg' });
                         res(compressedFile);
                      } else rej(new Error("Image compression failed"));
                    }, 'image/jpeg', 0.8);
                  };
                  img.onerror = () => rej(new Error("Failed to load image logic"));
                };
                reader.onerror = () => rej(new Error("Failed to read original image file"));
              });
            } catch (e) {
              fileToUpload = file;
            }
          }

          try {
            const uniqueName = `${crypto.randomUUID()}_${fileToUpload.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
            const sRef = storageRef(storage, `artifacts/${appId}/public/data/${pathPrefix}_${uniqueName}`);
            const uploadTask = uploadBytesResumable(sRef, fileToUpload);

            uploadTask.on('state_changed', 
              (snapshot) => setProgress(Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100)), 
              (error) => reject(new Error("Storage Error.")), 
              async () => {
                const downloadUrl = await getDownloadURL(uploadTask.snapshot.ref);
                resolve(downloadUrl);
              }
            );
          } catch (err) { reject(new Error("Upload logic error.")); }
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        setProgress(0);
        const form = e.target;
        const isPremium = form.isPremium?.checked || false;
        
        try {
          let finalUrl = "";
          let finalThumbnailUrl = null;
          let finalDesc = form.desc ? form.desc.value : "";

          if (inputMode === 'upload' && allowsUpload) {
            if (type === 'collage') {
              if (multiFiles.length === 0) throw new Error("No files selected.");
              const urls = await Promise.all(Array.from(multiFiles).map(f => uploadToStorage(f, 'collages')));
              finalUrl = urls.join(',');
            } else {
              if (!singleFile) throw new Error("No file selected.");
              finalUrl = await uploadToStorage(singleFile, type);
              if ((type === 'video' || type === 'image') && thumbnailFile) {
                finalThumbnailUrl = await uploadToStorage(thumbnailFile, 'thumbnails');
              }
            }
          } else {
            finalUrl = form.url.value;
            if (type === 'youtube') {
               if (thumbnailFile) {
                 finalThumbnailUrl = await uploadToStorage(thumbnailFile, 'thumbnails');
               } else {
                 const yId = extractYoutubeId(finalUrl);
                 if (yId) finalThumbnailUrl = `https://img.youtube.com/vi/${yId}/maxresdefault.jpg`;
               }
            } else if (thumbnailFile) {
               finalThumbnailUrl = await uploadToStorage(thumbnailFile, 'thumbnails');
            }
          }

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId), {
            resources: arrayUnion({ 
              id: crypto.randomUUID(),
              type, 
              url: finalUrl, 
              thumbnailUrl: finalThumbnailUrl,
              title: form.title.value,
              description: finalDesc,
              isPremium: isPremium,
              parentId: parentId || null, 
              createdAt: new Date().toISOString()
            })
          });

          toast("Asset Published Successfully");
          onClose();
        } catch(err) {
          toast(err.message || "Error publishing asset");
        } finally {
          setUploading(false);
        }
      };

      const getAcceptType = () => {
        if (type === 'pdf') return 'application/pdf';
        if (type === 'video') return 'video/*';
        if (type === 'image' || type === 'collage') return 'image/*';
        return '*/*';
      };

      return (
        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 sm:p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
          <div className="glass-premium p-6 sm:p-10 md:p-14 w-full max-w-3xl relative max-h-[85vh] sm:max-h-[90vh] overflow-y-auto custom-scrollbar rounded-[2rem] md:rounded-[3rem] border border-[#D4AF37]/30 shadow-2xl">
            {!uploading && <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-400 hover:text-white bg-black/40 p-2 rounded-full border border-white/10"><X size={24}/></button>}
            <h2 className="serif text-4xl md:text-5xl mb-3 text-white italic">Publish Asset</h2>
            <p className="text-[#D4AF37] text-xs uppercase tracking-widest font-bold mb-8">Add to Library or Course</p>
            
            <form onSubmit={handleSubmit} className="space-y-6 md:space-y-8">
              <div>
                <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-3 block">Asset Type</label>
                <div className="flex gap-3 overflow-x-auto pb-4 custom-scrollbar">
                  {['pdf', 'video', 'image', 'collage', 'youtube', 'text', 'link'].map(t => (
                    <button key={t} type="button" onClick={() => setType(t)} disabled={uploading} className={`px-5 sm:px-6 py-3 md:py-4 rounded-xl text-xs uppercase tracking-widest font-bold whitespace-nowrap transition-all border ${type === t ? 'bg-[#D4AF37]/10 text-[#D4AF37] border-[#D4AF37]/50 shadow-[0_0_20px_rgba(212,175,55,0.2)]' : 'bg-black/40 text-gray-400 border-white/10 hover:border-white/30 hover:text-gray-200'}`}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <input name="title" type="text" placeholder="ASSET TITLE" required disabled={uploading} className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-600" />
              </div>
              
              {allowsUpload && (
                <div className="flex bg-black/50 border border-white/10 rounded-xl p-2 w-fit">
                   <button type="button" disabled={uploading} onClick={() => setInputMode('upload')} className={`px-6 py-3 rounded-lg text-xs uppercase tracking-widest font-bold transition-all ${inputMode === 'upload' ? 'bg-[#D4AF37] text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Upload</button>
                   <button type="button" disabled={uploading} onClick={() => setInputMode('url')} className={`px-6 py-3 rounded-lg text-xs uppercase tracking-widest font-bold transition-all ${inputMode === 'url' ? 'bg-[#D4AF37] text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>URL</button>
                </div>
              )}
              
              <div className="glass border border-white/10 rounded-3xl p-6 md:p-10 shadow-inner">
                {type === 'text' && <div className="text-[#D4AF37] text-xs uppercase tracking-widest font-bold mb-6 bg-[#D4AF37]/10 p-5 rounded-xl border border-[#D4AF37]/20 flex items-center gap-3"><FileText size={20}/> Create a formatted text note.</div>}
                {type === 'link' && <div className="text-[#D4AF37] text-xs uppercase tracking-widest font-bold mb-6 bg-[#D4AF37]/10 p-5 rounded-xl border border-[#D4AF37]/20 flex items-center gap-3"><LinkIcon size={20}/> Add an external URL link.</div>}

                {inputMode === 'upload' && allowsUpload ? (
                  <div className="space-y-6">
                    <div>
                      <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-4 block">{type === 'collage' ? 'Select Multiple Files' : 'Select Source File'}</label>
                      <div className="relative border-2 border-dashed border-[#D4AF37]/40 rounded-[2rem] p-10 md:p-16 text-center hover:border-[#D4AF37] hover:bg-[#D4AF37]/5 transition-all bg-black/40 group">
                        <input type="file" accept={getAcceptType()} multiple={type === 'collage'} required disabled={uploading} onChange={(e) => type === 'collage' ? setMultiFiles(e.target.files) : setSingleFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                        <FileIcon size={48} className="mx-auto text-[#D4AF37] group-hover:scale-110 group-hover:text-[#F9E29D] mb-5 transition-transform opacity-80" />
                        <p className="text-[#D4AF37] text-sm md:text-base font-bold tracking-widest uppercase mb-3">Drag & Drop or Browse</p>
                        <p className="text-gray-400 text-xs md:text-sm font-light">{type === 'collage' ? (multiFiles.length > 0 ? `${multiFiles.length} files selected` : `Supported: Images (Multiple)`) : (singleFile ? singleFile.name : `Supported: ${type.toUpperCase()}`)}</p>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-6">
                    {type === 'text' ? (
                      <textarea name="url" placeholder="Type or paste formatted text notes here..." required disabled={uploading} rows={6} className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm md:text-base outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white font-light resize-none custom-scrollbar" />
                    ) : type === 'collage' ? (
                      <textarea name="url" placeholder="COMMA SEPARATED IMAGE URLS" required disabled={uploading} rows={4} className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
                    ) : (
                      <input name="url" type="url" placeholder={type === 'youtube' ? "YOUTUBE URL (e.g. https://youtu.be/...)" : "DIRECT URL LINK"} required disabled={uploading} className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-600" />
                    )}
                  </div>
                )}
                
                {['video', 'youtube', 'image', 'link', 'pdf'].includes(type) && (
                   <div className="pt-8 mt-8 border-t border-white/10">
                      <label className="text-xs text-gray-400 uppercase tracking-widest font-bold mb-4 flex items-center gap-3"><ImagePlus size={18}/> Display Thumbnail (Optional)</label>
                      <input type="file" accept="image/*" disabled={uploading} onChange={(e) => setThumbnailFile(e.target.files[0])} className="w-full text-gray-400 text-sm bg-black/40 p-3 rounded-xl border border-white/10" />
                   </div>
                )}
                
                <div className="pt-8 mt-8 border-t border-white/10">
                   <textarea name="desc" placeholder="ADDITIONAL NOTES OR DESCRIPTION..." disabled={uploading} rows={3} className="w-full bg-black/60 border border-white/10 p-5 rounded-2xl text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
                </div>
                
                {collectionName === 'library' && (
                   <div className="pt-8 mt-8 border-t border-white/10">
                      <label className="flex items-center gap-4 cursor-pointer group w-fit">
                         <div className="relative">
                            <input type="checkbox" name="isPremium" className="sr-only peer" disabled={uploading} />
                            <div className="w-12 h-7 bg-gray-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-400 after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-[#D4AF37] shadow-inner"></div>
                         </div>
                         <span className="text-sm md:text-base text-[#D4AF37] font-bold tracking-widest uppercase flex items-center gap-2 group-hover:text-white transition-colors">
                           <Crown size={20} /> Premium Content Gate
                         </span>
                      </label>
                      <p className="text-xs text-gray-500 mt-3 font-bold tracking-widest uppercase ml-16">Locks asset to Enrolled Students & Teachers.</p>
                   </div>
                )}
              </div>
              
              {uploading && (
                <div className="w-full bg-black/60 border border-[#D4AF37]/40 rounded-3xl p-8 flex flex-col items-center justify-center animate-in fade-in shadow-[0_0_30px_rgba(212,175,55,0.2)]">
                  <div className="w-full bg-black rounded-full h-3 mb-4 overflow-hidden border border-white/10 shadow-inner">
                    <div className="bg-gradient-to-r from-[#D4AF37] to-[#FFDF73] h-full rounded-full transition-all duration-300 shadow-[0_0_15px_#D4AF37]" style={{ width: `${progress}%` }}></div>
                  </div>
                  <p className="text-center text-xs text-[#D4AF37] font-bold uppercase tracking-widest">Uploading {progress}%</p>
                </div>
              )}
              
              <div className="flex flex-col sm:flex-row gap-4 pt-4">
                <button type="button" onClick={onClose} disabled={uploading} className="w-full sm:flex-1 py-4 md:py-5 border border-white/20 rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase text-gray-300 hover:text-white transition-colors disabled:opacity-50 bg-black/40">Cancel</button>
                <button type="submit" disabled={uploading} className="w-full sm:flex-1 bg-[#D4AF37] text-black rounded-2xl text-xs sm:text-sm font-bold tracking-widest uppercase hover:bg-[#F9E29D] hover:-translate-y-1 transition-all flex items-center justify-center gap-3 disabled:opacity-50 disabled:hover:translate-y-0 shadow-[0_10px_20px_rgba(212,175,55,0.3)]">
                   {uploading ? <div className="w-6 h-6 border-2 border-black/20 border-t-black rounded-full animate-spin"></div> : <UploadCloud size={22} />}
                   {uploading ? 'Processing' : 'Publish Asset'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function ScheduleCard({ schedule, index, onRemove }) {
       const s = schedule;
       const dateParts = s.date ? s.date.split('-') : ['','',''];
       const year = dateParts[0];
       const month = dateParts[1];
       const day = dateParts[2] || s.date;

       return (
         <div className="glass-premium p-0 rounded-2xl md:rounded-[2rem] flex flex-col md:flex-row relative overflow-hidden group hover-lift border border-[#D4AF37]/20 shadow-xl mb-6">
            <div className="bg-black/80 w-full md:w-40 p-6 md:p-8 flex flex-row md:flex-col items-center justify-between md:justify-center border-b md:border-b-0 md:border-r border-white/10 shrink-0 relative">
               <div className="hidden md:block absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#D4AF37] to-[#B38D22]"></div>
               <div className="absolute left-0 top-0 w-1 h-full bg-gradient-to-b from-[#D4AF37] to-[#B38D22] md:hidden"></div>
               
               <div className="flex md:flex-col items-center gap-4 md:gap-0">
                 <span className="text-[#D4AF37] text-4xl md:text-5xl serif leading-none mb-0 md:mb-3 drop-shadow-md">{day}</span>
                 <span className="text-gray-400 text-xs md:text-sm font-bold tracking-[0.2em] uppercase text-center">{month}-{year}</span>
               </div>
               
               <div className="md:mt-6 bg-[#D4AF37]/10 px-4 py-2 rounded-xl border border-[#D4AF37]/30 flex items-center gap-2 backdrop-blur-md">
                  <Clock size={16} className="text-[#D4AF37]" />
                  <span className="text-[#D4AF37] text-[10px] md:text-xs font-bold tracking-widest whitespace-nowrap">{formatTime(s.time) || 'TBA'}</span>
               </div>
            </div>
            
            <div className="p-6 md:p-10 flex-1 flex flex-col justify-center min-w-0 bg-white/[0.01]">
               <div className="flex justify-between items-start mb-4 gap-4">
                  <div className="flex-1">
                     <span className="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold mb-3 block">Lecture {index + 1}</span>
                     <h4 className="serif text-2xl md:text-3xl text-white group-hover:text-[#D4AF37] transition-colors leading-tight break-words line-clamp-2">{s.title}</h4>
                  </div>
                  {onRemove && (
                    <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onRemove(s.id); }} className="text-gray-500 hover:text-red-400 p-3 md:p-4 rounded-xl hover:bg-red-500/10 transition-colors shrink-0 bg-black/40 border border-white/10 shadow-inner">
                      <Trash2 size={22} />

    function AdminCourseEditor({ course, userData, onBack, showConfirm }) {
      const [currentFolderId, setCurrentFolderId] = useState(null);
      const [showResourceModal, setShowResourceModal] = useState(false);
      const [showFolderModal, setShowFolderModal] = useState(false);
      const [showScheduleModal, setShowScheduleModal] = useState(false);
      const [showEditCourseModal, setShowEditCourseModal] = useState(false);
      const [previewResource, setPreviewResource] = useState(null);

      useHardwareBack(!!previewResource, () => setPreviewResource(null));
      useHardwareBack(!!currentFolderId, () => {
         const folder = course.resources?.find(res => res.id === currentFolderId);
         setCurrentFolderId(folder?.parentId || null);
      });

      const openFolder = (id) => {
          window.history.pushState({ internalNav: true }, "");
          setCurrentFolderId(id);
      };

      const handleViewResource = (res) => {
          if (res.type === 'link') {
            window.open(res.url, '_blank');
            return;
          }
          window.history.pushState({ internalNav: true }, "");
          setPreviewResource(res);
      };

      const removeResource = async (resId) => {
        showConfirm("Remove Material", "Remove this material permanently? (If it's a folder, all contents inside will also be deleted)", async () => {
          const allRes = course.resources || [];
          let toDelete = [resId];
          const resource = allRes.find(r => r.id === resId);
          
          if(resource?.isFolder) {
              toDelete = toDelete.concat(getAllChildrenIds(resId, allRes));
          }

          const newResources = allRes.filter(r => !toDelete.includes(r.id));
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { resources: newResources });
          toast("Material Removed Successfully");
        });
      };

      const removeSchedule = async (scheduleId) => {
        showConfirm("Remove Schedule", "Remove this lecture schedule from the syllabus?", async () => {
          const newSchedule = (course.schedule || []).filter(s => s.id !== scheduleId);
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { schedule: newSchedule });
          toast("Schedule Removed");
        });
      };

      const allResources = course.resources || [];
      const currentResources = allResources.filter(r => (r.parentId || null) === currentFolderId);
      const breadcrumbs = buildBreadcrumbs(currentFolderId, allResources);

      if (previewResource) {
          return <ResourcePreviewer resource={previewResource} course={course} userData={userData} onClose={() => window.history.back()} showConfirm={showConfirm} />;
      }

      return (
        <div className="animate-in fade-in slide-in-from-right-8 duration-500">
          <SmartBackButton label="Back to Courses" />
          
          <header className="mb-10 md:mb-16 relative rounded-[2rem] md:rounded-[3rem] overflow-hidden glass-premium border border-[#D4AF37]/30 p-8 sm:p-10 md:p-16 shadow-[0_20px_50px_rgba(0,0,0,0.6)]">

                <div className="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/90 to-transparent"></div>

                <p className="text-gray-300 text-sm md:text-base max-w-4xl leading-relaxed font-light break-words">{course.desc}</p>
              </div>
              <button onClick={() => setShowEditCourseModal(true)} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-6 py-4 rounded-xl md:rounded-2xl text-xs sm:text-sm font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-3 shrink-0 backdrop-blur-md w-full md:w-auto shadow-lg hover:shadow-xl">
                <Edit3 size={22} /> Edit Details
