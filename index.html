<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="shortcut icon" href="Assets/Images/Logo.png" type="image/x-icon">
  <title>Musicoul</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel Compiler -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Maps for React & Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0"
      }

  <!-- Application Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;800&family=Tiro+Devanagari+Marathi:ital@0;1&family=Mukta:wght@300;400;500;600;800&display=swap');
    
    html {
        -webkit-tap-highlight-color: transparent;
        scroll-behavior: smooth;
    }
    
    .serif { font-family: 'Cormorant Garamond', 'Tiro Devanagari Marathi', serif; }
    .sans { font-family: 'Inter', 'Mukta', sans-serif; }
    
    .bg-app { background-color: #050505; }
    .text-gold { color: #D4AF37; }
    .bg-gold { background-color: #D4AF37; }
    
    /* Premium Glassmorphism styling */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .glass-premium {
      background: linear-gradient(145deg, rgba(20,20,20,0.85) 0%, rgba(5,5,5,0.95) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.6);
    }

    .gold-gradient-text {
      background: linear-gradient(to right, #D4AF37, #FFDF73, #D4AF37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.6); }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    input[type="file"]::file-selector-button {
      border: 1px solid rgba(212, 175, 55, 0.3);
      background: rgba(212, 175, 55, 0.05);
      color: #D4AF37;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-right: 16px;
      transition: all 0.3s ease;
    }
    input[type="file"]::file-selector-button:hover {
      background: rgba(212, 175, 55, 0.15);
    }

    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(1) saturate(5) hue-rotate(5deg);
      cursor: pointer;
      width: 20px;
      height: 20px;
    }

    .hover-lift {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px -5px rgba(212, 175, 55, 0.2);
    }

    .netflix-card {
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .netflix-card:hover {
      transform: scale(1.03);
      z-index: 40;
      box-shadow: 0 20px 40px rgba(0,0,0,0.9);
    }

    /* Fixed Google Translate Custom Styling & Mobile Fixes */
    .goog-te-gadget { font-family: 'Inter', 'Mukta', sans-serif !important; color: transparent !important; font-size: 0 !important; }
    .goog-te-gadget > span { display: none !important; }
    .goog-te-combo { 
      background-color: rgba(0,0,0,0.7) !important; color: #D4AF37 !important; border: 1px solid rgba(212, 175, 55, 0.3) !important; 
      padding: 10px 32px 10px 14px !important; border-radius: 10px !important; font-size: 14px !important; text-transform: uppercase; 
      letter-spacing: 0.05em; outline: none; width: 100%; min-height: 44px; cursor: pointer; appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D4AF37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 12px auto;
    }
    
    html.translated-ltr font, html.translated-rtl font { font-size: 100% !important; line-height: 1.5 !important; }
    .goog-te-combo:focus { border-color: #D4AF37 !important; box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2) !important; }
    .skiptranslate iframe, .goog-te-banner-frame.skTranslate { display: none !important; }
    body { top: 0px !important; }
    #google_translate_element_wrapper { position: absolute; opacity: 0; z-index: -999; pointer-events: none; }
  </style>
</head>
<body class="bg-app text-gray-300 min-h-screen sans selection:bg-[#D4AF37] selection:text-black font-light text-base">
  
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LayoutDashboard, BookOpen, Users, Settings, LogOut, Plus, Trash2, Calendar, FileText, PlayCircle, 
      Image as ImageIcon, ChevronRight, GraduationCap, Music, Link as LinkIcon, Menu, X, Mail, Lock, 
      User as UserIcon, UploadCloud, File as FileIcon, ImagePlus, Clock, Folder, FolderPlus, ChevronLeft,
      FolderOpen, AlertCircle, Edit3, Paperclip, Video, Film, Crown, Search, Filter, Home, Info, Play, ChevronDown
    } from 'lucide-react';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
    import { 
      getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      signOut, setPersistence, browserLocalPersistence, signInWithCustomToken, signInAnonymously
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, 
      updateDoc, deleteDoc, addDoc, arrayUnion 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { 
      getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBaDBLoe2Wi2WgmJfPRXoEP-ZSgkVhMxVI",
      authDomain: "musicoul-15025.firebaseapp.com",
      databaseURL: "https://musicoul-15025-default-rtdb.firebaseio.com",
      projectId: "musicoul-15025",
      storageBucket: "musicoul-15025.firebasestorage.app",
      messagingSenderId: "863099041367",
      appId: "1:863099041367:web:c3d61399489a219611d512",
      measurementId: "G-WBPE697N9Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const appId = "musicoul-prod";

    // --- Format Helpers for Schedule ---
    const formatTime = (time24h) => {
        if (!time24h) return '';
        const [hours, minutes] = time24h.split(':');
        const h = parseInt(hours, 10);
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 || 12;
        return `${h12.toString().padStart(2, '0')}:${minutes} ${ampm}`;
    };

    const formatDDMMYYYY = (dateString) => {
        if (!dateString) return '';
        const parts = dateString.split('-');
        if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
        return dateString;
    };

    // --- Flawless History State Manager For Hardware Back Button ---
    const hardwareBackStack = [];
    
    function useHardwareBack(isActive, onBack) {
      const onBackRef = useRef(onBack);
      
      useEffect(() => {
        onBackRef.current = onBack;
      }, [onBack]);

      useEffect(() => {
        if (!isActive) return;
        
        const handlerObj = {
          execute: () => {
             if (onBackRef.current) onBackRef.current();
          }
        };
        
        hardwareBackStack.push(handlerObj);
        
        return () => {
          const idx = hardwareBackStack.indexOf(handlerObj);
          if (idx > -1) hardwareBackStack.splice(idx, 1);
        };
      }, [isActive]);
    }

    const toast = (msg) => {
      const t = document.createElement('div');
      t.className = "fixed bottom-24 right-4 md:top-8 md:right-8 md:bottom-auto bg-black/90 backdrop-blur-md border border-[#D4AF37]/50 text-[#D4AF37] px-6 py-4 rounded-xl font-medium text-sm tracking-wide shadow-2xl transition-all duration-300 animate-in fade-in z-[99999]";
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 300);
      }, 4000);
    };

    const extractYoutubeId = (url) => {
      if (!url) return null;
      const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/|live\/)|youtu\.be\/)([^"&?\/\s]{11})/i;
      const match = url.match(regExp);
      return match ? match[1] : null;
    };

    const getYoutubeEmbedUrl = (url) => {
      const videoId = extractYoutubeId(url);
      return videoId ? `https://www.youtube.com/embed/${videoId}?rel=0` : url;
    };

    const getAllChildrenIds = (folderId, resources) => {
        let ids = [];
        const children = resources.filter(r => r.parentId === folderId);
        for(const child of children) {
            ids.push(child.id);
            if(child.isFolder || child.type === 'youtube' || child.type === 'video') {
                ids = ids.concat(getAllChildrenIds(child.id, resources));
            }
        }
        return ids;
    };

    const buildBreadcrumbs = (folderId, resources) => {
        let path = [];
        let curr = folderId;
        while(curr) {
            const f = resources?.find(r => r.id === curr);
            if(f) { 
                path.unshift(f); 
                curr = f.parentId; 
            } else { 
                curr = null; 
            }
        }
        return path;
    };

    function SmartBackButton({ label }) {
      const handleBack = () => window.history.back();
      
      return (
        <button onClick={handleBack} className="text-[#D4AF37] text-xs sm:text-sm font-bold uppercase tracking-wider mb-6 md:mb-8 hover:text-white transition-colors flex items-center gap-2 w-fit relative z-10 hover-lift bg-black/50 px-5 py-3 rounded-xl border border-[#D4AF37]/30 backdrop-blur-md">
          <ChevronLeft size={20} /> {label || 'Back'}
        </button>
      );
    }

    const CustomLanguageSelector = () => {
      const getInitialLang = () => {
        const match = document.cookie.match(/googtrans=\/en\/([^;]+)/);
        return match ? match[1] : 'en';
      };
      
      const [lang, setLang] = useState(getInitialLang);

      const handleLanguageChange = (e) => {
        const newLang = e.target.value;
        setLang(newLang);
        
        if (newLang === 'en') {
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + window.location.hostname + '; path=/;';
        } else {
          document.cookie = `googtrans=/en/${newLang}; path=/`;
          document.cookie = `googtrans=/en/${newLang}; domain=${window.location.hostname}; path=/`;
        }

        const googleSelect = document.querySelector('.goog-te-combo');
        if (googleSelect) {
           googleSelect.value = newLang;
           googleSelect.dispatchEvent(new Event('change', { bubbles: true }));
        }

        setTimeout(() => {
           window.location.reload();
        }, 250);
      };

      return (
        <select 
          value={lang} 
          onChange={handleLanguageChange} 
          className="bg-black/80 border border-[#D4AF37]/50 text-[#D4AF37] text-xs font-bold uppercase tracking-wider rounded-xl px-4 py-2.5 outline-none cursor-pointer text-center shadow-[0_0_15px_rgba(212,175,55,0.2)] hover:bg-[#D4AF37]/10 transition-colors focus:ring-2 focus:ring-[#D4AF37]/50 min-h-[44px]"
        >
          <option value="en">ENG</option>
          <option value="hi">हिंदी</option>
          <option value="mr">मराठी</option>
        </select>
      );
    };

    const GoogleTranslateWidget = React.memo(() => {
      useEffect(() => {
        const initTranslate = () => {
          if (window.google && window.google.translate && window.google.translate.TranslateElement) {
             const el = document.getElementById('google_translate_element');
             if (el && el.innerHTML === '') {
               new window.google.translate.TranslateElement(
                 { pageLanguage: 'en', includedLanguages: 'hi,mr', layout: window.google.translate.TranslateElement.InlineLayout.SIMPLE },
                 'google_translate_element'
               );
             }
          }
        };

        if (!document.getElementById('google-translate-script')) {
          window.googleTranslateElementInit = initTranslate;
          const script = document.createElement('script');
          script.id = 'google-translate-script';
          script.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
          document.body.appendChild(script);
        } else {
          setTimeout(initTranslate, 300);
        }
      }, []);

      return (
        <div id="google_translate_element_wrapper">
          <div id="google_translate_element"></div>
        </div>
      );
    });

    function CollageSlider({ resource }) {
        const images = resource.url.split(',').map(u => u.trim()).filter(Boolean);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [isZoomed, setIsZoomed] = useState(false);

        const next = () => { setCurrentIndex((i) => (i + 1) % images.length); setIsZoomed(false); };
        const prev = () => { setCurrentIndex((i) => (i - 1 + images.length) % images.length); setIsZoomed(false); };

        if(images.length === 0) return <div className="text-gray-500 text-sm md:text-base w-full h-full flex items-center justify-center">No images found.</div>;

        return (
            <div className="w-full h-full relative flex flex-col bg-[#050505] overflow-hidden group items-center justify-center">
                <div className="relative w-full h-full flex items-center justify-center overflow-auto custom-scrollbar p-4 md:p-6">
                    <img 
                        src={images[currentIndex]} 
                        className={`transition-all duration-300 ${isZoomed ? 'max-w-none cursor-zoom-out scale-[1.5] origin-center' : 'max-w-full max-h-full object-contain cursor-zoom-in rounded-2xl md:rounded-[2rem] border border-white/10'}`} 
                        onClick={() => setIsZoomed(!isZoomed)}
                        alt={`Slide ${currentIndex + 1}`}
                    />
                </div>
                
                {images.length > 1 && (
                    <>
                        <button onClick={prev} className="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 md:w-14 md:h-14 bg-black/80 text-white rounded-full flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all border border-white/20 z-10 shadow-xl backdrop-blur-md">
                            <ChevronLeft size={28} />
                        </button>
                        <button onClick={next} className="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 md:w-14 md:h-14 bg-black/80 text-white rounded-full flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all border border-white/20 z-10 shadow-xl backdrop-blur-md">
                            <ChevronRight size={28} />
                        </button>
                        
                        <div className="absolute bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-black/80 px-6 py-4 rounded-[1.5rem] border border-white/10 z-10 overflow-x-auto max-w-[85vw] custom-scrollbar backdrop-blur-md">
                            {images.map((img, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => {setCurrentIndex(i); setIsZoomed(false);}} 
                                    className={`shrink-0 rounded-lg overflow-hidden transition-all border ${i === currentIndex ? 'border-[#D4AF37] w-16 h-16 opacity-100 shadow-[0_0_15px_rgba(212,175,55,0.4)] scale-110' : 'border-transparent w-14 h-14 opacity-50 hover:opacity-100'}`}
                                >
                                    <img src={img} className="w-full h-full object-cover" />
                                </button>
                            ))}
                        </div>
                    </>
                )}
            </div>
        );
    }

    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button 
          onClick={onClick} 
          className={`w-full flex items-center gap-4 p-4 rounded-xl md:rounded-2xl transition-all duration-300 group min-h-[48px] ${
            active 
              ? 'bg-white/10 text-[#D4AF37] border border-white/10 shadow-[0_0_20px_rgba(212,175,55,0.15)]' 
              : 'text-gray-400 hover:text-white hover:bg-white/5 border border-transparent'
          }`}
        >
          <span className={active ? 'text-[#D4AF37]' : 'group-hover:text-white transition-colors'}>{icon}</span>
          <span className="text-xs sm:text-sm font-bold uppercase tracking-wider">{label}</span>
        </button>
      );
    }

    function ViewAsDropdown({ role, updateLocalRole }) {
      const [isOpen, setIsOpen] = useState(false);
      const dropdownRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const roles = ['user', 'student', 'teacher', 'admin'];

      return (
        <div className="mt-8 mb-4 glass p-4 rounded-2xl border border-[#D4AF37]/30 shadow-lg relative z-[70]" ref={dropdownRef}>
          <p className="text-xs text-[#D4AF37] uppercase tracking-widest mb-3 font-bold flex items-center gap-2">
            <Settings size={18} /> View As
          </p>
          <button 
            onClick={() => setIsOpen(!isOpen)} 
            className="w-full bg-black/60 border border-white/10 p-3.5 rounded-xl flex items-center justify-between text-xs font-bold uppercase tracking-widest text-white hover:border-[#D4AF37]/50 transition-colors shadow-inner outline-none"
          >
            <span>{role}</span>
            <ChevronDown size={16} className={`transition-transform duration-300 text-[#D4AF37] ${isOpen ? 'rotate-180' : ''}`} />
          </button>
          
          {isOpen && (
            <div className="absolute top-[calc(100%+8px)] left-0 w-full bg-[#050505]/95 border border-[#D4AF37]/40 rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.8)] overflow-hidden animate-in fade-in slide-in-from-top-2 backdrop-blur-xl z-50">
              {roles.map(r => (
                <button
                  key={r}
                  onClick={() => { updateLocalRole(r); setIsOpen(false); }}
                  className={`w-full text-left px-4 py-3.5 text-xs font-bold uppercase tracking-widest transition-colors flex items-center justify-between border-b last:border-0 border-white/5 ${role === r ? 'bg-[#D4AF37]/10 text-[#D4AF37]' : 'text-gray-400 hover:text-white hover:bg-white/10'}`}
                >
                  <span>{r}</span>
                  {role === r && <span className="w-1.5 h-1.5 rounded-full bg-[#D4AF37] block shadow-[0_0_8px_#D4AF37]"></span>}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [showAuth, setShowAuth] = useState(false);
      
      const [allUsers, setAllUsers] = useState([]);
      const [allCourses, setAllCourses] = useState([]);
      const [allLibrary, setAllLibrary] = useState([]);

      useEffect(() => {
        let unsubscribe = () => {};

        const initializeSession = async () => {
          try {
            await setPersistence(auth, browserLocalPersistence);
          } catch (err) {}
          
          if (!auth.currentUser) {
             try { await signInAnonymously(auth); } catch(e) {}
          }

          unsubscribe = onAuthStateChanged(auth, async (u) => {
            setFirebaseUser(u);

            if (u && !u.isAnonymous) {
              setUser(u);
              try {
                const profileSnap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'));
                if (profileSnap.exists()) {
                  setUserData(profileSnap.data());
                } else {
                  const fallbackProfile = {
                    name: u.displayName || "Scholar",
                    email: u.email || '',
                    roles: [u.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' ? 'admin' : 'user'],
                    enrolledCourses: [],
                    createdAt: new Date().toISOString()
                  };
                  try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'), fallbackProfile);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), fallbackProfile);
                  } catch (e) {
                    console.warn("Storage warning:", e);
                  }
                  setUserData(fallbackProfile);
                }
              } catch (err) {
                console.error("Profile fetch error:", err);
                setUserData({
                  name: u.displayName || "Scholar",
                  email: u.email || '',
                  roles: [u.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' ? 'admin' : 'user'], 
                  enrolledCourses: [],
                  createdAt: new Date().toISOString()
                });
                toast("Connection slow. Operating in offline mode.");
              }
            } else {
              setUser(null);
              setUserData(null);
            }
            setAuthLoading(false);
          });
        };

        initializeSession();
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!firebaseUser) return;
        try { getAnalytics(app); } catch (e) {}

        const qCourses = query(collection(db, 'artifacts', appId, 'public', 'data', 'courses'));
        const qLibrary = query(collection(db, 'artifacts', appId, 'public', 'data', 'library'));

        const unsubCourses = onSnapshot(qCourses, 
          (snap) => setAllCourses(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (error) => console.error("Courses snapshot error:", error)
        );
        
        const unsubLibrary = onSnapshot(qLibrary, 
          (snap) => setAllLibrary(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (error) => console.error("Library snapshot error:", error)
        );

        return () => { unsubCourses(); unsubLibrary(); };
      }, [firebaseUser]);

      useEffect(() => {
        if (!user || !userData) return; 

        const qUsers = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
        const unsubUsers = onSnapshot(qUsers, 
          (snap) => setAllUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (error) => console.error("Users snapshot error:", error)
        );

        return () => { unsubUsers(); };
      }, [user, userData]);

      const logout = async () => {
         await signOut(auth);
         await signInAnonymously(auth); 
         setShowAuth(false);
      };

      if (authLoading) {
        return (
          <div className="bg-app text-white min-h-screen flex items-center justify-center font-sans">
            <div className="flex flex-col items-center gap-6">
              <div className="w-16 h-16 md:w-20 md:h-20 border-4 border-[#D4AF37]/20 border-t-[#D4AF37] rounded-full animate-spin" />
              <h2 className="serif text-2xl md:text-3xl text-gold tracking-widest uppercase">Loading</h2>
            </div>
          </div>
        );
      }

      return (
        <div className="flex w-full h-full relative">
          <GoogleTranslateWidget />
          {!user || !userData ? (
              showAuth ? (
                <AuthScreen db={db} allUsers={allUsers} setAuthLoading={setAuthLoading} setUserData={setUserData} onBack={() => setShowAuth(false)} />
              ) : (
                <PublicSite courses={allCourses} onLoginClick={() => setShowAuth(true)} />
              )
          ) : (
            <MainApplication 
              user={user} 
              userData={userData} 
              setUserData={setUserData}
              allUsers={allUsers} 
              allCourses={allCourses} 
              allLibrary={allLibrary}
              logout={logout}
              updateLocalRole={(newRole) => setUserData({...userData, roles: [newRole]})}
            />
          )}
        </div>
      );
    }

    // ==========================================
    // PUBLIC SITE 
    // ==========================================
    function PublicSite({ courses, onLoginClick }) {
      return (
        <div className="w-full min-h-screen bg-[#050505] overflow-y-auto relative">
          <header className="absolute top-0 left-0 w-full p-4 sm:p-6 flex justify-between items-center z-50 pointer-events-none">
             <div className="flex items-center gap-3">
               <div className="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center overflow-hidden shrink-0">
                 <img src="Assets/Images/Logo.png" alt="Musicoul" className="w-full h-full object-contain" />
               </div>
               <h4 className="serif text-2xl md:text-3xl font-bold text-white tracking-wide drop-shadow-lg">Musicoul</h4>
             </div>
             <div className="flex items-center gap-4 pointer-events-auto">
               <div className="hidden sm:block"><CustomLanguageSelector /></div>
               <button onClick={onLoginClick} className="bg-gradient-to-r from-[#D4AF37] to-[#B38D22] text-black px-6 md:px-8 py-3 rounded-xl md:rounded-full text-xs sm:text-sm font-bold uppercase tracking-widest hover:-translate-y-0.5 active:scale-95 transition-all shadow-[0_10px_20px_rgba(212,175,55,0.3)] flex items-center gap-2">
                 <UserIcon size={18} /> Sign In
               </button>
             </div>
          </header>
          
          <UserHome courses={courses} onGoToLibrary={onLoginClick} isPublic={true} />
        </div>
      );
    }

    function AuthScreen({ db, allUsers, setAuthLoading, setUserData, onBack }) {
      const [isLogin, setIsLogin] = useState(true);

      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        const form = e.target;
        const email = form.email.value;
        const password = form.password.value;
        const name = form.name?.value;

        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
            toast("Welcome Back");
          } else {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            const initialRole = (email.toLowerCase() === 'chandrashekharkolhe7@gmail.com') ? 'admin' : 'user'; 

            const newProfile = {
              name: name,
              email: email,
              roles: [initialRole],
              enrolledCourses: [],
              createdAt: new Date().toISOString()
            };

            try {
              await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid, 'profile', 'info'), newProfile);
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', cred.user.uid), newProfile);
            } catch (storageErr) {
              console.warn("Storage warning:", storageErr);
            }
            
            setUserData(newProfile);
            toast(`Welcome, ${name}`);
          }
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') {
            toast("Email already registered. Please login.");
            setIsLogin(true);
          } else if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
            toast("Invalid email or password.");
          } else if (err.code === 'auth/weak-password') {
            toast("Password should be at least 6 characters.");
          } else if (err.code === 'auth/network-request-failed') {
            toast("Network error. Please check your connection.");
          } else {
            const simpleMsg = err.message ? err.message.replace('Firebase: ', '').split(' (')[0] : 'Unknown error';
            toast(`Auth Error: ${simpleMsg}`);
          }
          setAuthLoading(false);
        }
      };

      return (
        <div className="w-full min-h-screen flex items-center justify-center p-4 sm:p-8 bg-app relative">
          {onBack && (
            <button onClick={onBack} className="absolute top-4 left-4 sm:top-8 sm:left-8 text-[#D4AF37] hover:text-white flex items-center gap-2 text-xs sm:text-sm font-bold uppercase tracking-widest transition-colors z-50 bg-black/60 px-4 py-3 rounded-xl backdrop-blur-md border border-[#D4AF37]/30">
               <ChevronLeft size={20} /> Home
            </button>
          )}

          <div className="glass-premium p-6 sm:p-10 md:p-14 w-full max-w-lg z-10 relative overflow-hidden shadow-2xl rounded-3xl md:rounded-[2.5rem]">
            <div className="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-[#D4AF37] to-transparent opacity-60"></div>
            
            <div className="text-center mb-10 md:mb-12">
              <img src="Assets/Images/Logo.png" alt="Musicoul Logo" className="w-20 h-20 md:w-24 md:h-24 mx-auto mb-4 md:mb-6 object-contain drop-shadow-xl" />
              <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-2 text-white font-bold tracking-wide">Musicoul</h1>
              <p className="text-[#D4AF37] text-xs sm:text-sm tracking-[0.2em] uppercase font-bold">Conservatory Portal</p>
            </div>
            
            <form onSubmit={handleAuth} className="space-y-5 md:space-y-6">
              {!isLogin && (
                <div className="relative">
                  <UserIcon size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500" />
                  <input name="name" type="text" placeholder="Full Name" required className="w-full bg-black/60 border border-white/10 p-4 pl-12 sm:p-5 sm:pl-14 rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-500" />
                </div>
              )}
              <div className="relative">
                <Mail size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500" />
                <input name="email" type="email" placeholder="Email Address" required className="w-full bg-black/60 border border-white/10 p-4 pl-12 sm:p-5 sm:pl-14 rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-500" />
              </div>
              <div className="relative">
                <Lock size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500" />
                <input name="password" type="password" placeholder="Password" required minLength="6" className="w-full bg-black/60 border border-white/10 p-4 pl-12 sm:p-5 sm:pl-14 rounded-2xl text-sm outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/50 transition-all text-white placeholder:text-gray-500" />
              </div>
              
              <button type="submit" className="w-full bg-gradient-to-r from-[#D4AF37] to-[#B38D22] p-4 sm:p-5 rounded-2xl text-black font-bold text-sm tracking-wider uppercase hover:shadow-[0_10px_20px_rgba(212,175,55,0.3)] hover:-translate-y-0.5 transition-all mt-8">
                {isLogin ? 'Sign In' : 'Register Account'}
              </button>
            </form>

            <div className="mt-8 md:mt-10 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-gray-400 hover:text-white text-xs sm:text-sm font-bold tracking-wider uppercase transition-colors py-2 px-4 rounded-lg hover:bg-white/5">
                {isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function MainApplication({ user, userData, setUserData, allUsers, allCourses, allLibrary, logout, updateLocalRole }) {
      const role = userData.roles[0] || 'user';
      const [activeTab, setActiveTab] = useState(role === 'user' ? 'home' : 'dashboard');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

      useEffect(() => {
        setActiveTab(role === 'user' ? 'home' : 'dashboard');
      }, [role, user.uid]);

      useEffect(() => {
        const handlePopState = () => {
          if (hardwareBackStack.length > 0) {
            const topHandler = hardwareBackStack[hardwareBackStack.length - 1];
            topHandler.execute();
          }
        };
        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      const showConfirm = (title, message, onConfirm) => setConfirmState({ isOpen: true, title, message, onConfirm });
      const closeConfirm = () => setConfirmState({ isOpen: false, title: '', message: '', onConfirm: null });

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setIsMobileMenuOpen(false);
      };

      return (
        <div className="flex flex-col lg:flex-row w-full h-screen overflow-hidden bg-app">

          {/* MOBILE HEADER */}
          <div className="lg:hidden flex items-center justify-between p-4 border-b border-[#D4AF37]/20 glass-premium z-[60] sticky top-0 shadow-lg min-h-[64px]">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 flex items-center justify-center overflow-hidden shrink-0">
                <img src="Assets/Images/Logo.png" alt="Musicoul" className="w-full h-full object-contain" />
              </div>
              <h4 className="serif text-2xl font-bold text-white tracking-wide">Musicoul</h4>
            </div>
            <div className="flex items-center gap-3">
              <CustomLanguageSelector />
              <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-3 bg-white/10 rounded-xl text-[#D4AF37] hover:bg-white/20 transition-colors">
                {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
              </button>
            </div>
          </div>

          {isMobileMenuOpen && (
            <div className="fixed inset-0 bg-black/80 z-50 lg:hidden backdrop-blur-md" onClick={() => setIsMobileMenuOpen(false)} />
          )}

          {/* SIDEBAR */}
          <aside className={`fixed inset-y-0 left-0 z-[65] transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:relative lg:translate-x-0 transition-transform duration-300 w-72 lg:w-80 border-r border-white/10 glass flex flex-col p-5 shadow-[20px_0_50px_rgba(0,0,0,0.7)] lg:shadow-none`}>
            <div className="hidden lg:flex items-center gap-4 mb-10 px-2">
              <div className="w-14 h-14 flex items-center justify-center shrink-0 overflow-hidden">
                <img src="Assets/Images/Logo.png" alt="Musicoul" className="w-full h-full object-contain" />
              </div>
              <div>
                <h4 className="serif text-3xl font-bold text-white tracking-wide">Musicoul</h4>
                <p className="gold-gradient-text text-xs tracking-widest uppercase font-bold mt-1">{role}</p>
              </div>
            </div>

            <nav className="flex-1 space-y-2 lg:space-y-3 overflow-y-auto pr-2 custom-scrollbar">
              
              {role === 'user' && (
                <SidebarItem icon={<Home size={22} />} label="Home" active={activeTab === 'home'} onClick={() => handleTabChange('home')} />
              )}

              <SidebarItem icon={<Film size={22} />} label="M-Library" active={activeTab === 'm-library'} onClick={() => handleTabChange('m-library')} />

              {role === 'user' && (
                  <div className="mt-6 mb-6 glass p-5 rounded-2xl border border-white/10 shadow-inner">
                    <p className="text-gray-400 text-xs font-bold tracking-widest uppercase text-center leading-relaxed">Enroll in a course to unlock your dashboard.</p>
                  </div>
              )}

              {(role === 'student' || role === 'teacher' || role === 'admin') && (
                <SidebarItem icon={<LayoutDashboard size={22} />} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
              )}

              {role === 'teacher' && (
                <>
                  <SidebarItem icon={<Calendar size={22} />} label="Attendance" active={activeTab === 'attendance'} onClick={() => handleTabChange('attendance')} />
                </>
              )}

              {role === 'admin' && (
                <>
                  <SidebarItem icon={<Calendar size={22} />} label="Attendance" active={activeTab === 'attendance'} onClick={() => handleTabChange('attendance')} />
                  <SidebarItem icon={<Users size={22} />} label="Users" active={activeTab === 'manage-users'} onClick={() => handleTabChange('manage-users')} />
                  <SidebarItem icon={<BookOpen size={22} />} label="Courses" active={activeTab === 'manage-courses'} onClick={() => handleTabChange('manage-courses')} />
                </>
              )}

              <div className="text-xs text-gray-500 font-bold uppercase tracking-widest mt-8 mb-4 px-4 border-b border-white/10 pb-3">Personal</div>
              <SidebarItem icon={<UserIcon size={22} />} label="Profile" active={activeTab === 'profile'} onClick={() => handleTabChange('profile')} />
            </nav>

            {/* Replaced bulky View As tabs with a sleek dropdown */}
            {userData.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' && (
               <ViewAsDropdown role={role} updateLocalRole={updateLocalRole} />
            )}

            <div className="mt-4 mb-6 glass p-5 rounded-2xl border border-white/10 flex flex-col items-start gap-4 z-10">
               <p className="text-xs text-gray-400 uppercase tracking-widest font-bold flex items-center gap-2">
                 Language
               </p>
               <div className="w-full"><CustomLanguageSelector /></div>
            </div>

            <button onClick={logout} className="flex items-center gap-4 p-4 text-gray-400 hover:text-[#D4AF37] transition-all text-sm font-bold tracking-widest uppercase w-full rounded-2xl hover:bg-white/5 mt-auto border border-transparent hover:border-[#D4AF37]/30">
              <LogOut size={22} /> <span>Sign Out</span>
            </button>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className={`flex-1 overflow-y-auto relative w-full h-full pb-8 lg:pb-0 ${activeTab === 'm-library' ? 'bg-[#020813]' : activeTab === 'home' ? 'bg-[#050505]' : 'bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-black via-[#050505] to-[#050505]'}`}>
            <div className={`w-full min-h-full ${activeTab === 'm-library' || activeTab === 'home' ? 'pb-24' : 'p-5 sm:p-8 md:p-12 pb-32 max-w-7xl mx-auto'}`}>
              
              {activeTab === 'home' && <UserHome courses={allCourses} onGoToLibrary={() => handleTabChange('m-library')} />}
              
              {activeTab === 'm-library' && <MLibrary user={user} userData={userData} allLibrary={allLibrary} showConfirm={showConfirm} />}

              {(role === 'student' || role === 'admin') && activeTab === 'dashboard' && <StudentDashboard user={user} userData={userData} courses={allCourses} />}
              {role === 'teacher' && activeTab === 'dashboard' && <TeacherDashboard user={user} userData={userData} courses={allCourses} users={allUsers} showConfirm={showConfirm} />}
              {role === 'teacher' && activeTab === 'attendance' && <TeacherAttendance user={user} userData={userData} courses={allCourses} users={allUsers} isAdmin={false} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'attendance' && <TeacherAttendance user={user} userData={userData} courses={allCourses} users={allUsers} isAdmin={true} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'manage-users' && <AdminUsers users={allUsers} courses={allCourses} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'manage-courses' && <AdminCourses courses={allCourses} showConfirm={showConfirm} />}
              {activeTab === 'profile' && <UserProfile user={user} userData={userData} setUserData={setUserData} />}
            </div>
          </main>

          {/* GLOBAL CONFIRM MODAL */}
          {confirmState.isOpen && (
            <div className="fixed inset-0 z-[999999] flex items-center justify-center p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
              <div className="glass-premium p-8 sm:p-12 w-full max-w-md rounded-[2.5rem] border border-[#D4AF37]/30 shadow-2xl text-center relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-red-500/50"></div>
                <AlertCircle size={56} className="mx-auto text-red-500 mb-6" />
                <h2 className="serif text-3xl md:text-4xl mb-4 text-white italic break-words">{confirmState.title}</h2>
                <p className="text-gray-300 text-sm mb-10 font-light leading-relaxed">{confirmState.message}</p>
                <div className="flex flex-col sm:flex-row gap-4">
                  <button onClick={closeConfirm} className="flex-1 py-4 border border-white/20 rounded-2xl text-sm font-bold uppercase tracking-widest text-gray-300 hover:text-white transition-colors bg-black/50">Cancel</button>
                  <button onClick={() => { confirmState.onConfirm(); closeConfirm(); }} className="flex-1 bg-red-900/40 text-red-400 border border-red-500/50 rounded-2xl text-sm font-bold uppercase tracking-widest hover:bg-red-600 hover:text-white transition-colors shadow-lg">Confirm</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // USER HOME 
    // ==========================================
    function UserHome({ courses, onGoToLibrary, isPublic = false }) {
      const scrollToCourses = () => {
          document.getElementById('course-catalog')?.scrollIntoView({ behavior: 'smooth' });
      };

      return (
        <div className="animate-in fade-in duration-1000 w-full min-h-full text-white bg-[#050505]">
          
          {/* FIXED HEIGHT ISSUE: Replaced h-[70vh] with min-h-[75vh] md:min-h-[80vh] and added py-24 to prevent button clipping */}
          <div className="relative w-full min-h-[75vh] md:min-h-[80vh] py-24 mb-12 flex items-center justify-center overflow-hidden shadow-2xl group border-b border-white/10">
             <div className="absolute inset-0 z-0">
               <img src="Assets/Images/Logo.png" className="w-full h-full object-contain opacity-[0.05] scale-105 group-hover:scale-100 transition-transform duration-[20s]" />
               <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/60 to-[#050505]"></div>
             </div>
             
             <div className="relative z-10 text-center px-4 sm:px-10 max-w-5xl mx-auto flex flex-col items-center pt-10 mt-6 sm:mt-0">
                <div className="w-24 h-24 md:w-32 md:h-32 mb-8 relative animate-in zoom-in duration-1000">
                  <div className="absolute inset-0 bg-[#D4AF37] blur-[60px] opacity-20 rounded-full"></div>
                  <img src="Assets/Images/Logo.png" alt="Musicoul Logo" className="w-full h-full object-contain relative z-10 drop-shadow-[0_0_20px_rgba(212,175,55,0.5)]" />
                </div>
                <h1 className="serif text-5xl sm:text-6xl md:text-7xl lg:text-8xl mb-6 leading-tight text-white drop-shadow-2xl font-bold">
                   Welcome to <br className="md:hidden"/> <span className="gold-gradient-text italic">Musicoul</span>
                </h1>
                <p className="text-gray-300 text-sm sm:text-lg font-light max-w-3xl mx-auto mb-10 leading-relaxed drop-shadow-md">
                   Discover our premium conservatory portal. Explore specialized courses or browse the exclusive M-Library for masterclasses and assets.
                </p>
                
                <div className="flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-4 sm:gap-6 w-full sm:w-auto px-2 sm:px-0 mx-auto">
                    <button onClick={onGoToLibrary} className="w-full sm:w-auto bg-gradient-to-r from-[#0A1931] via-[#1E3A8A] to-[#0A1931] text-blue-50 border border-[#60A5FA]/50 px-4 sm:px-8 py-4 sm:py-5 rounded-xl sm:rounded-full text-xs sm:text-sm font-bold uppercase tracking-widest hover:-translate-y-1 active:scale-95 transition-all shadow-[0_10px_30px_rgba(30,58,138,0.5)] flex items-center justify-center gap-2 sm:gap-3">
                       <Film size={20} className="text-blue-300 sm:w-[22px] sm:h-[22px] shrink-0" /> <span className="truncate">Enter M-Library</span>

                    <button onClick={scrollToCourses} className="w-full sm:w-auto bg-gradient-to-br from-[#D4AF37] via-[#FFDF73] to-[#B38D22] text-black border border-white/40 px-4 sm:px-8 py-4 sm:py-5 rounded-xl sm:rounded-full text-xs sm:text-sm font-bold uppercase tracking-widest hover:-translate-y-1 active:scale-95 transition-all shadow-[0_10px_30px_rgba(212,175,55,0.4)] flex items-center justify-center gap-2 sm:gap-3">
                       <BookOpen size={20} className="sm:w-[22px] sm:h-[22px] shrink-0" /> <span className="truncate">Our Courses</span>
                    </button>
                </div>
             </div>
          </div>

          <div id="course-catalog" className="px-5 sm:px-10 lg:px-12 pb-24 max-w-7xl mx-auto scroll-mt-24">
             <div className="mb-10 flex items-center gap-6 md:gap-8">
               <h3 className="serif text-3xl md:text-4xl gold-gradient-text italic font-bold">Course Catalog</h3>
               <div className="h-[2px] flex-1 bg-gradient-to-r from-[#D4AF37]/50 to-transparent"></div>
             </div>
             
             {courses.length === 0 ? (
                <div className="text-center text-gray-400 font-bold uppercase tracking-widest text-sm p-12 glass-premium rounded-3xl border border-white/10">No courses publicly listed yet.</div>
             ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
                   {courses.map(course => (
                     <div key={course.id} className="glass-premium rounded-[2rem] p-6 sm:p-8 md:p-10 text-left relative overflow-hidden flex flex-col min-h-[320px] border border-[#D4AF37]/20 hover:border-[#D4AF37]/50 transition-colors shadow-xl group">
                       {course.coverImage && (
                         <div className="absolute inset-0 z-0">
                           <img src={course.coverImage} className="w-full h-full object-cover opacity-[0.15] group-hover:opacity-[0.3] transition-opacity duration-500" />

                       <div className="relative z-10 flex-1 flex flex-col h-full">
                         <div className="w-14 h-14 rounded-2xl bg-black/60 border border-white/10 flex items-center justify-center mb-6 text-[#D4AF37] shadow-inner backdrop-blur-md shrink-0">

                         <h4 className="serif text-2xl md:text-3xl mb-3 text-white leading-tight font-bold break-words line-clamp-2">{course.title}</h4>

    // ==========================================
    // M-LIBRARY (Netflix Interface)
    // ==========================================
    function MLibrary({ user, userData, allLibrary, showConfirm }) {
      const isAdmin = userData.roles?.includes('admin');
      const isPrivileged = userData.roles?.some(r => ['admin', 'teacher', 'student'].includes(r));
      const [mode, setMode] = useState('browse'); 
      const [activeSectionId, setActiveSectionId] = useState(null); 
      const [activeFolderId, setActiveFolderId] = useState(null);
      const [previewResource, setPreviewResource] = useState(null);
      const [hoveredSection, setHoveredSection] = useState(null); 

      useHardwareBack(!!activeSectionId && mode === 'manage', () => setActiveSectionId(null));
      useHardwareBack(!!activeSectionId && mode === 'browse', () => setActiveSectionId(null));
      useHardwareBack(!!activeFolderId && mode === 'browse', () => setActiveFolderId(null));
      useHardwareBack(!!previewResource, () => setPreviewResource(null));

      const closeSection = () => { setActiveSectionId(null); try { window.history.back(); } catch(e){} };
      const closeFolder = () => { setActiveFolderId(null); try { window.history.back(); } catch(e){} };
      const closePreview = () => { setPreviewResource(null); try { window.history.back(); } catch(e){} };

      const handleViewResource = (res) => {
          if (res.isPremium && !isPrivileged) {
            toast("Premium Content: Please enroll in a course to unlock this material.");
            return;
          }
          if (res.type === 'link') { window.open(res.url, '_blank'); return; }
          try { window.history.pushState({ internalNav: true }, ""); } catch(e){}
          setPreviewResource(res);
      };

      const handleOpenFolder = (folderId) => {
          try { window.history.pushState({ internalNav: true }, ""); } catch(e){}
          setActiveFolderId(folderId);
      };

      const handleOpenSectionDetail = (sectionId) => {
          try { window.history.pushState({ internalNav: true }, ""); } catch(e){}
          setActiveSectionId(sectionId);
      };

      const handlePlayFirstItem = (section) => {
          if (!section || !section.resources || section.resources.length === 0) return;
          const rootItems = section.resources.filter(r => r.parentId === null);
          if (rootItems.length === 0) return;
          const sortedItems = rootItems.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0));
          const firstItem = sortedItems[0];
          
          if (firstItem.isFolder) {
              setActiveSectionId(section.id);
              handleOpenFolder(firstItem.id);
          } else {
              handleViewResource(firstItem);
          }
      };

      if (previewResource) {
          return <ResourcePreviewer resource={previewResource} course={{resources: []}} userData={userData} onClose={closePreview} />;
      }

      if (mode === 'manage' && isAdmin) {
          if (activeSectionId) {
            const section = allLibrary.find(s => s.id === activeSectionId);
            return <LibrarySectionEditor section={section} onBack={closeSection} showConfirm={showConfirm} />;
          }
          return <LibraryAdminManager allLibrary={allLibrary} onOpenSection={(id) => { try { window.history.pushState({ internalNav: true }, ""); } catch(e){} setActiveSectionId(id); }} onBackToBrowse={() => setMode('browse')} showConfirm={showConfirm} />;
      }

      if (activeSectionId && mode === 'browse') {
          const section = allLibrary.find(s => s.id === activeSectionId);
          if (section) {
            if (activeFolderId) {
                return <LibraryFolderView section={section} folderId={activeFolderId} onBack={closeFolder} onViewResource={handleViewResource} onOpenFolder={handleOpenFolder} isPrivileged={isPrivileged} />;
            }
            return <LibrarySectionDetailView section={section} onBack={closeSection} onViewResource={handleViewResource} onOpenFolder={handleOpenFolder} isPrivileged={isPrivileged} />;
          }
      }

      let explicitFeatured = allLibrary.filter(s => s.isFeatured).sort((a,b) => (a.createdAt > b.createdAt ? -1 : 1));
      let featuredSections = allLibrary.filter(s => s.coverUrl || s.thumbnailUrl).sort((a,b) => (a.createdAt > b.createdAt ? -1 : 1));
      let displayHeroSection = hoveredSection || (explicitFeatured.length > 0 ? explicitFeatured[0] : (featuredSections.length > 0 ? featuredSections[0] : null));

      return (
        <div className="animate-in fade-in duration-1000 w-full min-h-full text-white bg-[#020813]">
          
          {isAdmin && (
             <div className="absolute top-4 right-4 sm:top-6 sm:right-6 z-[60]">
                <button onClick={() => setMode('manage')} className="bg-[#0A1526]/90 border border-blue-500/40 text-[#D4AF37] px-5 py-3 rounded-xl text-xs font-bold uppercase tracking-widest backdrop-blur-md hover:bg-[#D4AF37] hover:text-[#020813] transition-all shadow-lg flex items-center gap-2">
                    <Settings size={18} /> Manage
                </button>
             </div>
          )}

          {/* Dynamic Hero Section - Fixed Height clipping issue similar to home */}
          <div className="relative w-full min-h-[65vh] sm:min-h-[75vh] md:min-h-[85vh] py-24 mb-10 md:mb-12 flex items-end shadow-2xl overflow-hidden bg-[#020813] group transition-all duration-700 border-b border-blue-900/30">
             {displayHeroSection ? (
                <>
                  <div className="absolute inset-0 z-0 bg-[#020813]">
                      <img 
                        key={displayHeroSection.id} 
                        src={displayHeroSection.coverUrl || displayHeroSection.thumbnailUrl} 
                        className="w-full h-full object-cover opacity-50 sm:opacity-60 mix-blend-screen scale-105 group-hover:scale-100 transition-transform duration-[20s] animate-in fade-in zoom-in-105" 
                      />
                  </div>
                  <div className="absolute inset-0 bg-gradient-to-t from-[#020813] via-[#020813]/50 to-transparent z-10"></div>
                  <div className="absolute inset-0 bg-gradient-to-r from-[#020813]/90 via-[#020813]/40 to-transparent z-10"></div>
                  
                  <div className="relative z-20 p-6 sm:p-10 md:p-16 max-w-5xl animate-in slide-in-from-bottom-10 fade-in duration-700 w-full">
                      <div className="flex flex-wrap items-center gap-3 mb-4">
                         <span className="text-blue-400 text-xs font-black tracking-[0.3em] uppercase drop-shadow-md">M-SERIES</span>
                         <span className="text-[#D4AF37] text-[10px] md:text-xs font-bold tracking-widest uppercase border border-blue-500/30 bg-[#0A1526]/80 px-3 py-1.5 rounded-lg backdrop-blur-md">Featured Section</span>
                      </div>
                      <h1 className="serif text-5xl sm:text-6xl md:text-7xl lg:text-[7rem] mb-4 leading-none text-white drop-shadow-[0_5px_15px_rgba(0,0,0,0.8)] font-bold break-words">{displayHeroSection.title}</h1>
                      <p className="text-gray-200 text-sm md:text-base lg:text-lg mb-8 line-clamp-3 font-light max-w-3xl drop-shadow-xl leading-relaxed">
                         {displayHeroSection.description || "Explore this premium curated collection of masterclasses and conservatory assets."}
                      </p>
                      <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 w-full sm:w-auto">
                        <button onClick={() => handlePlayFirstItem(displayHeroSection)} className="w-full sm:w-auto bg-white text-black hover:bg-gray-200 px-8 py-4 rounded-xl text-sm md:text-base font-bold transition-all flex items-center justify-center gap-3 active:scale-95 shadow-xl">
                            <Play fill="currentColor" size={24} /> Play
                        </button>
                        <button onClick={() => handleOpenSectionDetail(displayHeroSection.id)} className="w-full sm:w-auto bg-[#0A1526]/80 text-white hover:bg-[#0A1526] hover:border-blue-500/50 px-8 py-4 rounded-xl text-sm md:text-base font-bold transition-all flex items-center justify-center gap-3 active:scale-95 backdrop-blur-md border border-blue-800/50 shadow-lg">
                            <Info size={24} /> More Info
                        </button>
                      </div>
                  </div>
                </>
             ) : (
                <div className="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-[#0A1526] to-[#020813] z-10">
                   <Film size={64} className="text-[#D4AF37] opacity-40 mb-6 drop-shadow-lg" />
                   <h1 className="serif text-4xl sm:text-5xl md:text-6xl text-white mb-4">M-Library</h1>
                   <p className="text-blue-200/50 tracking-widest uppercase font-bold text-sm">Curated Conservatory Content</p>
                </div>
             )}
          </div>

          <div className="px-5 sm:px-10 lg:px-16 pb-24 relative z-30 mt-[-2rem] md:mt-[-4rem]">
             <div className="flex items-center gap-6 border-b border-white/10 mb-8 pb-4">
                <h3 className="text-xl md:text-2xl font-bold text-white tracking-wide">All Collections</h3>
             </div>

             {allLibrary.length === 0 ? (
                <div className="text-center text-blue-200/40 font-bold uppercase tracking-widest text-sm p-12 glass border border-white/5 rounded-3xl">No collections available yet.</div>
             ) : (
                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                   {allLibrary.sort((a,b) => (a.createdAt > b.createdAt ? -1 : 1)).map(section => (
                       <div 
                         key={section.id} 
                         onClick={() => handleOpenSectionDetail(section.id)}
                         onMouseEnter={() => setHoveredSection(section)}
                         className="netflix-card aspect-[3/4] sm:aspect-[4/5] md:aspect-[3/4] bg-[#0A1526] rounded-2xl relative overflow-hidden border border-blue-900/40 shadow-[0_8px_20px_rgba(0,0,0,0.4)] cursor-pointer group"
                       >
                          <img src={section.coverUrl || section.thumbnailUrl || 'Assets/Images/Logo.png'} className={`w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 ${!section.coverUrl && !section.thumbnailUrl ? 'opacity-20 p-8 object-contain' : 'opacity-80 group-hover:opacity-100'}`} />
                          
                          <div className="absolute inset-0 bg-gradient-to-t from-[#020813] via-[#020813]/50 to-transparent opacity-90 group-hover:opacity-100 transition-opacity"></div>
                          
                          <div className="absolute bottom-0 left-0 w-full p-4 md:p-5 z-10">
                             <h4 className="text-white font-bold text-sm md:text-base leading-tight drop-shadow-md group-hover:text-blue-300 transition-colors line-clamp-2">{section.title}</h4>
                             <p className="text-[#D4AF37] text-[10px] md:text-xs uppercase tracking-widest font-bold mt-2 opacity-90">
                                {section.resources?.length || 0} Assets
                             </p>
                          </div>

                          <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-black/40 backdrop-blur-[2px] z-20">
                             <button className="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center hover:bg-[#D4AF37] transition-colors shadow-xl transform scale-90 group-hover:scale-100 duration-300">
                                <Play fill="currentColor" size={24}/>
                             </button>
                          </div>
                       </div>
                   ))}
                </div>
             )}
          </div>
        </div>
      );
    }

    function LibrarySectionDetailView({ section, onBack, onViewResource, onOpenFolder, isPrivileged }) {
       const allResources = section.resources || [];
       const rootItems = allResources.filter(r => r.parentId === null);

          if (rootItems.length === 0) return;

          if (firstItem.isFolder) onOpenFolder(firstItem.id);
          else onViewResource(firstItem);

       return (

               <div className="absolute top-6 left-6 z-50">
                   <button onClick={onBack} className="w-12 h-12 bg-black/50 border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-white hover:text-black transition-colors backdrop-blur-md shadow-lg">

                  <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/70 to-transparent"></div>

               </div>
               
               <div className="relative z-10 p-6 sm:p-10 md:p-16 max-w-5xl w-full">

                  <div className="flex flex-wrap items-center gap-3 md:gap-4 mb-6 text-gray-300 text-xs sm:text-sm font-bold">
                     <span className="text-green-500 drop-shadow-md">98% Match</span>
                     <span>{new Date(section.createdAt).getFullYear()}</span>
                     <span className="border border-[#D4AF37]/50 text-[#D4AF37] px-2 py-1 rounded md:rounded-lg text-[10px] tracking-widest bg-black/60 backdrop-blur-sm">PREMIUM</span>

                     <p className="mb-4 text-white/90">{section.description || "A curated collection of resources, videos, and masterclasses specifically assembled for your conservatory journey."}</p>
                     <p className="text-[#D4AF37] text-[10px] md:text-xs font-bold uppercase tracking-widest">Uploaded on: {uploadDate}</p>
                  </div>
                  
                  <div className="flex items-center gap-4">
                     <button onClick={handlePlayFirst} className="w-full sm:w-auto bg-white text-black hover:bg-gray-200 px-8 py-4 rounded-xl text-sm md:text-base font-bold transition-all flex items-center justify-center gap-3 active:scale-95 shadow-xl">
                        <Play fill="currentColor" size={24} /> Play

                  <h3 className="text-xl md:text-2xl font-bold text-white tracking-wide">Episodes & Resources</h3>
               </div>

               {rootItems.length === 0 ? (
                  <div className="text-center text-gray-500 font-bold uppercase tracking-widest text-sm p-12 glass border border-white/5 rounded-3xl max-w-6xl mx-auto">No items in this section.</div>
               ) : (
                  <div className="flex flex-col gap-4 max-w-6xl mx-auto">

                           className="flex flex-col sm:flex-row sm:items-center gap-5 sm:gap-6 p-4 sm:p-5 md:p-6 rounded-2xl md:rounded-[1.5rem] hover:bg-white/[0.04] border border-transparent cursor-pointer transition-all group relative border-b border-white/5"
                         >
                            <span className="text-gray-600 font-bold text-3xl w-10 text-center shrink-0 hidden md:block group-hover:text-white transition-colors">{idx + 1}</span>
                            
                            <div className="w-full sm:w-48 md:w-56 aspect-video bg-[#0A1526] rounded-xl shrink-0 relative overflow-hidden shadow-[0_8px_20px_rgba(0,0,0,0.5)] border border-white/5 group-hover:border-white/20 transition-colors">
