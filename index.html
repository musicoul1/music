<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="Assets/Images/Logo.png" type="image/x-icon">
  <title>Musicoul</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel Compiler (to compile React JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Maps for React & Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0"
      }
    }
  </script>

  <!-- Application Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;600;800&family=Tiro+Devanagari+Marathi:ital@0;1&family=Mukta:wght@300;400;600;800&display=swap');
    
    .serif { font-family: 'Cormorant Garamond', 'Tiro Devanagari Marathi', serif; }
    .sans { font-family: 'Inter', 'Mukta', sans-serif; }
    
    .bg-app { background-color: #050505; }
    .text-gold { color: #D4AF37; }
    .bg-gold { background-color: #D4AF37; }
    
    /* Premium Glassmorphism styling */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .glass-premium {
      background: linear-gradient(145deg, rgba(20,20,20,0.8) 0%, rgba(5,5,5,0.9) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    .gold-gradient-text {
      background: linear-gradient(to right, #D4AF37, #FFDF73, #D4AF37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.4); }

    input[type="file"]::file-selector-button {
      border: 1px solid rgba(212, 175, 55, 0.3);
      background: transparent;
      color: #D4AF37;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-right: 16px;
      transition: all 0.3s ease;
    }
    input[type="file"]::file-selector-button:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    /* Elegant Animations */
    .hover-lift {
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(212, 175, 55, 0.15);
    }

    /* Fixed Google Translate Custom Styling */
    .goog-te-gadget { 
      font-family: 'Inter', 'Mukta', sans-serif !important; 
      color: transparent !important; 
      font-size: 0 !important;
    }
    .goog-te-gadget > span { display: none !important; } /* Hide Google Logo/Text */
    .goog-te-combo { 
      background-color: rgba(0,0,0,0.5) !important; 
      color: #D4AF37 !important; 
      border: 1px solid rgba(255, 255, 255, 0.1) !important; 
      padding: 10px 12px !important; 
      border-radius: 8px !important; 
      font-size: 11px !important; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
      outline: none;
      width: 100%;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D4AF37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 12px top 50%;
      background-size: 8px auto;
    }
    .goog-te-combo:focus { border-color: #D4AF37 !important; }
    .skiptranslate iframe { display: none !important; }
    .goog-te-banner-frame.skiptranslate { display: none !important; }
    body { top: 0px !important; } /* Prevents top banner shift */
    
    /* Hide the default Google Translate element securely so our custom dropdown takes over */
    #google_translate_element_wrapper {
      position: absolute;
      opacity: 0;
      z-index: -999;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-app text-gray-300 min-h-screen sans selection:bg-[#D4AF37] selection:text-black font-light">
  
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    // --- IMPORTS ---
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LayoutDashboard, BookOpen, Users, Settings, LogOut, Plus, Trash2, Calendar, FileText, PlayCircle, 
      Image as ImageIcon, ChevronRight, GraduationCap, Music, Link as LinkIcon, Menu, X, Mail, Lock, 
      User as UserIcon, UploadCloud, File as FileIcon, ImagePlus, Clock, Folder, FolderPlus, ChevronLeft,
      FolderOpen, AlertCircle, Edit3
    } from 'lucide-react';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
    import { 
      getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      signOut, setPersistence, browserLocalPersistence, signInWithCustomToken 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, 
      updateDoc, deleteDoc, addDoc, arrayUnion 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { 
      getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

    // --- ROBUST ENVIRONMENT CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBaDBLoe2Wi2WgmJfPRXoEP-ZSgkVhMxVI",
      authDomain: "musicoul-15025.firebaseapp.com",
      databaseURL: "https://musicoul-15025-default-rtdb.firebaseio.com",
      projectId: "musicoul-15025",
      storageBucket: "musicoul-15025.firebasestorage.app",
      messagingSenderId: "863099041367",
      appId: "1:863099041367:web:c3d61399489a219611d512",
      measurementId: "G-WBPE697N9Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const appId = "musicoul-prod";

    // --- HELPERS ---
    const toast = (msg) => {
      const t = document.createElement('div');
      t.className = "fixed bottom-6 right-6 md:top-10 md:right-10 md:bottom-auto bg-[#111] border border-[#D4AF37]/40 text-[#D4AF37] px-6 py-4 rounded-xl font-medium text-[11px] tracking-wide shadow-2xl transition-all duration-300 animate-in fade-in z-[9999]";
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 300);
      }, 4000);
    };

    const extractYoutubeId = (url) => {
      if (!url) return null;
      const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    };

    const getYoutubeEmbedUrl = (url) => {
      const videoId = extractYoutubeId(url);
      return videoId ? `https://www.youtube.com/embed/${videoId}` : url;
    };

    const getAllChildrenIds = (folderId, resources) => {
        let ids = [];
        const children = resources.filter(r => r.parentId === folderId);
        for(const child of children) {
            ids.push(child.id);
            if(child.isFolder) ids = ids.concat(getAllChildrenIds(child.id, resources));
        }
        return ids;
    };

    const buildBreadcrumbs = (folderId, resources) => {
        let path = [];
        let curr = folderId;
        while(curr) {
            const f = resources?.find(r => r.id === curr);
            if(f) { 
                path.unshift(f); 
                curr = f.parentId; 
            } else { 
                curr = null; 
            }
        }
        return path;
    };

    // --- CUSTOM LANGUAGE SELECTOR & GOOGLE TRANSLATE COMPONENT ---
    const CustomLanguageSelector = () => {
      // Check cookies for existing language preference so it persists across reloads
      const getInitialLang = () => {
        const match = document.cookie.match(/googtrans=\/en\/([^;]+)/);
        return match ? match[1] : 'en';
      };
      
      const [lang, setLang] = useState(getInitialLang);

      const handleLanguageChange = (e) => {
        const newLang = e.target.value;
        setLang(newLang);
        
        if (newLang === 'en') {
          // To restore English properly, we clear the Google Translate cookie and reload
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + window.location.hostname + '; path=/;';
          window.location.reload();
          return;
        }

        // Save to cookie so preference persists
        document.cookie = `googtrans=/en/${newLang}; path=/`;

        // Find the hidden Google Translate select element and trigger a change
        const googleSelect = document.querySelector('.goog-te-combo');
        if (googleSelect) {
          googleSelect.value = newLang;
          googleSelect.dispatchEvent(new Event('change', { bubbles: true }));
        } else {
          toast("Translator loading... rendering updates.");
          window.location.reload();
        }
      };

      return (
        <select 
          value={lang} 
          onChange={handleLanguageChange} 
          className="bg-black/80 border border-[#D4AF37]/50 text-[#D4AF37] text-[10px] md:text-xs font-bold uppercase tracking-widest rounded-lg px-2 py-1.5 md:px-3 md:py-2 outline-none cursor-pointer text-center shadow-[0_0_10px_rgba(212,175,55,0.2)] hover:bg-[#D4AF37]/10 transition-colors"
        >
          <option value="en">ENG</option>
          <option value="hi">हिंदी (HI)</option>
          <option value="mr">मराठी (MR)</option>
        </select>
      );
    };

    const GoogleTranslateWidget = React.memo(() => {
      useEffect(() => {
        const initTranslate = () => {
          if (window.google && window.google.translate && window.google.translate.TranslateElement) {
             const el = document.getElementById('google_translate_element');
             if (el && el.innerHTML === '') {
               new window.google.translate.TranslateElement(
                 { pageLanguage: 'en', includedLanguages: 'hi,mr', layout: window.google.translate.TranslateElement.InlineLayout.SIMPLE },
                 'google_translate_element'
               );
             }
          }
        };

        if (!document.getElementById('google-translate-script')) {
          window.googleTranslateElementInit = initTranslate;
          const script = document.createElement('script');
          script.id = 'google-translate-script';
          script.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
          document.body.appendChild(script);
        } else {
          setTimeout(initTranslate, 300);
        }
      }, []);

      return (
        <div id="google_translate_element_wrapper">
          <div id="google_translate_element"></div>
        </div>
      );
    });

    // --- COLLAGE SLIDER COMPONENT ---
    function CollageSlider({ resource }) {
        const images = resource.url.split(',').map(u => u.trim()).filter(Boolean);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [isZoomed, setIsZoomed] = useState(false);

        const next = () => { setCurrentIndex((i) => (i + 1) % images.length); setIsZoomed(false); };
        const prev = () => { setCurrentIndex((i) => (i - 1 + images.length) % images.length); setIsZoomed(false); };

        if(images.length === 0) return <div className="text-gray-500 w-full h-full flex items-center justify-center">No images found.</div>;

        return (
            <div className="w-full h-full relative flex flex-col bg-[#050505] overflow-hidden group items-center justify-center">
                <div className="relative w-full h-full flex items-center justify-center overflow-auto custom-scrollbar p-4">
                    <img 
                        src={images[currentIndex]} 
                        className={`transition-all duration-300 ${isZoomed ? 'max-w-none cursor-zoom-out scale-[1.5] origin-center' : 'max-w-full max-h-full object-contain cursor-zoom-in rounded-[1.5rem] border border-white/5'}`} 
                        onClick={() => setIsZoomed(!isZoomed)}
                        alt={`Slide ${currentIndex + 1}`}
                    />
                </div>
                
                {images.length > 1 && (
                    <>
                        <button onClick={prev} className="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 md:w-12 md:h-12 bg-black/80 text-white rounded-full flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all border border-white/10 z-10 shadow-lg">
                            <ChevronLeft size={20} />
                        </button>
                        <button onClick={next} className="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 md:w-12 md:h-12 bg-black/80 text-white rounded-full flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all border border-white/10 z-10 shadow-lg">
                            <ChevronRight size={20} />
                        </button>
                        
                        <div className="absolute bottom-4 md:bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-black/80 px-4 py-2 rounded-[1.5rem] border border-white/10 z-10 overflow-x-auto max-w-[80vw] custom-scrollbar">
                            {images.map((img, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => {setCurrentIndex(i); setIsZoomed(false);}} 
                                    className={`shrink-0 rounded-md overflow-hidden transition-all border ${i === currentIndex ? 'border-[#D4AF37] w-12 h-12 opacity-100' : 'border-transparent w-10 h-10 opacity-50 hover:opacity-100'}`}
                                >
                                    <img src={img} className="w-full h-full object-cover" />
                                </button>
                            ))}
                        </div>
                    </>
                )}
            </div>
        );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      
      const [allUsers, setAllUsers] = useState([]);
      const [allCourses, setAllCourses] = useState([]);

      useEffect(() => {
        try { getAnalytics(app); } catch (e) {}

        let unsubscribe = () => {};

        const initializeSession = async () => {
          try {
            await setPersistence(auth, browserLocalPersistence);
          } catch (err) {
            console.error("Persistence setting failed:", err);
          }
          
          if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
            try { await signInWithCustomToken(auth, window.__initial_auth_token); } catch(e) {}
          }

          unsubscribe = onAuthStateChanged(auth, async (u) => {
            if (u) {
              setUser(u);
              try {
                const profileSnap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'));
                if (profileSnap.exists()) {
                  setUserData(profileSnap.data());
                } else {
                  const fallbackProfile = {
                    name: u.displayName || "Scholar",
                    email: u.email || '',
                    roles: [u.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' ? 'admin' : 'student'],
                    enrolledCourses: [],
                    createdAt: new Date().toISOString()
                  };
                  try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'), fallbackProfile);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), fallbackProfile);
                  } catch (e) {
                    console.warn("Storage warning:", e);
                  }
                  setUserData(fallbackProfile);
                }
              } catch (err) {
                console.error("Profile fetch error:", err);
                setUserData({
                  name: u.displayName || "Scholar",
                  email: u.email || '',
                  roles: [u.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' ? 'admin' : 'student'], 
                  enrolledCourses: [],
                  createdAt: new Date().toISOString()
                });
                toast("Connection slow. Operating in offline mode.");
              }
            } else {
              setUser(null);
              setUserData(null);
            }
            setAuthLoading(false);
          });
        };

        initializeSession();
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !userData) return; 

        const qUsers = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
        const qCourses = query(collection(db, 'artifacts', appId, 'public', 'data', 'courses'));

        const unsubUsers = onSnapshot(qUsers, 
          (snap) => setAllUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (error) => console.error("Users snapshot error:", error)
        );

        const unsubCourses = onSnapshot(qCourses, 
          (snap) => setAllCourses(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (error) => console.error("Courses snapshot error:", error)
        );

        return () => { unsubUsers(); unsubCourses(); };
      }, [user, userData]);

      const logout = () => signOut(auth);

      if (authLoading) {
        return (
          <div className="bg-app text-white min-h-screen flex items-center justify-center font-sans">
            <div className="flex flex-col items-center gap-6">
              <div className="w-12 h-12 border-2 border-[#D4AF37]/20 border-t-[#D4AF37] rounded-full animate-spin" />
              <h2 className="serif text-xl text-gold">Loading</h2>
            </div>
          </div>
        );
      }

      return (
        <div className="flex w-full h-full">
          {!user || !userData ? (
            <AuthScreen db={db} allUsers={allUsers} setAuthLoading={setAuthLoading} setUserData={setUserData} />
          ) : (
            <MainApplication 
              user={user} 
              userData={userData} 
              setUserData={setUserData}
              allUsers={allUsers} 
              allCourses={allCourses} 
              logout={logout}
              updateLocalRole={(newRole) => setUserData({...userData, roles: [newRole]})}
            />
          )}
        </div>
      );
    }

    // --- AUTHENTICATION SCREEN ---
    function AuthScreen({ db, allUsers, setAuthLoading, setUserData }) {
      const [isLogin, setIsLogin] = useState(true);

      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        const form = e.target;
        const email = form.email.value;
        const password = form.password.value;
        const name = form.name?.value;

        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
            toast("Welcome Back");
          } else {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            const initialRole = (email.toLowerCase() === 'chandrashekharkolhe7@gmail.com') ? 'admin' : 'student';

            const newProfile = {
              name: name,
              email: email,
              roles: [initialRole],
              enrolledCourses: [],
              createdAt: new Date().toISOString()
            };

            try {
              await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid, 'profile', 'info'), newProfile);
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', cred.user.uid), newProfile);
            } catch (storageErr) {
              console.warn("Storage warning:", storageErr);
            }
            
            setUserData(newProfile);
            toast(`Welcome, ${name}`);
          }
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') {
            toast("Email already registered. Please login.");
            setIsLogin(true);
          } else if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
            toast("Invalid email or password.");
          } else if (err.code === 'auth/weak-password') {
            toast("Password should be at least 6 characters.");
          } else if (err.code === 'auth/network-request-failed') {
            toast("Network error. Please check your connection.");
          } else {
            const simpleMsg = err.message ? err.message.replace('Firebase: ', '').split(' (')[0] : 'Unknown error';
            toast(`Auth Error: ${simpleMsg}`);
          }
          setAuthLoading(false);
        }
      };

      return (
        <div className="w-full min-h-screen flex items-center justify-center p-4 md:p-6 bg-app">
          
          <div className="glass-premium p-8 md:p-12 w-full max-w-md z-10 relative overflow-hidden shadow-2xl rounded-[2rem]">
            <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-[#D4AF37] to-transparent opacity-40"></div>
            
            <div className="text-center mb-10">
              <Music size={32} className="text-[#D4AF37] mx-auto mb-4" />
              <h1 className="serif text-4xl mb-1 text-white">Musicoul</h1>
              <p className="text-[#D4AF37] text-[10px] tracking-widest uppercase font-bold">Conservatory Portal</p>
            </div>
            
            <form onSubmit={handleAuth} className="space-y-4">
              {!isLogin && (
                <div className="relative">
                  <UserIcon size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" />
                  <input name="name" type="text" placeholder="Full Name" required className="w-full bg-black/50 border border-white/10 py-4 pl-12 pr-4 rounded-xl text-sm outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                </div>
              )}
              <div className="relative">
                <Mail size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" />
                <input name="email" type="email" placeholder="Email Address" required className="w-full bg-black/50 border border-white/10 py-4 pl-12 pr-4 rounded-xl text-sm outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
              </div>
              <div className="relative">
                <Lock size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" />
                <input name="password" type="password" placeholder="Password" required minLength="6" className="w-full bg-black/50 border border-white/10 py-4 pl-12 pr-4 rounded-xl text-sm outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
              </div>
              
              <button type="submit" className="w-full bg-[#D4AF37] py-4 rounded-xl text-black font-bold text-xs tracking-wider uppercase hover:bg-[#F9E29D] transition-colors mt-6 shadow-lg">
                {isLogin ? 'Sign In' : 'Register Account'}
              </button>
            </form>

            <div className="mt-8 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-gray-400 hover:text-white text-[11px] font-bold tracking-widest uppercase transition-colors">
                {isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- MAIN APPLICATION SHELL ---
    function MainApplication({ user, userData, setUserData, allUsers, allCourses, logout, updateLocalRole }) {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
      const role = userData.roles[0] || 'student';

      const showConfirm = (title, message, onConfirm) => setConfirmState({ isOpen: true, title, message, onConfirm });
      const closeConfirm = () => setConfirmState({ isOpen: false, title: '', message: '', onConfirm: null });

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setIsMobileMenuOpen(false);
      };

      return (
        <div className="flex flex-col lg:flex-row w-full h-screen overflow-hidden bg-app">
          {/* INVISIBLE TRANSLATOR MOUNT */}
          <GoogleTranslateWidget />

          {/* MOBILE HEADER - Highly Intuitive */}
          <div className="lg:hidden flex items-center justify-between p-4 border-b border-[#D4AF37]/20 glass-premium z-40 sticky top-0 shadow-lg">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 bg-[#D4AF37] rounded-full flex items-center justify-center overflow-hidden shadow-[0_0_10px_rgba(212,175,55,0.4)]">
                {userData.profilePic ? <img src={userData.profilePic} className="w-full h-full object-cover"/> : <Music size={14} className="text-black" />}
              </div>
              <h4 className="serif text-xl font-bold text-white tracking-wide">Musicoul</h4>
            </div>
            <div className="flex items-center gap-3">
              <CustomLanguageSelector />
              {role !== 'student' && (
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 text-[#D4AF37] hover:text-white transition-colors">
                  {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                </button>
              )}
            </div>
          </div>

          {isMobileMenuOpen && role !== 'student' && (
            <div className="fixed inset-0 bg-black/80 z-40 lg:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)} />
          )}

          {/* SIDEBAR */}
          <aside className={`fixed inset-y-0 left-0 z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:relative lg:translate-x-0 transition-transform duration-300 w-64 border-r border-white/5 glass flex flex-col p-6`}>
            <div className="hidden lg:flex items-center gap-4 mb-10 px-2">
              <div className="w-10 h-10 bg-[#D4AF37] rounded-full flex items-center justify-center shrink-0 overflow-hidden shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                {userData.profilePic ? <img src={userData.profilePic} className="w-full h-full object-cover"/> : <Music size={18} className="text-black" />}
              </div>
              <div>
                <h4 className="serif text-xl font-medium text-white tracking-wide">Musicoul</h4>
                <p className="gold-gradient-text text-[9px] tracking-widest uppercase font-bold">{role}</p>
              </div>
            </div>

            <nav className="flex-1 space-y-1 overflow-y-auto pr-2 custom-scrollbar">
              {role === 'student' && (
                <SidebarItem icon={<LayoutDashboard size={18}/>} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
              )}

              {role === 'teacher' && (
                <>
                  <SidebarItem icon={<LayoutDashboard size={18}/>} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
                  <SidebarItem icon={<Calendar size={18}/>} label="Attendance" active={activeTab === 'attendance'} onClick={() => handleTabChange('attendance')} />
                </>
              )}

              {role === 'admin' && (
                <>
                  <div className="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-6 mb-3 px-4">Admin</div>
                  <SidebarItem icon={<LayoutDashboard size={18}/>} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
                  <SidebarItem icon={<Calendar size={18}/>} label="Attendance" active={activeTab === 'attendance'} onClick={() => handleTabChange('attendance')} />
                  <SidebarItem icon={<Users size={18}/>} label="Users" active={activeTab === 'manage-users'} onClick={() => handleTabChange('manage-users')} />
                  <SidebarItem icon={<BookOpen size={18}/>} label="Courses" active={activeTab === 'manage-courses'} onClick={() => handleTabChange('manage-courses')} />
                </>
              )}

              <div className="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-6 mb-3 px-4">Personal</div>
              <SidebarItem icon={<UserIcon size={18}/>} label="Profile" active={activeTab === 'profile'} onClick={() => handleTabChange('profile')} />
            </nav>

            {/* Simulator restricted to Admin only */}
            {userData.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' && (
              <div className="mt-8 mb-4 glass p-4 rounded-xl border-[#D4AF37]/20">
                <p className="text-[8px] text-[#D4AF37] uppercase tracking-[0.2em] mb-3 font-bold flex items-center gap-2">
                  <Settings size={10} /> View As
                </p>
                <div className="flex gap-1 bg-black/50 p-1 rounded-lg">
                  {['student', 'teacher', 'admin'].map(r => (
                    <button 
                      key={r} onClick={() => updateLocalRole(r)}
                      className={`flex-1 py-2 rounded text-[7px] md:text-[8px] tracking-wider font-bold transition-all uppercase ${role === r ? 'bg-[#D4AF37] text-black' : 'text-gray-500 hover:text-white'}`}
                    >
                      {r.substring(0,3)}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div className="mt-8 mb-4 glass p-4 rounded-xl border-white/5 flex flex-col items-start gap-3 relative z-50">
               <p className="text-[8px] text-gray-500 uppercase tracking-[0.2em] font-bold flex items-center gap-2">
                 Site Language
               </p>
               <CustomLanguageSelector />
            </div>

            <button onClick={logout} className="flex items-center gap-4 p-4 text-gray-500 hover:text-[#D4AF37] transition-all text-[10px] font-bold tracking-widest uppercase w-full rounded-xl hover:bg-white/5 mt-auto">
              <LogOut size={20}/> <span>Sign Out</span>
            </button>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 h-[calc(100vh-65px)] lg:h-screen overflow-y-auto relative">
            <div className="p-4 sm:p-6 md:p-10 lg:p-14 max-w-7xl mx-auto min-h-full">
              {(role === 'student' || role === 'admin') && activeTab === 'dashboard' && <StudentDashboard user={user} userData={userData} courses={allCourses} />}
              {role === 'teacher' && activeTab === 'dashboard' && <TeacherDashboard user={user} userData={userData} courses={allCourses} users={allUsers} showConfirm={showConfirm} />}
              {role === 'teacher' && activeTab === 'attendance' && <TeacherAttendance user={user} userData={userData} courses={allCourses} users={allUsers} isAdmin={false} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'attendance' && <TeacherAttendance user={user} userData={userData} courses={allCourses} users={allUsers} isAdmin={true} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'manage-users' && <AdminUsers users={allUsers} courses={allCourses} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'manage-courses' && <AdminCourses courses={allCourses} showConfirm={showConfirm} />}
              {activeTab === 'profile' && <UserProfile user={user} userData={userData} setUserData={setUserData} />}
            </div>
          </main>

          {/* MOBILE BOTTOM NAVIGATION FOR STUDENTS */}
          {role === 'student' && (
            <div className="lg:hidden fixed bottom-0 left-0 right-0 glass-premium border-t border-[#D4AF37]/30 flex justify-around items-center p-3 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
              <button onClick={() => handleTabChange('dashboard')} className={`flex flex-col items-center gap-1.5 p-2 transition-colors ${activeTab === 'dashboard' ? 'text-[#D4AF37]' : 'text-gray-500 hover:text-gray-300'}`}>
                <LayoutDashboard size={22} />
                <span className="text-[9px] uppercase tracking-widest font-bold">Dashboard</span>
              </button>
              <button onClick={() => handleTabChange('profile')} className={`flex flex-col items-center gap-1.5 p-2 transition-colors ${activeTab === 'profile' ? 'text-[#D4AF37]' : 'text-gray-500 hover:text-gray-300'}`}>
                <UserIcon size={22} />
                <span className="text-[9px] uppercase tracking-widest font-bold">Profile</span>
              </button>
              <button onClick={logout} className="flex flex-col items-center gap-1.5 p-2 transition-colors text-gray-500 hover:text-red-400">
                <LogOut size={22} />
                <span className="text-[9px] uppercase tracking-widest font-bold">Sign Out</span>
              </button>
            </div>
          )}

          {confirmState.isOpen && (
            <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#050505]/90 backdrop-blur-md animate-in fade-in">
              <div className="glass-premium p-8 md:p-12 w-full max-w-sm rounded-[2rem] border border-[#D4AF37]/30 shadow-2xl text-center">
                <AlertCircle size={32} className="mx-auto text-red-500 mb-4" />
                <h2 className="serif text-3xl mb-2 text-white italic">{confirmState.title}</h2>
                <p className="text-gray-400 text-sm mb-8 font-light">{confirmState.message}</p>
                <div className="flex gap-3">
                  <button onClick={closeConfirm} className="flex-1 py-3 border border-white/10 rounded-xl text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors">Cancel</button>
                  <button onClick={() => { confirmState.onConfirm(); closeConfirm(); }} className="flex-1 bg-red-900/40 text-red-400 border border-red-500/30 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition-colors">Confirm Delete</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button 
          onClick={onClick} 
          className={`w-full flex items-center gap-4 p-4 rounded-xl transition-all duration-300 group ${
            active 
              ? 'bg-white/10 text-[#D4AF37] border border-white/10 shadow-[0_0_15px_rgba(212,175,55,0.1)]' 
              : 'text-gray-500 hover:text-white hover:bg-white/5 border border-transparent'
          }`}
        >
          <span className={active ? 'text-[#D4AF37]' : 'group-hover:text-white transition-colors'}>{icon}</span>
          <span className="text-[10px] font-bold uppercase tracking-widest">{label}</span>
        </button>
      );
    }

    function TeacherAttendance({ user, userData, courses, users, isAdmin, showConfirm }) {
      const taughtCourses = isAdmin ? courses : courses.filter(c => userData.enrolledCourses?.includes(c.id));
      
      const [selectedCourseId, setSelectedCourseId] = useState(null);
      const [selectedLectureId, setSelectedLectureId] = useState(null);

      const activeCourse = courses.find(c => c.id === selectedCourseId);
      const activeLecture = activeCourse?.schedule?.find(s => s.id === selectedLectureId);
      const enrolledStudents = activeCourse ? users.filter(u => u.enrolledCourses?.includes(activeCourse.id) && u.roles.includes('student')) : [];

      const markAttendance = async (studentId, status) => {
        try {
          const existingRecords = activeCourse.attendance?.filter(a => !(a.userId === studentId && a.scheduleId === activeLecture.id)) || [];
          const newRecord = { userId: studentId, scheduleId: activeLecture.id, status, markedAt: new Date().toISOString() };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', activeCourse.id), {
            attendance: [...existingRecords, newRecord]
          });
          toast(`Marked ${status}`);
        } catch(err) {
          toast("Error marking attendance");
        }
      };

      const clearAttendance = async (studentId) => {
        showConfirm("Delete Attendance", "Are you sure you want to delete this attendance record?", async () => {
          try {
            const existingRecords = activeCourse.attendance?.filter(a => !(a.userId === studentId && a.scheduleId === activeLecture.id)) || [];
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', activeCourse.id), {
              attendance: existingRecords
            });
            toast("Attendance Deleted");
          } catch(err) {
            toast("Error deleting attendance");
          }
        });
      };

      if (activeLecture) {
        return (
          <div className="animate-in fade-in duration-500">
            <button onClick={() => setSelectedLectureId(null)} className="text-[#D4AF37] text-[10px] font-bold uppercase tracking-[0.2em] mb-8 hover:text-white transition-colors flex items-center gap-2">
              <ChevronLeft size={14} /> Back to Lectures
            </button>
            <header className="mb-10">
              <div className="bg-[#D4AF37]/10 border border-[#D4AF37]/30 text-[#D4AF37] px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest mb-4 inline-flex items-center gap-2">
                 <Calendar size={14} /> {activeLecture.date}
              </div>
              <h1 className="serif text-4xl md:text-6xl mb-2 text-white">Lecture Attendance</h1>
              <p className="text-gray-400 text-sm font-light">{activeLecture.title}</p>
            </header>
            <div className="glass-premium p-6 md:p-10 rounded-[2rem]">
              <h3 className="serif text-2xl md:text-3xl text-white mb-6 border-b border-white/5 pb-4 italic">Student List</h3>
              {enrolledStudents.length === 0 ? (
                <p className="text-gray-500 text-[10px] font-bold tracking-[0.2em] uppercase">No students enrolled.</p>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                  {enrolledStudents.map(student => {
                    const markedRecord = activeCourse.attendance?.find(a => a.userId === student.id && a.scheduleId === activeLecture.id);
                    return (
                      <div key={student.id} className="glass border border-white/5 p-5 rounded-2xl flex items-center justify-between hover-lift">
                        <div className="truncate pr-4 flex items-center gap-4">
                          <div className="w-12 h-12 rounded-full bg-gradient-to-br from-gray-800 to-black border border-white/10 flex items-center justify-center text-white serif text-xl shrink-0 overflow-hidden shadow-inner">
                            {student.profilePic ? <img src={student.profilePic} className="w-full h-full object-cover" /> : student.name.charAt(0)}
                          </div>
                          <div>
                            <p className="text-white font-medium text-sm truncate">{student.name}</p>
                            <p className="text-gray-500 text-[9px] uppercase tracking-widest mt-1 font-bold">Student</p>
                          </div>
                        </div>
                        <div className="flex gap-2 shrink-0">
                          <button onClick={() => markAttendance(student.id, 'present')} className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold transition-all text-xs border ${markedRecord?.status === 'present' ? 'bg-green-900/30 text-green-400 border-green-500/50 shadow-[0_0_15px_rgba(34,197,94,0.2)]' : 'bg-transparent border-white/10 text-gray-500 hover:border-green-500/50 hover:text-green-400'}`}>P</button>
                          <button onClick={() => markAttendance(student.id, 'absent')} className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold transition-all text-xs border ${markedRecord?.status === 'absent' ? 'bg-red-900/30 text-red-400 border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : 'bg-transparent border-white/10 text-gray-500 hover:border-red-500/50 hover:text-red-400'}`}>A</button>
                          {(isAdmin || markedRecord) && (
                            <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); clearAttendance(student.id); }} title="Delete Record" className="w-10 h-10 rounded-xl flex items-center justify-center transition-all border bg-transparent border-white/10 text-gray-500 hover:border-red-500/50 hover:text-red-400 hover:shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                              <Trash2 size={14} />
                            </button>
                          )}
                        </div>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
          </div>
        );
      }

      if (activeCourse) {
        return (
          <div className="animate-in fade-in duration-500">
            <button onClick={() => setSelectedCourseId(null)} className="text-[#D4AF37] text-[10px] font-bold uppercase tracking-[0.2em] mb-8 hover:text-white transition-colors flex items-center gap-2">
              <ChevronLeft size={14} /> Back to Courses
            </button>
            <header className="mb-10">
              <h1 className="serif text-4xl md:text-6xl mb-2 text-white">Select <span className="gold-gradient-text italic">Lecture</span></h1>
              <p className="text-gray-400 text-sm font-light mt-2">{activeCourse.title}</p>
            </header>
            {(!activeCourse.schedule || activeCourse.schedule.length === 0) ? (
              <div className="glass-premium rounded-[2rem] p-16 text-center text-gray-500 text-[10px] font-bold tracking-[0.2em] uppercase">No lectures scheduled yet.</div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                 {activeCourse.schedule.sort((a,b) => new Date(a.date) - new Date(b.date)).map((s, idx) => (
                   <button key={s.id} onClick={() => setSelectedLectureId(s.id)} className="glass-premium p-6 md:p-8 rounded-[1.5rem] text-left hover:bg-white/5 transition-colors group relative overflow-hidden hover-lift border-t-[3px] border-t-[#D4AF37]/50">
                     <p className="text-[#D4AF37] text-[10px] uppercase tracking-widest font-bold mb-4 flex items-center gap-2"><Clock size={14}/> {s.date}</p>
                     <h4 className="serif text-2xl text-white mb-2">{s.title}</h4>
                     <p className="text-gray-400 text-xs leading-relaxed font-light line-clamp-2">{s.description}</p>
                   </button>
                 ))}
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="animate-in fade-in duration-500">
          <header className="mb-10 md:mb-12">
            <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-2 text-white">Attendance <span className="gold-gradient-text italic">Ledger</span></h1>
            <p className="text-gray-400 text-sm font-light mt-2">Select a course to mark lecture attendance.</p>
          </header>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            {taughtCourses.map(c => (
              <button key={c.id} onClick={() => setSelectedCourseId(c.id)} className="glass-premium p-6 md:p-8 rounded-[2rem] flex flex-col text-left relative overflow-hidden group min-h-[200px] hover-lift">
                {c.coverImage ? (
                  <div className="absolute inset-0 z-0 opacity-[0.15] group-hover:opacity-30 transition-opacity duration-500">
                    <img src={c.coverImage} className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent"></div>
                  </div>
                ) : null}
                <div className="relative z-10 flex flex-col h-full w-full">
                  <h3 className="serif text-3xl text-white mb-4">{c.title}</h3>
                  <div className="mt-auto flex items-center justify-between">
                     <span className="text-gray-400 text-[10px] uppercase tracking-widest font-bold bg-black/50 px-4 py-2 rounded-lg border border-white/5 backdrop-blur-md">{c.schedule?.length || 0} Lectures</span>
                     <ChevronRight size={20} className="text-gray-500 group-hover:text-[#D4AF37]" />
                  </div>
                </div>
              </button>
            ))}
            {taughtCourses.length === 0 && <p className="text-gray-500 text-[10px] font-bold tracking-[0.2em] uppercase col-span-full">No courses available.</p>}
          </div>
        </div>
      );
    }

    // ==========================================
    // PREMIUM STUDENT DASHBOARD
    // ==========================================
    function StudentDashboard({ user, userData, courses }) {
      const [activeCourseId, setActiveCourseId] = useState(null);
      const [previewResource, setPreviewResource] = useState(null);

      const activeCourse = courses.find(c => c.id === activeCourseId);
      const myCourses = courses.filter(c => userData.enrolledCourses?.includes(c.id));

      if (activeCourse) {
        return (
          <React.Fragment>
            <CourseViewer 
              course={activeCourse} 
              user={user} 
              onBack={() => setActiveCourseId(null)} 
              onViewResource={setPreviewResource}
            />
            {previewResource && (
              <ResourcePreviewer resource={previewResource} onClose={() => setPreviewResource(null)} />
            )}
          </React.Fragment>
        );
      }

      return (
        <div className="animate-in fade-in duration-700">
          <header className="mb-12 flex flex-col lg:flex-row lg:items-end justify-between gap-6">
            <div>
              <p className="text-[#D4AF37] text-[10px] tracking-widest uppercase font-bold flex items-center gap-2 mb-3">
                <GraduationCap size={16} /> {userData.roles.includes('admin') ? 'Admin View' : 'Student Dashboard'}
              </p>
              <h1 className="serif text-4xl md:text-6xl text-white">
                Welcome, <span className="gold-gradient-text italic">{userData.name?.includes('@') ? userData.name.split('@')[0] : userData.name || "Scholar"}</span>
              </h1>
            </div>
            <div className="flex items-center gap-6 glass px-8 py-5 rounded-2xl border border-[#D4AF37]/20 shadow-[0_0_20px_rgba(212,175,55,0.05)]">
               <div className="text-center">
                  <p className="text-gray-500 text-[10px] tracking-widest uppercase font-bold mb-1">Courses</p>
                  <p className="serif text-3xl gold-gradient-text">{myCourses.length}</p>
               </div>
               <div className="w-[1px] h-10 bg-white/10"></div>
               <div className="text-center">
                  <p className="text-gray-500 text-[10px] tracking-widest uppercase font-bold mb-1">Status</p>
                  <p className="serif text-3xl gold-gradient-text">Active</p>
               </div>
            </div>
          </header>

          <div className="mb-8 flex items-center gap-6">
            <h3 className="serif text-3xl md:text-4xl gold-gradient-text italic font-bold">My Curriculum</h3>
            <div className="h-[1px] flex-1 bg-gradient-to-r from-[#D4AF37]/50 to-transparent"></div>
          </div>

          {myCourses.length === 0 ? (
            <div className="glass-premium rounded-[3rem] p-16 md:p-24 text-center flex flex-col items-center justify-center border border-white/5">
              <div className="w-20 h-20 bg-black/50 rounded-full flex items-center justify-center mb-8 border border-white/10 shadow-inner">
                <BookOpen size={32} className="text-gray-500" />
              </div>
              <h4 className="serif text-3xl mb-3 text-white">No Courses Assigned</h4>
              <p className="text-gray-500 text-sm max-w-md mx-auto font-light leading-relaxed">
                {userData.roles.includes('admin') ? 'Assign yourself courses in the Users tab.' : 'Your curriculum is being prepared. Please check back later.'}
              </p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-8">
              {myCourses.map(course => (
                <button 
                  key={course.id}
                  onClick={() => setActiveCourseId(course.id)}
                  className="glass-premium rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-8 text-left group relative overflow-hidden flex flex-col min-h-[250px] md:min-h-[300px] hover-lift border border-[#D4AF37]/20 shadow-lg"
                >
                  {course.coverImage ? (
                    <div className="absolute inset-0 z-0">
                      <img src={course.coverImage} alt={course.title} className="w-full h-full object-cover opacity-[0.25] group-hover:opacity-[0.4] transition-opacity duration-500" />
