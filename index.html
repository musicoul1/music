<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="shortcut icon" href="Assets/Images/Logo.png" type="image/x-icon">
  <title>Musicoul</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel Compiler -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Maps for React & Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0"
      }
    }
  </script>

  <!-- Application Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;600;800&family=Tiro+Devanagari+Marathi:ital@0;1&family=Mukta:wght@300;400;600;800&display=swap');
    
    .serif { font-family: 'Cormorant Garamond', 'Tiro Devanagari Marathi', serif; }
    .sans { font-family: 'Inter', 'Mukta', sans-serif; }
    
    .bg-app { background-color: #050505; }
    .text-gold { color: #D4AF37; }
    .bg-gold { background-color: #D4AF37; }
    
    /* Premium Glassmorphism styling */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .glass-premium {
      background: linear-gradient(145deg, rgba(20,20,20,0.8) 0%, rgba(5,5,5,0.9) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    .gold-gradient-text {
      background: linear-gradient(to right, #D4AF37, #FFDF73, #D4AF37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.4); }

    input[type="file"]::file-selector-button {
      border: 1px solid rgba(212, 175, 55, 0.3);
      background: transparent;
      color: #D4AF37;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-right: 16px;
      transition: all 0.3s ease;
    }
    input[type="file"]::file-selector-button:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(1) saturate(5) hue-rotate(5deg);
      cursor: pointer;
      width: 20px;
      height: 20px;
    }

    .hover-lift {
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(212, 175, 55, 0.15);
    }

    /* Fixed Google Translate Custom Styling & Mobile Fixes */
    .goog-te-gadget { font-family: 'Inter', 'Mukta', sans-serif !important; color: transparent !important; font-size: 0 !important; }
    .goog-te-gadget > span { display: none !important; }
    .goog-te-combo { 
      background-color: rgba(0,0,0,0.5) !important; color: #D4AF37 !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; 
      padding: 12px 14px !important; border-radius: 10px !important; font-size: 16px !important; text-transform: uppercase; 
      letter-spacing: 0.05em; outline: none; width: 100%; cursor: pointer; appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D4AF37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 12px auto;
    }
    
    /* Make translated text larger and more readable on mobile */
    html.translated-ltr font, html.translated-rtl font { 
        font-size: 115% !important; 
        line-height: 1.6 !important; 
    }
    
    /* Give buttons more breathing room when translated */
    html.translated-ltr button, html.translated-rtl button, 
    html.translated-ltr a, html.translated-rtl a { 
        padding-top: 0.75rem; 
        padding-bottom: 0.75rem; 
    }
    
    .goog-te-combo:focus { border-color: #D4AF37 !important; }
    .skiptranslate iframe, .goog-te-banner-frame.skiptranslate { display: none !important; }
    body { top: 0px !important; }
    #google_translate_element_wrapper { position: absolute; opacity: 0; z-index: -999; pointer-events: none; }
  </style>
</head>
<body class="bg-app text-gray-300 min-h-screen sans selection:bg-[#D4AF37] selection:text-black font-light text-base">
  
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LayoutDashboard, BookOpen, Users, Settings, LogOut, Plus, Trash2, Calendar, FileText, PlayCircle, 
      Image as ImageIcon, ChevronRight, GraduationCap, Music, Link as LinkIcon, Menu, X, Mail, Lock, 
      User as UserIcon, UploadCloud, File as FileIcon, ImagePlus, Clock, Folder, FolderPlus, ChevronLeft,
      FolderOpen, AlertCircle, Edit3, Paperclip, Video
    } from 'lucide-react';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
    import { 
      getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      signOut, setPersistence, browserLocalPersistence, signInWithCustomToken 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, 
      updateDoc, deleteDoc, addDoc, arrayUnion 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { 
      getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBaDBLoe2Wi2WgmJfPRXoEP-ZSgkVhMxVI",
      authDomain: "musicoul-15025.firebaseapp.com",
      databaseURL: "https://musicoul-15025-default-rtdb.firebaseio.com",
      projectId: "musicoul-15025",
      storageBucket: "musicoul-15025.firebasestorage.app",
      messagingSenderId: "863099041367",
      appId: "1:863099041367:web:c3d61399489a219611d512",
      measurementId: "G-WBPE697N9Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const appId = "musicoul-prod";

    // --- Format Helpers for Schedule ---
    const formatTime = (time24h) => {
        if (!time24h) return '';
        const [hours, minutes] = time24h.split(':');
        const h = parseInt(hours, 10);
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 || 12;
        return `${h12.toString().padStart(2, '0')}:${minutes} ${ampm}`;
    };

    const formatDDMMYYYY = (dateString) => {
        if (!dateString) return '';
        const parts = dateString.split('-');
        if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
        return dateString;
    };

    // --- Flawless History State Manager For Hardware Back Button ---
    const hardwareBackStack = [];
    
    function useHardwareBack(isActive, onBack) {
      const onBackRef = useRef(onBack);
      
      useEffect(() => {
        onBackRef.current = onBack;
      }, [onBack]);

      useEffect(() => {
        if (!isActive) return;
        
        const handlerObj = {
          execute: () => {
             if (onBackRef.current) onBackRef.current();
          }
        };
        
        hardwareBackStack.push(handlerObj);
        
        return () => {
          const idx = hardwareBackStack.indexOf(handlerObj);
          if (idx > -1) hardwareBackStack.splice(idx, 1);
        };
      }, [isActive]);
    }

    const toast = (msg) => {
      const t = document.createElement('div');
      t.className = "fixed bottom-28 right-4 md:top-10 md:right-10 md:bottom-auto bg-[#111] border border-[#D4AF37]/40 text-[#D4AF37] px-6 py-4 rounded-xl font-medium text-sm md:text-xs tracking-wide shadow-2xl transition-all duration-300 animate-in fade-in z-[99999]";
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 300);
      }, 4000);
    };

    const extractYoutubeId = (url) => {
      if (!url) return null;
      const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/|live\/)|youtu\.be\/)([^"&?\/\s]{11})/i;
      const match = url.match(regExp);
      return match ? match[1] : null;
    };

    const getYoutubeEmbedUrl = (url) => {
      const videoId = extractYoutubeId(url);
      return videoId ? `https://www.youtube.com/embed/${videoId}?rel=0` : url;
    };

    const getAllChildrenIds = (folderId, resources) => {
        let ids = [];
        const children = resources.filter(r => r.parentId === folderId);
        for(const child of children) {
            ids.push(child.id);
            if(child.isFolder || child.type === 'youtube' || child.type === 'video') {
               ids = ids.concat(getAllChildrenIds(child.id, resources));
            }
        }
        return ids;
    };

    const buildBreadcrumbs = (folderId, resources) => {
        let path = [];
        let curr = folderId;
        while(curr) {
            const f = resources?.find(r => r.id === curr);
            if(f) { 
                path.unshift(f); 
                curr = f.parentId; 
            } else { 
                curr = null; 
            }
        }
        return path;
    };

    function SmartBackButton({ label }) {
      const handleBack = () => window.history.back();
      
      return (
        <button onClick={handleBack} className="text-[#D4AF37] text-xs md:text-[11px] font-bold uppercase tracking-wider mb-6 md:mb-8 hover:text-white transition-colors flex items-center gap-2 w-fit relative z-10 hover-lift bg-black/40 px-4 py-2.5 rounded-xl border border-[#D4AF37]/20 backdrop-blur-md">
          <ChevronLeft size={18} /> {label || 'Back'}
        </button>
      );
    }

    const CustomLanguageSelector = () => {
      const getInitialLang = () => {
        const match = document.cookie.match(/googtrans=\/en\/([^;]+)/);
        return match ? match[1] : 'en';
      };
      
      const [lang, setLang] = useState(getInitialLang);

      const handleLanguageChange = (e) => {
        const newLang = e.target.value;
        setLang(newLang);
        
        if (newLang === 'en') {
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=' + window.location.hostname + '; path=/;';
        } else {
          document.cookie = `googtrans=/en/${newLang}; path=/`;
          document.cookie = `googtrans=/en/${newLang}; domain=${window.location.hostname}; path=/`;
        }

        const googleSelect = document.querySelector('.goog-te-combo');
        if (googleSelect) {
           googleSelect.value = newLang;
           googleSelect.dispatchEvent(new Event('change', { bubbles: true }));
        }

        // Automatic reload to ensure layout and translated text render flawlessly immediately
        setTimeout(() => {
           window.location.reload();
        }, 250);
      };

      return (
        <select 
          value={lang} 
          onChange={handleLanguageChange} 
          className="bg-black/80 border border-[#D4AF37]/50 text-[#D4AF37] text-xs md:text-[10px] font-bold uppercase tracking-wider rounded-xl px-4 py-2.5 outline-none cursor-pointer text-center shadow-[0_0_15px_rgba(212,175,55,0.2)] hover:bg-[#D4AF37]/10 transition-colors"
        >
          <option value="en">ENG</option>
          <option value="hi">हिंदी (HI)</option>
          <option value="mr">मराठी (MR)</option>
        </select>
      );
    };

    const GoogleTranslateWidget = React.memo(() => {
      useEffect(() => {
        const initTranslate = () => {
          if (window.google && window.google.translate && window.google.translate.TranslateElement) {
             const el = document.getElementById('google_translate_element');
             if (el && el.innerHTML === '') {
               new window.google.translate.TranslateElement(
                 { pageLanguage: 'en', includedLanguages: 'hi,mr', layout: window.google.translate.TranslateElement.InlineLayout.SIMPLE },
                 'google_translate_element'
               );
             }
          }
        };

        if (!document.getElementById('google-translate-script')) {
          window.googleTranslateElementInit = initTranslate;
          const script = document.createElement('script');
          script.id = 'google-translate-script';
          script.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
          document.body.appendChild(script);
        } else {
          setTimeout(initTranslate, 300);
        }
      }, []);

      return (
        <div id="google_translate_element_wrapper">
          <div id="google_translate_element"></div>
        </div>
      );
    });

    function CollageSlider({ resource }) {
        const images = resource.url.split(',').map(u => u.trim()).filter(Boolean);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [isZoomed, setIsZoomed] = useState(false);

        const next = () => { setCurrentIndex((i) => (i + 1) % images.length); setIsZoomed(false); };
        const prev = () => { setCurrentIndex((i) => (i - 1 + images.length) % images.length); setIsZoomed(false); };

        if(images.length === 0) return <div className="text-gray-500 text-sm md:text-base w-full h-full flex items-center justify-center">No images found.</div>;

        return (
            <div className="w-full h-full relative flex flex-col bg-[#050505] overflow-hidden group items-center justify-center">
                <div className="relative w-full h-full flex items-center justify-center overflow-auto custom-scrollbar p-4 md:p-6">
                    <img 
                        src={images[currentIndex]} 
                        className={`transition-all duration-300 ${isZoomed ? 'max-w-none cursor-zoom-out scale-[1.5] origin-center' : 'max-w-full max-h-full object-contain cursor-zoom-in rounded-[1.5rem] md:rounded-[2rem] border border-white/5'}`} 
                        onClick={() => setIsZoomed(!isZoomed)}
                        alt={`Slide ${currentIndex + 1}`}
                    />
                </div>
                
                {images.length > 1 && (
                    <>
                        <button onClick={prev} className="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 md:w-14 md:h-14 bg-black/80 text-white rounded-full flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all border border-white/10 z-10 shadow-xl">
                            <ChevronLeft size={28} />
                        </button>
                        <button onClick={next} className="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 md:w-14 md:h-14 bg-black/80 text-white rounded-full flex items-center justify-center hover:bg-[#D4AF37] hover:text-black transition-all border border-white/10 z-10 shadow-xl">
                            <ChevronRight size={28} />
                        </button>
                        
                        <div className="absolute bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-black/80 px-6 py-3 rounded-[1.5rem] border border-white/10 z-10 overflow-x-auto max-w-[85vw] custom-scrollbar">
                            {images.map((img, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => {setCurrentIndex(i); setIsZoomed(false);}} 
                                    className={`shrink-0 rounded-xl overflow-hidden transition-all border ${i === currentIndex ? 'border-[#D4AF37] w-16 h-16 opacity-100 shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'border-transparent w-12 h-12 opacity-50 hover:opacity-100'}`}
                                >
                                    <img src={img} className="w-full h-full object-cover" />
                                </button>
                            ))}
                        </div>
                    </>
                )}
            </div>
        );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      
      const [allUsers, setAllUsers] = useState([]);
      const [allCourses, setAllCourses] = useState([]);

      useEffect(() => {
        try { getAnalytics(app); } catch (e) {}

        let unsubscribe = () => {};

        const initializeSession = async () => {
          try {
            await setPersistence(auth, browserLocalPersistence);
          } catch (err) {
            console.error("Persistence setting failed:", err);
          }
          
          if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
            try { await signInWithCustomToken(auth, window.__initial_auth_token); } catch(e) {}
          }

          unsubscribe = onAuthStateChanged(auth, async (u) => {
            if (u) {
              setUser(u);
              try {
                const profileSnap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'));
                if (profileSnap.exists()) {
                  setUserData(profileSnap.data());
                } else {
                  const fallbackProfile = {
                    name: u.displayName || "Scholar",
                    email: u.email || '',
                    roles: [u.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' ? 'admin' : 'student'],
                    enrolledCourses: [],
                    createdAt: new Date().toISOString()
                  };
                  try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'), fallbackProfile);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), fallbackProfile);
                  } catch (e) {
                    console.warn("Storage warning:", e);
                  }
                  setUserData(fallbackProfile);
                }
              } catch (err) {
                console.error("Profile fetch error:", err);
                setUserData({
                  name: u.displayName || "Scholar",
                  email: u.email || '',
                  roles: [u.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' ? 'admin' : 'student'], 
                  enrolledCourses: [],
                  createdAt: new Date().toISOString()
                });
                toast("Connection slow. Operating in offline mode.");
              }
            } else {
              setUser(null);
              setUserData(null);
            }
            setAuthLoading(false);
          });
        };

        initializeSession();
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !userData) return; 

        const qUsers = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
        const qCourses = query(collection(db, 'artifacts', appId, 'public', 'data', 'courses'));

        const unsubUsers = onSnapshot(qUsers, 
          (snap) => setAllUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (error) => console.error("Users snapshot error:", error)
        );

        const unsubCourses = onSnapshot(qCourses, 
          (snap) => setAllCourses(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
          (error) => console.error("Courses snapshot error:", error)
        );

        return () => { unsubUsers(); unsubCourses(); };
      }, [user, userData]);

      const logout = () => signOut(auth);

      if (authLoading) {
        return (
          <div className="bg-app text-white min-h-screen flex items-center justify-center font-sans">
            <div className="flex flex-col items-center gap-6">
              <div className="w-20 h-20 border-4 border-[#D4AF37]/20 border-t-[#D4AF37] rounded-full animate-spin" />
              <h2 className="serif text-3xl text-gold">Loading</h2>
            </div>
          </div>
        );
      }

      return (
        <div className="flex w-full h-full">
          {!user || !userData ? (
            <AuthScreen db={db} allUsers={allUsers} setAuthLoading={setAuthLoading} setUserData={setUserData} />
          ) : (
            <MainApplication 
              user={user} 
              userData={userData} 
              setUserData={setUserData}
              allUsers={allUsers} 
              allCourses={allCourses} 
              logout={logout}
              updateLocalRole={(newRole) => setUserData({...userData, roles: [newRole]})}
            />
          )}
        </div>
      );
    }

    function AuthScreen({ db, allUsers, setAuthLoading, setUserData }) {
      const [isLogin, setIsLogin] = useState(true);

      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        const form = e.target;
        const email = form.email.value;
        const password = form.password.value;
        const name = form.name?.value;

        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
            toast("Welcome Back");
          } else {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            const initialRole = (email.toLowerCase() === 'chandrashekharkolhe7@gmail.com') ? 'admin' : 'student';

            const newProfile = {
              name: name,
              email: email,
              roles: [initialRole],
              enrolledCourses: [],
              createdAt: new Date().toISOString()
            };

            try {
              await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid, 'profile', 'info'), newProfile);
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', cred.user.uid), newProfile);
            } catch (storageErr) {
              console.warn("Storage warning:", storageErr);
            }
            
            setUserData(newProfile);
            toast(`Welcome, ${name}`);
          }
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') {
            toast("Email already registered. Please login.");
            setIsLogin(true);
          } else if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
            toast("Invalid email or password.");
          } else if (err.code === 'auth/weak-password') {
            toast("Password should be at least 6 characters.");
          } else if (err.code === 'auth/network-request-failed') {
            toast("Network error. Please check your connection.");
          } else {
            const simpleMsg = err.message ? err.message.replace('Firebase: ', '').split(' (')[0] : 'Unknown error';
            toast(`Auth Error: ${simpleMsg}`);
          }
          setAuthLoading(false);
        }
      };

      return (
        <div className="w-full min-h-screen flex items-center justify-center p-4 md:p-8 bg-app">
          <div className="glass-premium p-8 md:p-14 w-full max-w-lg z-10 relative overflow-hidden shadow-2xl rounded-3xl md:rounded-[2.5rem]">

            <div className="text-center mb-12">
              <img src="Assets/Images/Logo.png" alt="Musicoul Logo" className="w-24 h-24 mx-auto mb-5 object-contain" />

                {isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login"}
              </button>
            </div>
          </div>
        </div>
      );

    function MainApplication({ user, userData, setUserData, allUsers, allCourses, logout, updateLocalRole }) {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
      const role = userData.roles[0] || 'student';

      useEffect(() => {
        const handlePopState = () => {
          if (hardwareBackStack.length > 0) {
            const topHandler = hardwareBackStack[hardwareBackStack.length - 1];
            topHandler.execute();
          }
        };
        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      const showConfirm = (title, message, onConfirm) => setConfirmState({ isOpen: true, title, message, onConfirm });
      const closeConfirm = () => setConfirmState({ isOpen: false, title: '', message: '', onConfirm: null });

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setIsMobileMenuOpen(false);
      };

      return (
        <div className="flex flex-col lg:flex-row w-full h-screen overflow-hidden bg-app">
          <GoogleTranslateWidget />

          {/* MOBILE HEADER */}
          <div className="lg:hidden flex items-center justify-between p-4 md:p-5 border-b border-[#D4AF37]/20 glass-premium z-40 sticky top-0 shadow-lg min-h-[70px]">
            <div className="flex items-center gap-4">
              <div className="w-12 h-12 flex items-center justify-center overflow-hidden shrink-0">
                <img src="Assets/Images/Logo.png" alt="Musicoul" className="w-full h-full object-contain" />
              </div>
              <h4 className="serif text-3xl font-bold text-white tracking-wide">Musicoul</h4>
            </div>
            <div className="flex items-center gap-4">
              <CustomLanguageSelector />
              <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-3 bg-white/5 rounded-xl text-[#D4AF37] hover:bg-white/10 transition-colors">
                {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}

            </div>
          </div>

          {isMobileMenuOpen && (
            <div className="fixed inset-0 bg-black/80 z-40 lg:hidden backdrop-blur-md" onClick={() => setIsMobileMenuOpen(false)} />

          {/* SIDEBAR */}
          <aside className={`fixed inset-y-0 left-0 z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:relative lg:translate-x-0 transition-transform duration-300 w-80 lg:w-80 border-r border-white/5 glass flex flex-col p-6 shadow-[20px_0_50px_rgba(0,0,0,0.5)] lg:shadow-none`}>
            <div className="hidden lg:flex items-center gap-5 mb-12 px-2">
              <div className="w-16 h-16 flex items-center justify-center shrink-0 overflow-hidden">
                <img src="Assets/Images/Logo.png" alt="Musicoul" className="w-full h-full object-contain" />
              </div>
              <div>
                <h4 className="serif text-3xl md:text-4xl font-bold text-white tracking-wide">Musicoul</h4>
                <p className="gold-gradient-text text-xs md:text-[10px] tracking-widest uppercase font-bold mt-1">{role}</p>
              </div>
            </div>

            <nav className="flex-1 space-y-3 overflow-y-auto pr-3 custom-scrollbar">
              {role === 'student' && (
                <SidebarItem icon={<LayoutDashboard size={22}/>} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
              )}

              {role === 'teacher' && (
                <>
                  <SidebarItem icon={<LayoutDashboard size={22}/>} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
                  <SidebarItem icon={<Calendar size={22}/>} label="Attendance" active={activeTab === 'attendance'} onClick={() => handleTabChange('attendance')} />
                </>
              )}

              {role === 'admin' && (
                <>
                  <div className="text-xs md:text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-8 mb-4 px-4 border-b border-white/10 pb-2">Admin</div>
                  <SidebarItem icon={<LayoutDashboard size={22}/>} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
                  <SidebarItem icon={<Calendar size={22}/>} label="Attendance" active={activeTab === 'attendance'} onClick={() => handleTabChange('attendance')} />
                  <SidebarItem icon={<Users size={22}/>} label="Users" active={activeTab === 'manage-users'} onClick={() => handleTabChange('manage-users')} />
                  <SidebarItem icon={<BookOpen size={22}/>} label="Courses" active={activeTab === 'manage-courses'} onClick={() => handleTabChange('manage-courses')} />
                </>
              )}

              <div className="text-xs md:text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-8 mb-4 px-4 border-b border-white/10 pb-2">Personal</div>
              <SidebarItem icon={<UserIcon size={22}/>} label="Profile" active={activeTab === 'profile'} onClick={() => handleTabChange('profile')} />
            </nav>

            {userData.email?.toLowerCase() === 'chandrashekharkolhe7@gmail.com' && (
              <div className="mt-8 mb-4 glass p-5 rounded-2xl border-[#D4AF37]/20 shadow-lg">
                <p className="text-xs md:text-[10px] text-[#D4AF37] uppercase tracking-widest mb-4 font-bold flex items-center gap-2">

                </p>
                <div className="flex gap-2 bg-black/60 p-2 rounded-xl">
                  {['student', 'teacher', 'admin'].map(r => (
                    <button 
                      key={r} onClick={() => updateLocalRole(r)}
                      className={`flex-1 py-3 rounded-lg text-[10px] md:text-[9px] tracking-wider font-bold transition-all uppercase ${role === r ? 'bg-[#D4AF37] text-black shadow-md' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}
                    >
                      {r.substring(0,3)}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div className="mt-8 mb-6 glass p-5 rounded-2xl border-white/5 flex flex-col items-start gap-4 relative z-50">
               <p className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold flex items-center gap-2">
                 Site Language
               </p>
               <div className="w-full"><CustomLanguageSelector /></div>
            </div>

            <button onClick={logout} className="flex items-center gap-4 p-5 text-gray-500 hover:text-[#D4AF37] transition-all text-xs md:text-[11px] font-bold tracking-widest uppercase w-full rounded-2xl hover:bg-white/5 mt-auto border border-transparent hover:border-[#D4AF37]/30">
              <LogOut size={24}/> <span>Sign Out</span>
            </button>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 overflow-y-auto relative w-full h-full pb-8 lg:pb-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-black via-[#050505] to-[#050505]">
            <div className="p-5 sm:p-8 md:p-12 pb-32 sm:pb-32 md:pb-32 w-full max-w-7xl mx-auto min-h-full">
              {(role === 'student' || role === 'admin') && activeTab === 'dashboard' && <StudentDashboard user={user} userData={userData} courses={allCourses} />}
              {role === 'teacher' && activeTab === 'dashboard' && <TeacherDashboard user={user} userData={userData} courses={allCourses} users={allUsers} showConfirm={showConfirm} />}
              {role === 'teacher' && activeTab === 'attendance' && <TeacherAttendance user={user} userData={userData} courses={allCourses} users={allUsers} isAdmin={false} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'attendance' && <TeacherAttendance user={user} userData={userData} courses={allCourses} users={allUsers} isAdmin={true} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'manage-users' && <AdminUsers users={allUsers} courses={allCourses} showConfirm={showConfirm} />}
              {role === 'admin' && activeTab === 'manage-courses' && <AdminCourses courses={allCourses} showConfirm={showConfirm} />}
              {activeTab === 'profile' && <UserProfile user={user} userData={userData} setUserData={setUserData} />}
            </div>
          </main>

          {confirmState.isOpen && (
            <div className="fixed inset-0 z-[999999] flex items-center justify-center p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
              <div className="glass-premium p-8 md:p-14 w-full max-w-md rounded-[2.5rem] border border-[#D4AF37]/30 shadow-2xl text-center relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-red-500/50"></div>
                <AlertCircle size={56} className="mx-auto text-red-500 mb-6" />
                <h2 className="serif text-3xl md:text-4xl mb-4 text-white italic break-words">{confirmState.title}</h2>
                <p className="text-gray-300 text-sm md:text-xs mb-10 font-light leading-relaxed">{confirmState.message}</p>
                <div className="flex gap-4">
                  <button onClick={closeConfirm} className="flex-1 py-4 md:py-5 border border-white/10 rounded-xl md:rounded-2xl text-xs md:text-[11px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors bg-black/40">Cancel</button>
                  <button onClick={() => { confirmState.onConfirm(); closeConfirm(); }} className="flex-1 bg-red-900/40 text-red-400 border border-red-500/30 rounded-xl md:rounded-2xl text-xs md:text-[11px] font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition-colors shadow-lg">Confirm</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button 
          onClick={onClick} 
          className={`w-full flex items-center gap-4 p-4 md:p-5 rounded-2xl transition-all duration-300 group ${
            active 
              ? 'bg-white/10 text-[#D4AF37] border border-white/10 shadow-[0_0_20px_rgba(212,175,55,0.15)]' 
              : 'text-gray-400 hover:text-white hover:bg-white/5 border border-transparent'
          }`}
        >
          <span className={active ? 'text-[#D4AF37]' : 'group-hover:text-white transition-colors'}>{icon}</span>
          <span className="text-sm md:text-[11px] font-bold uppercase tracking-widest">{label}</span>
        </button>
      );
    }

    // ==========================================
    // SCHEDULE COMPONENT (Shared Premium Card)
    // ==========================================
    function ScheduleCard({ schedule, index, onRemove }) {
       const s = schedule;
       const dateParts = s.date ? s.date.split('-') : ['','',''];
       const year = dateParts[0];
       const month = dateParts[1];
       const day = dateParts[2] || s.date;

       return (
         <div className="glass-premium p-0 rounded-2xl md:rounded-[2rem] flex flex-col md:flex-row relative overflow-hidden group hover-lift border border-[#D4AF37]/10 shadow-lg mb-4">
            <div className="bg-black/60 w-full md:w-36 p-5 md:p-8 flex flex-row md:flex-col items-center justify-between md:justify-center border-b md:border-b-0 md:border-r border-white/5 shrink-0 relative">
               <div className="hidden md:block absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#D4AF37] to-[#B38D22]"></div>
               <div className="absolute left-0 top-0 w-1 h-full bg-gradient-to-b from-[#D4AF37] to-[#B38D22] md:hidden"></div>
               
               <div className="flex md:flex-col items-center gap-3 md:gap-0">
                 <span className="text-[#D4AF37] text-3xl md:text-4xl serif leading-none mb-0 md:mb-2">{day}</span>
                 <span className="text-gray-400 text-xs md:text-[10px] font-bold tracking-[0.2em] uppercase text-center">{month}-{year}</span>
               </div>
               
               <div className="md:mt-4 bg-[#D4AF37]/10 px-3 py-2 rounded-xl border border-[#D4AF37]/20 flex items-center gap-2 backdrop-blur-md">
                  <Clock size={16} className="text-[#D4AF37]" />
                  <span className="text-[#D4AF37] text-[10px] md:text-[9px] font-bold tracking-widest whitespace-nowrap">{formatTime(s.time) || 'TBA'}</span>
               </div>
            </div>
            
            <div className="p-5 md:p-8 flex-1 flex flex-col justify-center min-w-0">
               <div className="flex justify-between items-start mb-3 gap-4">
                  <div className="flex-1">
                     <span className="text-gray-500 text-[10px] md:text-[9px] uppercase tracking-[0.2em] font-bold mb-2 block">Lecture {index + 1}</span>
                     <h4 className="serif text-xl md:text-2xl text-white group-hover:text-[#D4AF37] transition-colors leading-tight break-words line-clamp-2">{s.title}</h4>
                  </div>
                  {onRemove && (
                    <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onRemove(s.id); }} className="text-gray-500 hover:text-red-400 p-3 rounded-xl hover:bg-red-500/10 transition-colors shrink-0 bg-black/30 border border-white/5">
                      <Trash2 size={20} />
                    </button>
                  )}
               </div>
               <p className="text-gray-400 text-sm md:text-xs leading-relaxed font-light break-words">{s.description}</p>
            </div>
         </div>
       );
    }

    // ==========================================
    // STUDENT VIEW COMPONENTS
    // ==========================================
    function StudentDashboard({ user, userData, courses }) {
      const [activeCourseId, setActiveCourseId] = useState(null);
      const [previewResource, setPreviewResource] = useState(null);

      useHardwareBack(!!activeCourseId, () => setActiveCourseId(null));
      useHardwareBack(!!previewResource, () => setPreviewResource(null));

      const activeCourse = courses.find(c => c.id === activeCourseId);
      const myCourses = courses.filter(c => userData.enrolledCourses?.includes(c.id));

      const openCourse = (id) => {
         window.history.pushState({ internalNav: true }, "");
         setActiveCourseId(id);
      }
      
      const handleViewResource = (res) => {
         window.history.pushState({ internalNav: true }, "");
         setPreviewResource(res);
      }

      if (previewResource && activeCourse) {
         return <ResourcePreviewer resource={previewResource} course={activeCourse} userData={userData} onClose={() => window.history.back()} />;
      }

      if (activeCourse) {
        return (
            <CourseViewer 
              course={activeCourse} 
              userData={userData}
              onBack={() => window.history.back()} 
              onViewResource={handleViewResource}
            />
        );
      }

      return (
        <div className="animate-in fade-in duration-700">
          <header className="mb-8 md:mb-14 flex flex-col lg:flex-row lg:items-end justify-between gap-8">
            <div className="flex-1">
              <p className="text-[#D4AF37] text-sm md:text-[10px] tracking-widest uppercase font-bold flex items-center gap-3 mb-4">
                <GraduationCap size={24} className="md:w-5 md:h-5" /> {userData.roles.includes('admin') ? 'Admin View' : 'Student Dashboard'}
              </p>
              <h1 className="serif text-3xl md:text-5xl lg:text-6xl text-white break-words">
                Welcome, <br className="hidden md:block lg:hidden" /><span className="gold-gradient-text italic">{userData.name?.includes('@') ? userData.name.split('@')[0] : userData.name || "Scholar"}</span>
              </h1>
            </div>
            <div className="flex items-center justify-around md:justify-start gap-6 md:gap-8 glass px-6 py-5 md:px-10 md:py-6 rounded-3xl border border-[#D4AF37]/20 shadow-xl w-full lg:w-auto">
               <div className="text-center">
                  <p className="text-gray-400 text-xs md:text-[10px] tracking-widest uppercase font-bold mb-2">Courses</p>
                  <p className="serif text-2xl md:text-4xl gold-gradient-text">{myCourses.length}</p>
               </div>
               <div className="w-[1px] h-10 md:h-14 bg-white/10"></div>
               <div className="text-center">
                  <p className="text-gray-400 text-xs md:text-[10px] tracking-widest uppercase font-bold mb-2">Status</p>
                  <p className="serif text-2xl md:text-4xl gold-gradient-text">Active</p>
               </div>
            </div>
          </header>

          <div className="mb-6 md:mb-10 flex items-center gap-5 md:gap-8">
            <h3 className="serif text-2xl md:text-3xl gold-gradient-text italic font-bold">My Curriculum</h3>
            <div className="h-[2px] flex-1 bg-gradient-to-r from-[#D4AF37]/50 to-transparent"></div>
          </div>

          {myCourses.length === 0 ? (
            <div className="glass-premium rounded-[2rem] md:rounded-[3rem] p-10 md:p-24 text-center flex flex-col items-center justify-center border border-white/5">
              <div className="w-20 h-20 bg-black/50 rounded-full flex items-center justify-center mb-8 border border-white/10 shadow-inner">
                <BookOpen size={36} className="text-gray-500" />
              </div>
              <h4 className="serif text-2xl md:text-3xl mb-4 text-white">No Courses Assigned</h4>
              <p className="text-gray-400 text-sm md:text-xs max-w-lg mx-auto font-light leading-relaxed">
                {userData.roles.includes('admin') ? 'Assign yourself courses in the Users tab.' : 'Your curriculum is being prepared. Please check back later.'}
              </p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-10 pb-12">
              {myCourses.map(course => (
                <button 
                  key={course.id}
                  onClick={() => openCourse(course.id)}
                  className="glass-premium rounded-[2rem] p-6 md:p-10 text-left group relative overflow-hidden flex flex-col min-h-[250px] md:min-h-[350px] hover-lift border border-[#D4AF37]/20 shadow-xl"
                >
                  {course.coverImage ? (
                    <div className="absolute inset-0 z-0">
                      <img src={course.coverImage} alt={course.title} className="w-full h-full object-cover opacity-[0.25] group-hover:opacity-[0.4] transition-opacity duration-500" />
                      <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/80 to-transparent"></div>
                    </div>
                  ) : null}
                  
                  <div className="relative z-10 flex-1 flex flex-col">
                    <div className="w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-gradient-to-br from-[#D4AF37]/20 to-black border border-[#D4AF37]/30 flex items-center justify-center mb-6 md:mb-8 group-hover:border-[#D4AF37] transition-colors shadow-inner backdrop-blur-md shrink-0">
                      <Music size={28} className="text-[#D4AF37]" />
                    </div>
                    
                    <h4 className="serif text-2xl md:text-3xl mb-3 text-white leading-tight font-bold drop-shadow-lg break-words line-clamp-2">{course.title}</h4>
                    <p className="text-gray-300 text-sm md:text-xs mb-8 line-clamp-3 font-medium leading-relaxed drop-shadow-md">{course.desc}</p>
                    
                    <div className="flex items-center justify-between mt-auto pt-6 border-t border-white/10">
                      <div className="flex items-center gap-3 text-xs md:text-[10px] text-black uppercase tracking-widest font-bold bg-gradient-to-r from-[#D4AF37] to-[#FFDF73] px-4 py-2.5 rounded-xl shadow-lg">
                        <FolderOpen size={16} /> {course.resources?.length || 0} Materials
                      </div>
                      <div className="w-10 h-10 rounded-full bg-black/50 border border-white/10 flex items-center justify-center group-hover:bg-[#D4AF37] group-hover:text-black transition-colors backdrop-blur-md">
                         <ChevronRight size={20} />
                      </div>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // TEACHER & ADMIN VIEW DASHBOARDS
    // ==========================================
    function TeacherDashboard({ user, userData, courses, users, showConfirm }) {
      const [activeCourseId, setActiveCourseId] = useState(null);
      
      useHardwareBack(!!activeCourseId, () => setActiveCourseId(null));
      
      const activeCourse = courses.find(c => c.id === activeCourseId);
      const taughtCourses = courses.filter(c => userData.enrolledCourses?.includes(c.id));

      const handleOpenCourse = (id) => {
         window.history.pushState({ internalNav: true }, "");
         setActiveCourseId(id);
      };

      if (activeCourse) {
         return <AdminCourseEditor course={activeCourse} userData={userData} onBack={() => window.history.back()} showConfirm={showConfirm} />;
      }

      return (
        <div className="animate-in fade-in duration-700">
          <header className="mb-8 md:mb-14">
            <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-3 text-white">Teacher <span className="gold-gradient-text italic">Dashboard</span></h1>
            <p className="text-gray-300 text-sm font-light">Welcome back, <span className="text-white font-medium">{userData.name}</span></p>
          </header>

          <div className="mb-6 md:mb-10 flex items-center gap-5 md:gap-8">
            <h3 className="serif text-2xl md:text-3xl gold-gradient-text italic font-bold">Assigned Courses</h3>
            <div className="h-[2px] flex-1 bg-gradient-to-r from-[#D4AF37]/50 to-transparent"></div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10 pb-12">
            {taughtCourses.map(course => (
              <div key={course.id} className="glass-premium p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] flex flex-col relative overflow-hidden group hover-lift min-h-[250px] md:min-h-[300px] border border-[#D4AF37]/10">
                {course.coverImage && (
                  <div className="absolute inset-0 z-0 opacity-[0.15] group-hover:opacity-30 transition-opacity duration-500">
                    <img src={course.coverImage} className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent"></div>
                  </div>

                <div className="relative z-10 flex flex-col h-full">

    function AdminUsers({ users, courses, showConfirm }) {
      const toggleRole = async (userId, userRoles, targetRole) => {
        try {
          const targetUser = users.find(u => u.id === userId);
          if (targetRole === 'admin' && targetUser?.email !== 'chandrashekharkolhe7@gmail.com') {
             toast("Admin role restricted to chandrashekharkolhe7@gmail.com");
             return;
          }

          let newRoles = [...(userRoles || [])];
          if (newRoles.includes(targetRole)) newRoles = newRoles.filter(r => r !== targetRole);
          else newRoles.push(targetRole);
          if (newRoles.length === 0) newRoles = ['student']; 

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { roles: newRoles });
          await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), { roles: newRoles });
          toast("Role Updated");
        } catch(err) { toast("Error updating role"); }
      };

      const handleEnrollment = async (userId, userCourses, courseId) => {
        try {
          let updatedCourses = [...(userCourses || [])];
          if (updatedCourses.includes(courseId)) updatedCourses = updatedCourses.filter(id => id !== courseId);
          else updatedCourses.push(courseId);

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { enrolledCourses: updatedCourses });
          await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'info'), { enrolledCourses: updatedCourses });
          toast("Enrollment Updated");
        } catch(err) { toast("Error updating enrollment"); }
      };

      const removeUser = async (userId) => {
        showConfirm("Delete Profile", "Permanently delete this user profile? This action cannot be undone.", async () => {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId));
            toast("User Profile Deleted");
          } catch(err) { toast("Error deleting user"); }
        });
      };

      return (
        <div className="animate-in fade-in duration-500">
          <header className="mb-8 md:mb-14">

            <p className="text-gray-300 text-sm font-light">Manage accounts, roles, and course placements.</p>
          </header>
          <div className="space-y-5 pb-12">

              <div key={u.id} className="relative z-0 hover:z-50 focus-within:z-50 glass-premium p-5 md:p-8 rounded-[1.5rem] flex flex-col xl:flex-row xl:items-center justify-between gap-6 border border-white/5">
                <div className="flex items-center gap-5">
                  <div className="w-14 h-14 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-gray-800 to-black border border-white/10 flex items-center justify-center text-white serif text-2xl md:text-3xl shadow-inner shrink-0 overflow-hidden">
                    {u.profilePic ? <img src={u.profilePic} className="w-full h-full object-cover" /> : u.name.charAt(0)}
                  </div>
                  <div className="overflow-hidden flex-1">
                    <h4 className="text-base font-medium text-white mb-2 break-words line-clamp-1">{u.name}</h4>
                    <div className="flex flex-wrap gap-2">
                      {u.roles?.map(r => <span key={r} className="text-[10px] md:text-[9px] bg-black text-[#D4AF37] border border-[#D4AF37]/30 px-3 py-1 rounded-md font-bold uppercase tracking-[0.2em]">{r}</span>)}
                    </div>
                  </div>
                </div>
                <div className="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                  <div className="flex bg-black/50 p-1.5 rounded-xl border border-white/10 flex-1 sm:flex-none">
                    {['student', 'teacher', 'admin'].map(r => (
                       <button key={r} onClick={() => toggleRole(u.id, u.roles || [], r)} className={`flex-1 sm:flex-none px-4 py-3 text-xs md:text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all ${u.roles?.includes(r) ? 'bg-[#D4AF37] text-black shadow-md' : 'text-gray-500 hover:text-white'}`}>{r.substring(0,3)}</button>
                    ))}
                  </div>
                  <div className="relative group flex-1 sm:flex-none">
                    <button className="w-full bg-black/50 border border-white/10 px-6 py-3 rounded-xl text-xs md:text-[10px] font-bold uppercase tracking-widest text-gray-300 hover:text-white hover:border-[#D4AF37]/50 transition-all">Courses</button>
                    <div className="absolute right-0 top-full mt-2 w-full sm:w-72 glass-premium p-5 rounded-2xl opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-all z-20 max-h-64 overflow-y-auto shadow-2xl border border-[#D4AF37]/30 custom-scrollbar">
                       <p className="text-xs md:text-[10px] text-[#D4AF37] uppercase tracking-widest font-bold mb-4 border-b border-white/10 pb-3">Available Courses</p>
                       {courses.length === 0 ? <p className="text-xs text-gray-400">No courses exist.</p> : courses.map(c => {
                         const isEnrolled = u.enrolledCourses?.includes(c.id);
                         return (
                           <label key={c.id} className="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl cursor-pointer transition-colors mb-1">
                             <input type="checkbox" checked={isEnrolled} onChange={() => handleEnrollment(u.id, u.enrolledCourses, c.id)} className="accent-[#D4AF37] w-5 h-5 rounded shrink-0" />
                             <span className="text-sm md:text-sm text-white break-words font-light">{c.title}</span>

                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeUser(u.id); }} className="px-5 py-3 bg-black/50 hover:bg-red-500/20 text-gray-500 hover:text-red-400 border border-white/10 rounded-xl transition-all flex items-center justify-center shrink-0">
                    <Trash2 size={20} />
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

            <button onClick={() => setShowModal(true)} className="bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black px-6 md:px-8 py-4 md:py-5 rounded-xl text-xs md:text-[11px] font-bold uppercase tracking-widest transition-all shadow-xl flex items-center justify-center gap-3 shrink-0 hover:scale-105 active:scale-95"><Plus size={20} /> New Course</button>

                <div className="relative z-10 flex flex-col h-full">

                    <h3 className="serif text-2xl md:text-3xl text-white leading-tight break-words line-clamp-2 flex-1">{c.title}</h3>
                    <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); deleteCourseRecord(c.id); }} className="w-10 h-10 rounded-xl bg-black/50 border border-white/10 flex items-center justify-center text-gray-400 hover:text-red-400 transition-colors shrink-0"><Trash2 size={20} /></button>

                  <p className="text-gray-300 text-sm md:text-xs mb-6 line-clamp-3 font-light leading-relaxed">{c.desc}</p>

          {showModal && (

                <button onClick={() => setShowModal(false)} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-500 hover:text-white"><X size={28}/></button>

                  <div><input name="title" type="text" placeholder="COURSE TITLE" required className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-xs tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-500" /></div>
