    function AdminCourseEditor({ course, userData, onBack, showConfirm }) {
      const [currentFolderId, setCurrentFolderId] = useState(null);
      const [showResourceModal, setShowResourceModal] = useState(false);
      const [showFolderModal, setShowFolderModal] = useState(false);
      const [showScheduleModal, setShowScheduleModal] = useState(false);
      const [showEditCourseModal, setShowEditCourseModal] = useState(false);
      const [previewResource, setPreviewResource] = useState(null);

      useHardwareBack(!!previewResource, () => setPreviewResource(null));
      useHardwareBack(!!currentFolderId, () => {
         const folder = course.resources?.find(res => res.id === currentFolderId);
         setCurrentFolderId(folder?.parentId || null);
      });

      const openFolder = (id) => {
         window.history.pushState({ internalNav: true }, "");
         setCurrentFolderId(id);
      };

      const handleViewResource = (res) => {
         window.history.pushState({ internalNav: true }, "");
         setPreviewResource(res);
      };

      const removeResource = async (resId) => {
        showConfirm("Remove Material", "Remove this material permanently? (If it's a folder, all contents inside will also be deleted)", async () => {
          const allRes = course.resources || [];
          let toDelete = [resId];
          const resource = allRes.find(r => r.id === resId);
          
          if(resource?.isFolder) {
              toDelete = toDelete.concat(getAllChildrenIds(resId, allRes));
          }

          const newResources = allRes.filter(r => !toDelete.includes(r.id));
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { resources: newResources });
          toast("Material Removed Successfully");
        });
      };

      const removeSchedule = async (scheduleId) => {
        showConfirm("Remove Schedule", "Remove this lecture schedule from the syllabus?", async () => {
          const newSchedule = (course.schedule || []).filter(s => s.id !== scheduleId);
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { schedule: newSchedule });
          toast("Schedule Removed");
        });
      };

      const allResources = course.resources || [];
      const currentResources = allResources.filter(r => (r.parentId || null) === currentFolderId);
      const breadcrumbs = buildBreadcrumbs(currentFolderId, allResources);

      if (previewResource) {
         return <ResourcePreviewer resource={previewResource} course={course} userData={userData} onClose={() => window.history.back()} showConfirm={showConfirm} />;
      }

      return (
        <div className="animate-in fade-in slide-in-from-right-8 duration-500">
          <SmartBackButton label="Back to Courses" />
          
          <header className="mb-8 md:mb-14 relative rounded-[2rem] md:rounded-[3rem] overflow-hidden glass-premium border border-[#D4AF37]/20 p-8 md:p-14 shadow-2xl">
            {course.coverImage && (
              <div className="absolute inset-0 z-0">
                <img src={course.coverImage} alt="Cover" className="w-full h-full object-cover opacity-20 mix-blend-overlay" />
                <div className="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/80 to-transparent"></div>
              </div>
            )}
            <div className="relative z-10 flex flex-col md:flex-row md:justify-between md:items-start gap-6">
              <div className="flex-1">
                <span className="bg-[#D4AF37] text-black px-3 py-1.5 rounded-lg text-[10px] md:text-[9px] font-bold uppercase tracking-widest mb-4 inline-block">Management</span>
                <h1 className="serif text-3xl md:text-5xl lg:text-6xl mb-4 text-white leading-tight break-words">{course.title}</h1>
                <p className="text-gray-300 text-sm md:text-base max-w-4xl leading-relaxed font-light break-words">{course.desc}</p>
              </div>
              <button onClick={() => setShowEditCourseModal(true)} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-5 py-3 md:py-4 rounded-xl md:rounded-2xl text-xs md:text-[11px] font-bold uppercase tracking-widest transition-colors flex items-center justify-center gap-3 shrink-0 backdrop-blur-md w-full md:w-auto">
                <Edit3 size={20} /> Edit Details
              </button>
            </div>
          </header>
          
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-14 pb-12">
            
            {/* RESOURCES PANEL */}
            <div className="space-y-6 md:space-y-8">
              <div className="flex items-center justify-between">
                <h3 className="serif text-2xl md:text-3xl text-white italic">Materials</h3>
                <div className="hidden md:flex gap-3">
                   <button onClick={() => setShowFolderModal(true)} title="New Folder" className="w-12 h-12 glass text-gray-300 rounded-xl flex items-center justify-center hover:text-white transition-all border border-white/10 hover:border-[#D4AF37]/50">
                     <FolderPlus size={22} />
                   </button>
                   <button onClick={() => setShowResourceModal(true)} title="Upload Material" className="w-12 h-12 bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black rounded-xl flex items-center justify-center hover:shadow-[0_0_20px_rgba(212,175,55,0.4)] transition-all">
                     <Plus size={24} />
                   </button>
                </div>
              </div>

              <div className="md:hidden fixed bottom-8 right-6 z-[70] flex flex-col gap-4">
                 <button onClick={() => setShowFolderModal(true)} title="New Folder" className="w-14 h-14 glass-premium text-[#D4AF37] rounded-full flex items-center justify-center shadow-2xl border border-[#D4AF37]/50 hover:bg-[#D4AF37]/10 transition-all active:scale-95">
                   <FolderPlus size={24} />
                 </button>
                 <button onClick={() => setShowResourceModal(true)} title="Upload Material" className="w-16 h-16 bg-gradient-to-br from-[#D4AF37] to-[#B38D22] text-black rounded-full flex items-center justify-center shadow-2xl transition-all active:scale-95">
                   <Plus size={30} />
                 </button>
              </div>

              <div className="flex items-center gap-3 text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold bg-black/40 p-4 md:p-5 rounded-xl border border-white/5 backdrop-blur-md overflow-x-auto custom-scrollbar">
                <button onClick={() => setCurrentFolderId(null)} className="hover:text-white transition-colors flex items-center gap-2 shrink-0">
                  <FolderOpen size={18}/> Root
                </button>
                {breadcrumbs.map((f, i) => (
                  <React.Fragment key={f.id}>
                    <ChevronRight size={16} className="text-[#D4AF37]/50 shrink-0" />
                    <button onClick={() => openFolder(f.id)} className={`hover:text-white transition-colors break-words line-clamp-1 max-w-[150px] md:max-w-[250px] shrink-0 ${i === breadcrumbs.length-1 ? 'text-[#D4AF37]' : ''}`}>
                      {f.title}
                    </button>
                  </React.Fragment>
                ))}
              </div>

              <div className="space-y-4">
                {currentResources.length === 0 ? (
                  <div className="glass-premium rounded-2xl md:rounded-[2rem] p-10 md:p-16 text-center text-gray-500 text-xs md:text-[10px] font-bold tracking-[0.2em] uppercase border border-white/5">Empty Section</div>
                ) : (
                  currentResources.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0)).map(r => (
                    <div key={r.id} onClick={() => r.isFolder ? openFolder(r.id) : handleViewResource(r)} className="glass p-4 md:p-5 rounded-2xl md:rounded-[1.5rem] flex items-center justify-between group cursor-pointer hover-lift border border-white/5 hover:border-[#D4AF37]/30">
                      <div className="flex items-center gap-4 pr-3 overflow-hidden relative z-10 w-full">
                        <div className={`w-12 h-12 md:w-14 md:h-14 rounded-xl flex items-center justify-center shrink-0 border border-white/10 shadow-inner ${r.isFolder ? 'bg-gradient-to-br from-[#D4AF37]/20 to-black text-[#D4AF37]' : 'bg-gradient-to-br from-gray-800 to-black text-gray-400 group-hover:text-white'}`}>
                           {r.isFolder ? <Folder size={24} className="fill-[#D4AF37]/20"/> : 
                            r.type === 'video' ? <Video size={24}/> : 
                            r.type === 'youtube' ? <PlayCircle size={24} className="text-red-400"/> : 
                            r.type === 'image' || r.type === 'collage' ? <ImageIcon size={24}/> : 
                            r.type === 'link' ? <LinkIcon size={24}/> : 
                            <FileText size={24}/>}
                        </div>
                        <div className="flex-1 min-w-0">
                          <h4 className="text-white text-sm md:text-base font-bold tracking-wide mb-1 break-words line-clamp-2">{r.title}</h4>
                          <span className="text-[#D4AF37] opacity-80 text-[10px] md:text-[9px] uppercase tracking-widest font-bold block">{r.isFolder ? 'Folder' : r.type}</span>
                        </div>
                      </div>
                      <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); removeResource(r.id); }} className="text-gray-500 hover:text-red-400 p-3 rounded-xl hover:bg-red-500/10 transition-colors shrink-0 ml-2"><Trash2 size={20} /></button>
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* SCHEDULE PANEL */}
            <div className="space-y-6 md:space-y-8">
              <div className="flex items-center justify-between">
                <h3 className="serif text-2xl md:text-3xl text-white italic">Lecture Schedule</h3>
                <button onClick={() => setShowScheduleModal(true)} className="w-12 h-12 glass border border-white/10 text-gray-300 rounded-xl flex items-center justify-center hover:text-white hover:border-[#D4AF37]/50 transition-all shadow-lg"><Plus size={24} /></button>
              </div>
              <div className="space-y-5">
                {(!course.schedule || course.schedule.length === 0) ? (
                  <div className="glass-premium rounded-2xl md:rounded-[2rem] p-10 md:p-16 text-center text-gray-500 text-xs md:text-[10px] font-bold tracking-[0.2em] uppercase border border-white/5">No schedule created.</div>
                ) : (
                  course.schedule.sort((a,b) => new Date(a.date) - new Date(b.date)).map((s, idx) => (
                    <ScheduleCard key={s.id} schedule={s} index={idx} onRemove={removeSchedule} />
                  ))
                )}
              </div>
            </div>

          </div>
          
          {showResourceModal && <ResourceCreatorModal courseId={course.id} parentId={currentFolderId} onClose={() => setShowResourceModal(false)} />}
          {showFolderModal && <CreateFolderModal courseId={course.id} parentId={currentFolderId} courseResources={course.resources} onClose={() => setShowFolderModal(false)} />}
          {showScheduleModal && <ScheduleCreatorModal courseId={course.id} onClose={() => setShowScheduleModal(false)} />}
          {showEditCourseModal && <EditCourseModal course={course} onClose={() => setShowEditCourseModal(false)} />}
        </div>
      );
    }

    function CourseViewer({ course, userData, onBack, onViewResource }) {
      const [activeTab, setActiveTab] = useState('materials'); // materials | schedule | ledger
      const [currentFolderId, setCurrentFolderId] = useState(null);

      useHardwareBack(!!currentFolderId, () => {
         const folder = course.resources?.find(res => res.id === currentFolderId);
         setCurrentFolderId(folder?.parentId || null);
      });

      const openFolder = (id) => {
         window.history.pushState({ internalNav: true }, "");
         setCurrentFolderId(id);
      };

      const myAttendance = course.attendance?.filter(a => a.userId === userData.id) || [];
      const presentCount = myAttendance.filter(a => a.status === 'present').length;
      const totalLogs = myAttendance.length;
      const rate = totalLogs === 0 ? 0 : Math.round((presentCount / totalLogs) * 100);

      const allResources = course.resources || [];
      const currentResources = allResources.filter(r => (r.parentId || null) === currentFolderId);
      const breadcrumbs = buildBreadcrumbs(currentFolderId, allResources);

      return (
        <div className="animate-in fade-in duration-500">
          <SmartBackButton label="Back to Dashboard" />

          <header className="mb-8 md:mb-12 relative rounded-[2rem] md:rounded-[3rem] overflow-hidden glass-premium p-8 md:p-16 border border-[#D4AF37]/20 shadow-2xl">
            {course.coverImage && (
              <div className="absolute inset-0 z-0">
                <img src={course.coverImage} alt="Cover" className="w-full h-full object-cover opacity-20 mix-blend-overlay" />
                <div className="absolute inset-0 bg-gradient-to-r from-[#050505] via-[#050505]/90 to-transparent"></div>
              </div>
            )}
            <div className="relative z-10">
              <h1 className="serif text-3xl md:text-5xl lg:text-6xl mb-4 md:mb-6 text-white leading-tight break-words">{course.title}</h1>
              <p className="text-gray-300 text-sm md:text-base max-w-4xl leading-relaxed font-light break-words">{course.desc}</p>
            </div>
          </header>

          <div className="flex items-center gap-6 md:gap-14 border-b border-white/5 mb-6 md:mb-10 overflow-x-auto custom-scrollbar">
             {['materials', 'schedule', 'ledger'].map(tab => (
               <button 
                 key={tab} 
                 onClick={() => setActiveTab(tab)}
                 className={`pb-4 text-xs md:text-[11px] uppercase tracking-widest font-bold transition-all border-b-[3px] md:border-b-[4px] shrink-0 whitespace-nowrap ${activeTab === tab ? 'text-[#D4AF37] border-[#D4AF37]' : 'text-gray-500 border-transparent hover:text-gray-300'}`}
               >
                 {tab === 'materials' ? 'Materials' : tab === 'schedule' ? 'Schedule' : 'Attendance'}
               </button>
             ))}
          </div>

          <div>
            {activeTab === 'materials' && (
              <div className="space-y-6 md:space-y-8">
                <div className="flex items-center gap-3 text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold bg-black/40 p-4 md:p-5 rounded-xl border border-white/5 backdrop-blur-md overflow-x-auto custom-scrollbar">
                  <button onClick={() => setCurrentFolderId(null)} className="hover:text-white transition-colors flex items-center gap-2 shrink-0">
                    <FolderOpen size={18}/> Root
                  </button>
                  {breadcrumbs.map((f, i) => (
                    <React.Fragment key={f.id}>
                      <ChevronRight size={16} className="text-[#D4AF37]/50 shrink-0" />
                      <button onClick={() => openFolder(f.id)} className={`hover:text-white transition-colors break-words line-clamp-1 max-w-[150px] md:max-w-[250px] shrink-0 ${i === breadcrumbs.length-1 ? 'text-[#D4AF37]' : ''}`}>
                        {f.title}
                      </button>
                    </React.Fragment>
                  ))}
                </div>

                {currentResources.length === 0 ? (
                  <div className="glass-premium rounded-2xl md:rounded-[3rem] p-12 md:p-24 text-center text-gray-500 text-xs md:text-[10px] tracking-widest uppercase flex flex-col items-center border border-white/5 font-bold">
                    <FolderOpen size={48} className="mb-4 opacity-30 text-[#D4AF37]" />
                    Empty Section
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8 pb-12">
                    {currentResources.sort((a,b) => (b.isFolder ? 1 : 0) - (a.isFolder ? 1 : 0)).map(r => (
                      <button 
                        key={r.id}
                        onClick={() => r.isFolder ? openFolder(r.id) : onViewResource(r)}
                        className="glass p-5 md:p-6 rounded-2xl md:rounded-[1.5rem] flex items-center justify-between group text-left hover-lift border border-white/5 hover:border-[#D4AF37]/30"
                      >
                        {(r.type === 'video' || r.type === 'youtube') && r.thumbnailUrl && (
                          <div className="absolute inset-0 opacity-[0.15] group-hover:opacity-[0.3] transition-opacity z-0 pointer-events-none">
                            <img src={r.thumbnailUrl} className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/40 to-transparent"></div>
                          </div>
                        )}

                        <div className="flex items-center gap-4 relative z-10 overflow-hidden pr-3 w-full">
                          <div className={`w-12 h-12 md:w-16 md:h-16 rounded-xl flex items-center justify-center shrink-0 border border-white/10 transition-colors shadow-inner ${r.isFolder ? 'bg-gradient-to-br from-[#D4AF37]/20 to-black text-[#D4AF37]' : 'bg-gradient-to-br from-gray-800 to-black text-gray-400 group-hover:text-white'}`}>
                            {r.isFolder ? <Folder size={24} className="fill-[#D4AF37]/20"/> : 
                             r.type === 'video' ? <Video size={24}/> : 
                             r.type === 'youtube' ? <PlayCircle size={24} className="text-red-400"/> : 
                             r.type === 'image' || r.type === 'collage' ? <ImageIcon size={24}/> : 
                             r.type === 'link' ? <LinkIcon size={24}/> : <FileText size={24}/>}
                          </div>
                          <div className="flex-1 min-w-0">
                            <h4 className="text-white text-sm md:text-[13px] font-bold tracking-wider mb-1 break-words line-clamp-2">{r.title}</h4>
                            <p className="text-gray-400 text-[10px] md:text-[9px] uppercase tracking-widest font-bold block">{r.isFolder ? 'Folder' : `${r.type}`}</p>
                          </div>
                        </div>
                        <ChevronRight size={24} className={`${r.isFolder ? 'text-[#D4AF37]' : 'text-gray-600 group-hover:text-white'} transition-colors shrink-0 relative z-10 ml-2`} />
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'schedule' && (
               <div className="flex flex-col gap-5 md:gap-8 animate-in fade-in pb-12">
                  {(!course.schedule || course.schedule.length === 0) ? (
                    <div className="glass-premium rounded-2xl md:rounded-[3rem] p-12 md:p-20 text-center text-gray-500 text-xs md:text-[10px] font-bold tracking-widest uppercase border border-white/5">
                      Schedule not yet published.
                    </div>
                  ) : (
                    course.schedule.sort((a,b) => new Date(a.date) - new Date(b.date)).map((s, idx) => (
                       <ScheduleCard key={s.id} schedule={s} index={idx} />
                    ))
                  )}
               </div>
            )}

            {activeTab === 'ledger' && (
              <div className="max-w-3xl glass-premium p-6 md:p-14 rounded-3xl md:rounded-[3rem] border border-[#D4AF37]/20 shadow-2xl animate-in fade-in mb-12">
                <div className="flex flex-col sm:flex-row items-center sm:items-start gap-6 md:gap-10 mb-8 pb-8 border-b border-white/5 text-center sm:text-left">
                  <div className="w-24 h-24 md:w-32 md:h-32 rounded-full border-[4px] border-[#111] border-t-[#D4AF37] border-r-[#D4AF37] flex items-center justify-center shrink-0 shadow-[0_0_40px_rgba(212,175,55,0.15)] bg-black/50">
                    <span className="text-3xl md:text-4xl serif text-white">{rate}%</span>
                  </div>
                  <div className="flex-1">
                    <h3 className="serif text-2xl md:text-4xl text-white mb-2 md:mb-3 italic">Attendance Record</h3>
                    <p className="text-sm md:text-base text-gray-400 font-light">Your current standing for this specific course.</p>
                  </div>
                </div>
                
                <div className="space-y-4">
                  {myAttendance.length === 0 ? (
                    <p className="text-xs md:text-[10px] text-gray-500 font-bold tracking-widest uppercase text-center p-6">No records logged.</p>
                  ) : (
                    myAttendance.sort((a,b) => new Date(b.markedAt || 0) - new Date(a.markedAt || 0)).map((log, idx) => {
                      const lecture = course.schedule?.find(s => s.id === log.scheduleId);
                      return (
                        <div key={idx} className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 glass p-4 md:p-5 rounded-xl border border-white/5">
                          <div className="flex flex-col pr-4 flex-1">
                             <span className="text-sm md:text-sm text-white font-medium mb-1 break-words line-clamp-2">{lecture ? lecture.title : "Lecture Entry"}</span>
                             {lecture && <span className="text-[10px] md:text-[9px] text-gray-400 uppercase tracking-widest font-bold">{formatDDMMYYYY(lecture.date)}</span>}
                          </div>
                          <span className={`text-[10px] md:text-[9px] uppercase tracking-widest font-bold px-4 py-2 rounded-lg shrink-0 border shadow-inner text-center sm:w-auto w-full ${log.status === 'present' ? 'bg-green-900/20 text-green-400 border-green-500/30' : 'bg-red-900/20 text-red-400 border-red-500/30'}`}>
                            {log.status}
                          </span>
                        </div>
                      )
                    })
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ResourcePreviewer({ resource, course, userData, onClose, showConfirm }) {
      const isLessonView = resource.type === 'youtube' || resource.type === 'video';
      const [viewingAttachment, setViewingAttachment] = useState(null);

      useHardwareBack(!!viewingAttachment, () => setViewingAttachment(null));

      const handleOpenAttachment = (att) => {
         window.history.pushState({ internalNav: true }, "");
         setViewingAttachment(att);
      }

      if (isLessonView) {
        if (viewingAttachment) {
           return <StandardPreviewLayout resource={viewingAttachment} onClose={() => window.history.back()} />;
        }
        return (
          <LessonPlayerLayout 
            resource={resource} 
            course={course} 
            userData={userData} 
            onClose={onClose} 
            showConfirm={showConfirm}
            onOpenAttachment={handleOpenAttachment}
          />
        )
      }

      return <StandardPreviewLayout resource={resource} onClose={onClose} />;
    }

    function LessonPlayerLayout({ resource, course, userData, onClose, showConfirm, onOpenAttachment }) {
      const isTeacher = userData?.roles?.includes('teacher') || userData?.roles?.includes('admin');
      const attachments = course?.resources?.filter(r => r.parentId === resource.id) || [];
      const [activeTab, setActiveTab] = useState('overview'); // overview | attachments
      const [showCreator, setShowCreator] = useState(false);

      const deleteAttachment = async (attId, e) => {
        e.stopPropagation();
        if(showConfirm) {
          showConfirm("Delete Attachment", "Permanently delete this attachment?", async () => {
            const newRes = course.resources.filter(r => r.id !== attId);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { resources: newRes });
            toast("Attachment removed");
          });
        }
      };

      return (
        <div className="flex flex-col h-full w-full animate-in fade-in bg-app z-[100] absolute inset-0 pb-0 lg:pb-6">
          <div className="p-4 md:p-6 pb-2 md:pb-4 bg-app shrink-0 flex items-center shadow-lg border-b border-white/5 z-20 min-h-[60px]">
             <SmartBackButton label="Back to Course" />
          </div>

          <div className="flex flex-col lg:flex-row flex-1 overflow-hidden lg:mx-8 lg:mb-8 lg:glass-premium lg:rounded-[3rem] lg:border border-[#D4AF37]/20 lg:shadow-2xl">
            {/* Top/Left: Video Player Area - Robust Aspect Ratio implementation */}
            <div className="w-full lg:w-[65%] xl:w-[70%] bg-black relative flex flex-col shrink-0 border-b lg:border-b-0 lg:border-r border-white/10 z-10 lg:min-h-[500px]">
              {/* Force 16:9 on mobile, flex fill on desktop */}
              <div className="relative w-full aspect-video lg:aspect-auto lg:h-full lg:flex-1">
                {resource.type === 'youtube' ? (
                  <iframe
                    className="absolute inset-0 w-full h-full"
                    src={getYoutubeEmbedUrl(resource.url)}
                    title={resource.title}
                    frameBorder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerPolicy="strict-origin-when-cross-origin"
                    allowFullScreen
                  ></iframe>
                ) : (
                  <video className="absolute inset-0 w-full h-full object-contain outline-none bg-black" controls controlsList="nodownload" poster={resource.thumbnailUrl || ''} playsInline>
                    <source src={resource.url} />
                  </video>
                )}
              </div>
            </div>

            {/* Bottom/Right: Sidebar */}
            <div className="w-full lg:w-[35%] xl:w-[30%] bg-[#080808] flex flex-col flex-1 lg:h-full overflow-hidden shrink-0">
               
               {/* Tabs Header */}
               <div className="flex border-b border-white/10 bg-black shrink-0 relative z-10">
                 <button onClick={() => setActiveTab('overview')} className={`flex-1 py-5 text-xs md:text-[11px] font-bold uppercase tracking-widest transition-all ${activeTab === 'overview' ? 'text-[#D4AF37] border-b-[4px] border-[#D4AF37] bg-white/5' : 'text-gray-500 hover:text-gray-300'}`}>
                   Info
                 </button>
                 <button onClick={() => setActiveTab('attachments')} className={`flex-1 py-5 text-xs md:text-[11px] font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${activeTab === 'attachments' ? 'text-[#D4AF37] border-b-[4px] border-[#D4AF37] bg-white/5' : 'text-gray-500 hover:text-gray-300'}`}>
                   Notes ({attachments.length})
                 </button>
               </div>

               {/* Tab Content */}
               <div className="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar bg-[#080808]">
                  {activeTab === 'overview' && (
                    <div className="animate-in fade-in pb-20">
                      <p className="text-[#D4AF37] text-xs md:text-[10px] font-bold uppercase tracking-widest mb-3 flex items-center gap-2"><PlayCircle size={16}/> {resource.type}</p>
                      <h2 className="serif text-2xl md:text-3xl text-white mb-5 leading-tight break-words">{resource.title}</h2>
                      <div className="prose prose-invert max-w-none">
                         {resource.description ? (
                           <p className="text-gray-300 whitespace-pre-wrap leading-relaxed font-light text-sm md:text-sm">
                             {resource.description}
                           </p>
                         ) : (
                           <p className="text-gray-600 text-sm font-light italic">No extra info provided.</p>
                         )}
                      </div>
                    </div>
                  )}

                  {activeTab === 'attachments' && (
                    <div className="animate-in fade-in space-y-4 pb-24">
                       {isTeacher && (
                         <button onClick={() => setShowCreator(true)} className="w-full bg-gradient-to-r from-[#D4AF37] to-[#B38D22] text-black py-4 rounded-xl text-xs md:text-[11px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:shadow-[0_0_20px_rgba(212,175,55,0.4)] transition-all mb-6">
                           <Plus size={18} /> Add Note / Link / File
                         </button>
                       )}
                       
                       {attachments.length === 0 ? (
                         <div className="text-center py-10 border border-dashed border-white/10 rounded-2xl bg-black/40">
                           <Paperclip size={32} className="mx-auto text-gray-600 mb-4" />
                           <p className="text-gray-500 text-xs md:text-[10px] font-bold uppercase tracking-widest">No notes attached.</p>
                         </div>
                       ) : (
                         attachments.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt)).map(att => (
                           <div key={att.id} onClick={() => {
                               if(att.type === 'link') window.open(att.url, '_blank');
                               else onOpenAttachment(att);
                           }} className="glass p-4 md:p-5 rounded-xl flex items-center justify-between group cursor-pointer hover-lift border border-white/5 hover:border-[#D4AF37]/30 transition-all">
                              <div className="flex items-center gap-4 overflow-hidden">
                                <div className="w-10 h-10 md:w-12 md:h-12 rounded-lg bg-black/50 border border-white/10 flex items-center justify-center text-gray-400 group-hover:text-white group-hover:bg-[#D4AF37]/10 transition-colors shrink-0">
                                  {att.type === 'pdf' ? <FileText size={20}/> : 
                                   att.type === 'image' || att.type === 'collage' ? <ImageIcon size={20}/> :
                                   att.type === 'text' ? <FileText size={20}/> :
                                   att.type === 'link' ? <LinkIcon size={20}/> : <Paperclip size={20}/>}
                                </div>
                                <div className="truncate flex-1">
                                  <h4 className="text-white text-sm md:text-[13px] font-medium break-words line-clamp-1 mb-1 group-hover:text-[#D4AF37] transition-colors">{att.title}</h4>
                                  <span className="text-gray-500 text-[10px] md:text-[9px] uppercase tracking-widest font-bold">
                                    {att.type === 'link' ? 'External Link' : att.type === 'text' ? 'Note' : att.type}
                                  </span>
                                </div>
                              </div>
                              {isTeacher ? (
                                 <button onClick={(e) => deleteAttachment(att.id, e)} className="text-gray-600 hover:text-red-400 p-2.5 rounded-lg hover:bg-red-500/10 transition-colors shrink-0 ml-2">
                                   <Trash2 size={18} />
                                 </button>
                              ) : (
                                 <ChevronRight size={20} className="text-gray-600 group-hover:text-white transition-colors shrink-0 ml-2" />
                              )}
                           </div>
                         ))
                       )}
                    </div>
                  )}
               </div>
            </div>

            {showCreator && <ResourceCreatorModal courseId={course.id} parentId={resource.id} onClose={() => setShowCreator(false)} defaultType="text" />}
          </div>
        </div>
      );
    }

    function StandardPreviewLayout({ resource, onClose }) {
      return (
        <div className="flex flex-col h-full w-full animate-in fade-in bg-app z-[110] absolute inset-0 pb-0 lg:pb-8">
          <div className="p-4 md:p-8 pb-3 md:pb-6 bg-app shrink-0 flex items-center shadow-lg border-b border-white/5 z-20 min-h-[70px]">
             <SmartBackButton label="Back" />
          </div>
          
          <div className="mb-6 text-left relative z-10 shrink-0 px-5 md:px-8 pt-6">
            <p className="text-[#D4AF37] text-xs md:text-[10px] uppercase tracking-widest font-bold mb-2">Viewing {resource.type}</p>
            <h2 className="serif text-3xl md:text-4xl text-white break-words line-clamp-2 max-w-5xl">{resource.title}</h2>
          </div>
          
          <div className="flex-1 w-full lg:max-w-[calc(100%-4rem)] lg:mx-auto lg:glass-premium lg:rounded-[3rem] overflow-hidden relative lg:border border-white/10 lg:shadow-2xl flex items-center justify-center bg-[#050505]">

            {resource.type === 'pdf' && (
               <iframe src={`${resource.url}#toolbar=0`} className="w-full h-full bg-[#111]"></iframe>
            )}

            {resource.type === 'image' && (
              <div className="w-full h-full p-4 md:p-8 overflow-auto flex items-center justify-center custom-scrollbar">
                 <img src={resource.url} alt={resource.title} className="max-w-full max-h-full object-contain rounded-2xl md:rounded-[2rem] border border-white/5" />
              </div>
            )}

            {resource.type === 'collage' && <CollageSlider resource={resource} />}

            {resource.type === 'text' && (
              <div className="w-full h-full flex flex-col items-center p-6 md:p-14 overflow-y-auto custom-scrollbar bg-black/50">
                <div className="max-w-5xl w-full glass p-8 md:p-16 rounded-2xl md:rounded-[3rem] border border-white/5 shadow-2xl">
                  <FileText size={48} className="text-[#D4AF37] mb-8 mx-auto opacity-50" />
                  <p className="text-gray-200 whitespace-pre-wrap leading-relaxed font-light text-base md:text-sm font-sans">
                    {resource.url}
                  </p>
                </div>
              </div>
            )}

            {resource.type === 'link' && (
              <div className="w-full h-full flex flex-col items-center justify-center p-8 text-center bg-black/50">
                <div className="glass-premium p-10 md:p-14 rounded-3xl md:rounded-[3rem] border border-white/10 max-w-lg w-full shadow-2xl">
                  <LinkIcon size={56} className="text-[#D4AF37] mb-6 mx-auto" />
                  <h3 className="serif text-2xl md:text-3xl text-white mb-4">External Link</h3>
                  <p className="text-gray-300 mb-8 text-sm md:text-sm font-light leading-relaxed">This points to an external site. Click to open securely.</p>
                  <a href={resource.url} target="_blank" rel="noreferrer" className="inline-block bg-[#D4AF37] text-black px-8 py-4 rounded-xl text-xs md:text-[11px] font-bold uppercase tracking-widest hover:bg-[#F9E29D] transition-colors shadow-xl">
                    Open Link Now
                  </a>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function TeacherAttendance({ user, userData, courses, users, isAdmin, showConfirm }) {
      const taughtCourses = isAdmin ? courses : courses.filter(c => userData.enrolledCourses?.includes(c.id));
      
      const [selectedCourseId, setSelectedCourseId] = useState(null);
      const [selectedLectureId, setSelectedLectureId] = useState(null);

      useHardwareBack(!!selectedCourseId, () => setSelectedCourseId(null));
      useHardwareBack(!!selectedLectureId, () => setSelectedLectureId(null));

      const handleOpenCourse = (id) => {
         window.history.pushState({ internalNav: true }, "");
         setSelectedCourseId(id);
      }
      
      const handleOpenLecture = (id) => {
         window.history.pushState({ internalNav: true }, "");
         setSelectedLectureId(id);
      }

      const activeCourse = courses.find(c => c.id === selectedCourseId);
      const activeLecture = activeCourse?.schedule?.find(s => s.id === selectedLectureId);
      const enrolledStudents = activeCourse ? users.filter(u => u.enrolledCourses?.includes(activeCourse.id) && u.roles.includes('student')) : [];

      const markAttendance = async (studentId, status) => {
        try {
          const existingRecords = activeCourse.attendance?.filter(a => !(a.userId === studentId && a.scheduleId === activeLecture.id)) || [];
          const newRecord = { userId: studentId, scheduleId: activeLecture.id, status, markedAt: new Date().toISOString() };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', activeCourse.id), {
            attendance: [...existingRecords, newRecord]
          });
          toast(`Marked ${status}`);
        } catch(err) {
          toast("Error marking attendance");
        }
      };

      const clearAttendance = async (studentId) => {
        showConfirm("Delete Attendance", "Are you sure you want to delete this attendance record?", async () => {
          try {
            const existingRecords = activeCourse.attendance?.filter(a => !(a.userId === studentId && a.scheduleId === activeLecture.id)) || [];
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', activeCourse.id), {
              attendance: existingRecords
            });
            toast("Attendance Deleted");
          } catch(err) {
            toast("Error deleting attendance");
          }
        });
      };

      if (activeLecture) {
        return (
          <div className="animate-in fade-in duration-500">
            <SmartBackButton label="Back to Lectures" />
            <header className="mb-8 md:mb-12">
              <div className="bg-[#D4AF37]/10 border border-[#D4AF37]/30 text-[#D4AF37] px-4 py-2 rounded-xl text-xs md:text-[10px] font-bold uppercase tracking-widest mb-4 inline-flex items-center gap-2">
                 <Calendar size={16} /> {formatDDMMYYYY(activeLecture.date)}
                 {activeLecture.time && <><Clock size={16} className="ml-2"/> {formatTime(activeLecture.time)}</>}
              </div>
              <h1 className="serif text-3xl md:text-5xl lg:text-6xl mb-3 text-white break-words">Lecture Attendance</h1>
              <p className="text-gray-300 text-sm font-light break-words">{activeLecture.title}</p>
            </header>
            <div className="glass-premium p-5 md:p-12 rounded-[2rem] md:rounded-[3rem] mb-12">

          <header className="mb-8 md:mb-14">

                    <img src={c.coverImage} className="w-full h-full object-cover" />

                     <ChevronRight size={24} className="text-gray-400 group-hover:text-[#D4AF37]" />

    function UserProfile({ user, userData, setUserData }) {
      const [uploading, setUploading] = useState(false);
      const [name, setName] = useState(userData.name || '');

      const handleUpdate = async (e) => {
        e.preventDefault();
        setUploading(true);
        try {
          const newProfile = { ...userData, name };
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { name });
          await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), { name });
          setUserData(newProfile);
          toast("Profile Updated");
        } catch (err) {
          toast("Error updating profile");
        } finally {
          setUploading(false);
        }
      };

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const sRef = storageRef(storage, `artifacts/${appId}/public/data/profiles_${user.uid}_${file.name}`);
          const uploadTask = uploadBytesResumable(sRef, file);
          uploadTask.on('state_changed', null, 
            (error) => { toast("Upload failed"); setUploading(false); }, 
            async () => {
              const url = await getDownloadURL(uploadTask.snapshot.ref);
              const newProfile = { ...userData, profilePic: url };
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { profilePic: url });
              await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), { profilePic: url });
              setUserData(newProfile);
              toast("Profile Picture Updated");
              setUploading(false);
            }
          );
        } catch(err) {
          toast("Error uploading image");
          setUploading(false);
        }
      };

      return (
        <div className="animate-in fade-in duration-500 max-w-3xl mx-auto pb-12">
          <header className="mb-8 md:mb-14 text-center">
            <h1 className="serif text-4xl md:text-5xl lg:text-6xl mb-3 text-white">Your <span className="gold-gradient-text italic">Profile</span></h1>
            <p className="text-gray-300 text-sm font-light">Manage your conservatory identity.</p>
          </header>

          <div className="glass-premium p-8 md:p-14 rounded-[2rem] md:rounded-[3rem] border border-[#D4AF37]/20 shadow-2xl relative overflow-hidden">
             <div className="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-[#D4AF37] to-transparent opacity-50"></div>
             
             <div className="flex flex-col md:flex-row items-center gap-8 md:gap-10 mb-10 pb-10 border-b border-white/5">
                <div className="relative group shrink-0">
                   <div className="w-32 h-32 md:w-44 md:h-44 rounded-full bg-gradient-to-br from-[#111] to-black border border-[#D4AF37]/30 flex items-center justify-center text-white serif text-5xl md:text-7xl shadow-[0_0_40px_rgba(212,175,55,0.15)] overflow-hidden">
                     {userData.profilePic ? <img src={userData.profilePic} className="w-full h-full object-cover" /> : userData.name?.charAt(0) || 'U'}
                   </div>
                   <label className="absolute inset-0 flex items-center justify-center bg-black/60 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity backdrop-blur-md">
                     <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} disabled={uploading} />
                     <ImageIcon size={36} className="text-[#D4AF37]" />
                   </label>
                   {uploading && <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 text-[10px] md:text-[9px] text-[#D4AF37] uppercase tracking-widest font-bold bg-black px-4 py-2 rounded-xl border border-[#D4AF37]/30">Processing...</div>}
                </div>
                <div className="text-center md:text-left w-full">
                  <h3 className="text-2xl md:text-3xl font-medium text-white mb-2 md:mb-3 break-words">{userData.name}</h3>
                  <p className="text-gray-400 text-sm md:text-xs mb-4 md:mb-6 font-light break-words">{userData.email}</p>
                  <div className="flex flex-wrap justify-center md:justify-start gap-3">
                    {userData.roles?.map(r => (
                       <span key={r} className="text-xs md:text-[10px] bg-black text-[#D4AF37] border border-[#D4AF37]/30 px-4 py-2 rounded-lg font-bold uppercase tracking-[0.2em]">{r}</span>
                    ))}
                  </div>
                </div>
             </div>

             <form onSubmit={handleUpdate} className="space-y-6">
               <div>
                 <label className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-3 block">Display Name</label>
                 <input type="text" value={name} onChange={(e) => setName(e.target.value)} required disabled={uploading} className="w-full bg-black/50 border border-white/10 p-5 md:p-6 rounded-2xl text-sm outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
               </div>
               
               <div className="pt-4">
                 <button type="submit" disabled={uploading || name === userData.name} className="w-full bg-[#D4AF37] text-black py-5 rounded-2xl text-xs md:text-[11px] font-bold tracking-widest uppercase hover:bg-[#F9E29D] transition-colors disabled:opacity-50 shadow-xl flex items-center justify-center gap-3">
                   {uploading ? <div className="w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin"></div> : <Edit3 size={20} />}

    function ResourceCreatorModal({ courseId, parentId, onClose, defaultType = 'pdf' }) {
      const [type, setType] = useState(defaultType);
      const [inputMode, setInputMode] = useState('upload');
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);

      const [singleFile, setSingleFile] = useState(null);
      const [multiFiles, setMultiFiles] = useState([]);
      const [thumbnailFile, setThumbnailFile] = useState(null);

      const allowsUpload = ['pdf', 'video', 'image', 'collage'].includes(type);

      useEffect(() => {
        if (!allowsUpload) setInputMode('url');
        else setInputMode('upload');
      }, [type, allowsUpload]);

      const uploadToStorage = (file, pathPrefix) => {
        return new Promise(async (resolve, reject) => {
          let fileToUpload = file;
          
          if (file.type.startsWith('image/')) {
            try {
              fileToUpload = await new Promise((res, rej) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                  const img = new Image();
                  img.src = event.target.result;
                  img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1920;
                    let { width, height } = img;
                    if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                    else if (height > MAX) { width *= MAX / height; height = MAX; }
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                      if(blob) {
                         const compressedFile = new File([blob], file.name || "image.jpg", { type: 'image/jpeg' });
                         res(compressedFile);
                      } else rej(new Error("Image compression failed"));
                    }, 'image/jpeg', 0.8);
                  };
                  img.onerror = () => rej(new Error("Failed to load image logic"));
                };
                reader.onerror = () => rej(new Error("Failed to read original image file"));
              });
            } catch (e) {
              console.warn("Failed to compress image, falling back to original file upload.", e);
              fileToUpload = file;
            }
          }

          try {
            const uniqueName = `${crypto.randomUUID()}_${fileToUpload.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
            const sRef = storageRef(storage, `artifacts/${appId}/public/data/${pathPrefix}_${uniqueName}`);
            const uploadTask = uploadBytesResumable(sRef, fileToUpload);

            uploadTask.on('state_changed', 
              (snapshot) => setProgress(Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100)), 
              (error) => {
                console.error("Storage upload error:", error);
                reject(new Error("Storage Error. Storage limit may be exceeded."));
              }, 
              async () => {
                const downloadUrl = await getDownloadURL(uploadTask.snapshot.ref);
                resolve(downloadUrl);
              }
            );
          } catch (err) {
            console.error(err);
            reject(new Error("Upload logic error. Try an external URL mode instead."));
          }
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        setProgress(0);
        const form = e.target;
        
        try {
          let finalUrl = "";
          let finalThumbnailUrl = null;
          let finalDesc = form.desc ? form.desc.value : "";

          if (inputMode === 'upload' && allowsUpload) {
            if (type === 'collage') {
              if (multiFiles.length === 0) throw new Error("No files selected.");
              const urls = await Promise.all(Array.from(multiFiles).map(f => uploadToStorage(f, 'collages')));
              finalUrl = urls.join(',');
            } else {
              if (!singleFile) throw new Error("No file selected.");
              finalUrl = await uploadToStorage(singleFile, type);
              if (type === 'video' && thumbnailFile) {
                finalThumbnailUrl = await uploadToStorage(thumbnailFile, 'thumbnails');
              }
            }
          } else {
            finalUrl = form.url.value;
            if (type === 'youtube') {
               if (thumbnailFile) {
                 finalThumbnailUrl = await uploadToStorage(thumbnailFile, 'thumbnails');
               } else {
                 const yId = extractYoutubeId(finalUrl);
                 if (yId) finalThumbnailUrl = `https://img.youtube.com/vi/${yId}/hqdefault.jpg`;
               }
            }
          }

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', courseId), {
            resources: arrayUnion({ 
              id: crypto.randomUUID(),
              type, 
              url: finalUrl, 
              thumbnailUrl: finalThumbnailUrl,
              title: form.title.value,
              description: finalDesc,
              parentId: parentId || null, 
              createdAt: new Date().toISOString()
            })
          });

          toast("Material Published Successfully");
          onClose();
        } catch(err) {
          toast(err.message || "Error publishing material");
        } finally {
          setUploading(false);
        }
      };

      const getAcceptType = () => {
        if (type === 'pdf') return 'application/pdf';
        if (type === 'video') return 'video/*';
        if (type === 'image' || type === 'collage') return 'image/*';
        return '*/*';
      };

      return (
        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
          <div className="glass-premium p-6 md:p-12 w-full max-w-3xl relative max-h-[90vh] overflow-y-auto custom-scrollbar rounded-[2rem] md:rounded-[3rem] border border-[#D4AF37]/30 shadow-2xl">
            {!uploading && <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-500 hover:text-white"><X size={28}/></button>}
            <h2 className="serif text-3xl md:text-5xl mb-2 text-white italic">Upload Material</h2>
            <p className="text-[#D4AF37] text-xs md:text-[10px] uppercase tracking-widest font-bold mb-8">Add to Course Asset Library</p>
            <form onSubmit={handleSubmit} className="space-y-6 md:space-y-8">
              <div>
                <label className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-3 block">Material Type</label>
                <div className="flex gap-3 overflow-x-auto pb-3 custom-scrollbar">
                  {['pdf', 'video', 'image', 'collage', 'youtube', 'text', 'link'].map(t => (
                    <button key={t} type="button" onClick={() => setType(t)} disabled={uploading} className={`px-4 md:px-5 py-2.5 md:py-3 rounded-xl text-xs md:text-[11px] uppercase tracking-widest font-bold whitespace-nowrap transition-all border ${type === t ? 'bg-[#D4AF37]/10 text-[#D4AF37] border-[#D4AF37]/50 shadow-[0_0_15px_rgba(212,175,55,0.2)]' : 'bg-black/30 text-gray-500 border-white/5 hover:border-white/20'}`}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <input name="title" type="text" placeholder="MATERIAL TITLE" required disabled={uploading} className="w-full bg-black/50 border border-white/10 p-4 md:p-6 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
              </div>
              
              {allowsUpload && (
                <div className="flex bg-black/40 border border-white/5 rounded-xl p-1.5 w-fit">
                   <button type="button" disabled={uploading} onClick={() => setInputMode('upload')} className={`px-5 py-2.5 rounded-lg text-xs md:text-[11px] uppercase tracking-widest font-bold transition-all ${inputMode === 'upload' ? 'bg-[#D4AF37] text-black shadow-md' : 'text-gray-500 hover:text-white'}`}>Upload</button>
                   <button type="button" disabled={uploading} onClick={() => setInputMode('url')} className={`px-5 py-2.5 rounded-lg text-xs md:text-[11px] uppercase tracking-widest font-bold transition-all ${inputMode === 'url' ? 'bg-[#D4AF37] text-black shadow-md' : 'text-gray-500 hover:text-white'}`}>URL</button>
                </div>
              )}
              
              <div className="glass border border-white/5 rounded-3xl p-5 md:p-8">
                {type === 'text' && <div className="text-[#D4AF37] text-xs md:text-[10px] uppercase tracking-widest font-bold mb-4 bg-[#D4AF37]/10 p-4 rounded-xl border border-[#D4AF37]/20 flex items-center gap-3"><FileText size={18}/> Create a formatted text note for students to read.</div>}
                {type === 'link' && <div className="text-[#D4AF37] text-xs md:text-[10px] uppercase tracking-widest font-bold mb-4 bg-[#D4AF37]/10 p-4 rounded-xl border border-[#D4AF37]/20 flex items-center gap-3"><LinkIcon size={18}/> Add an external link that will open securely in a new tab.</div>}

                {inputMode === 'upload' && allowsUpload ? (
                  <div className="space-y-5">
                    <div>
                      <label className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-3 block">{type === 'collage' ? 'Select Multiple Files' : 'Select Source File'}</label>
                      <div className="relative border-2 border-dashed border-[#D4AF37]/30 rounded-[2rem] p-8 md:p-14 text-center hover:border-[#D4AF37]/60 transition-colors bg-black/30 group">
                        <input type="file" accept={getAcceptType()} multiple={type === 'collage'} required disabled={uploading} onChange={(e) => type === 'collage' ? setMultiFiles(e.target.files) : setSingleFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                        <FileIcon size={40} className="mx-auto text-[#D4AF37] group-hover:scale-110 mb-4 transition-transform opacity-70" />
                        <p className="text-[#D4AF37] text-xs md:text-[11px] font-bold tracking-widest uppercase mb-2">Drag & Drop or Browse</p>
                        <p className="text-gray-400 text-xs md:text-sm font-light">{type === 'collage' ? (multiFiles.length > 0 ? `${multiFiles.length} files selected` : `Supported: Images (Multiple)`) : (singleFile ? singleFile.name : `Supported: ${type.toUpperCase()}`)}</p>
                      </div>
                    </div>
                    {type === 'video' && (
                      <div className="pt-5 border-t border-white/5">
                        <label className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-3 flex items-center gap-2"><ImagePlus size={18}/> Video Cover Thumbnail (Optional)</label>
                        <input type="file" accept="image/*" disabled={uploading} onChange={(e) => setThumbnailFile(e.target.files[0])} className="w-full text-gray-400 text-sm" />
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="space-y-5">
                    {type === 'text' ? (
                      <textarea name="url" placeholder="Type or paste formatted text notes here..." required disabled={uploading} rows={8} className="w-full bg-black/50 border border-white/10 p-5 md:p-6 rounded-2xl text-sm md:text-sm outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar" />
                    ) : type === 'collage' ? (
                      <textarea name="url" placeholder="COMMA SEPARATED IMAGE URLS" required disabled={uploading} rows={4} className="w-full bg-black/50 border border-white/10 p-5 md:p-6 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
                    ) : type === 'youtube' ? (
                      <>
                        <input name="url" type="url" placeholder="YOUTUBE URL (e.g. https://youtu.be/...)" required disabled={uploading} className="w-full bg-black/50 border border-white/10 p-5 md:p-6 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                        <div className="pt-5 border-t border-white/5">
                          <label className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-3 flex items-center gap-2"><ImagePlus size={18}/> Custom Thumbnail (Optional)</label>
                          <input type="file" accept="image/*" disabled={uploading} onChange={(e) => setThumbnailFile(e.target.files[0])} className="w-full text-gray-400 text-sm" />
                        </div>
                        <div className="pt-5 border-t border-white/5">
                          <textarea name="desc" placeholder="ADDITIONAL NOTES OR DESCRIPTION FOR THIS VIDEO..." disabled={uploading} rows={4} className="w-full bg-black/50 border border-white/10 p-5 md:p-6 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
                        </div>
                      </>
                    ) : (
                      <input name="url" type="url" placeholder="DIRECT URL LINK" required disabled={uploading} className="w-full bg-black/50 border border-white/10 p-5 md:p-6 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                    )}
                  </div>
                )}
              </div>
              
              {uploading && (
                <div className="w-full bg-black/50 border border-[#D4AF37]/30 rounded-2xl p-6 flex flex-col items-center justify-center animate-in fade-in shadow-[0_0_20px_rgba(212,175,55,0.15)]">
                  <div className="w-full bg-black rounded-full h-2 mb-3 overflow-hidden border border-white/5">
                    <div className="bg-gradient-to-r from-[#D4AF37] to-[#FFDF73] h-2 rounded-full transition-all duration-300 shadow-[0_0_10px_#D4AF37]" style={{ width: `${progress}%` }}></div>
                  </div>
                  <p className="text-center text-xs md:text-[10px] text-[#D4AF37] font-bold uppercase tracking-widest">Uploading {progress}%</p>
                </div>
              )}
              
              <div className="flex gap-4 pt-4">
                <button type="button" onClick={onClose} disabled={uploading} className="flex-1 py-4 md:py-5 border border-white/10 rounded-2xl text-xs md:text-[11px] font-bold tracking-widest uppercase text-gray-400 hover:text-white transition-colors disabled:opacity-50">Cancel</button>
                <button type="submit" disabled={uploading} className="flex-1 bg-[#D4AF37] text-black rounded-2xl text-xs md:text-[11px] font-bold tracking-widest uppercase hover:bg-[#F9E29D] transition-colors flex items-center justify-center gap-2 disabled:opacity-50 shadow-xl">
                   {uploading ? <div className="w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin"></div> : <UploadCloud size={20} />}
                   {uploading ? 'Processing' : 'Publish Asset'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function EditCourseModal({ course, onClose }) {
      const handleEditSubmit = async (e) => {
        e.preventDefault();
        const form = e.target;
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), {
            title: form.title.value,
            desc: form.desc.value,
            coverImage: form.coverImage.value
          });
          toast("Course Updated Successfully");
          onClose();
        } catch(err) { toast("Error updating course"); }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
          <div className="glass-premium p-8 md:p-12 rounded-[2rem] md:rounded-[3rem] w-full max-w-2xl border border-[#D4AF37]/30 shadow-2xl relative">
            <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-500 hover:text-white text-3xl font-light">&times;</button>
            <h2 className="serif text-3xl md:text-5xl mb-2 text-white italic">Edit Course</h2>
            <p className="text-[#D4AF37] text-xs md:text-[10px] uppercase tracking-widest font-bold mb-8">Update Course Details</p>
            <form onSubmit={handleEditSubmit} className="space-y-5">
              <div><input name="title" defaultValue={course.title} type="text" placeholder="COURSE TITLE" required className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" /></div>
              <div><input name="coverImage" defaultValue={course.coverImage} type="url" placeholder="COVER IMAGE URL (OPTIONAL)" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" /></div>
              <div><textarea name="desc" defaultValue={course.desc} placeholder="COURSE DESCRIPTION" required rows={5} className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-sm outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600 resize-none font-light leading-relaxed custom-scrollbar" /></div>
              <div className="flex gap-4 pt-4">
                <button type="button" onClick={onClose} className="flex-1 py-4 md:py-5 border border-white/10 rounded-2xl text-xs md:text-[11px] uppercase tracking-widest font-bold text-gray-400 hover:text-white transition-colors">Cancel</button>
                <button type="submit" className="flex-1 bg-[#D4AF37] text-black rounded-2xl text-xs md:text-[11px] uppercase tracking-widest font-bold hover:bg-[#F9E29D] transition-colors shadow-xl">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function ScheduleCreatorModal({ courseId, onClose }) {
      const handleSubmit = async (e) => {
        e.preventDefault();
        const form = e.target;
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', courseId), {
            schedule: arrayUnion({ 
              id: crypto.randomUUID(), 
              date: form.date.value, 
              time: form.time.value, 
              title: form.title.value, 
              description: form.desc.value 
            })
          });
          toast("Lecture Scheduled");
          onClose();
        } catch(err) { toast("Error scheduling lecture"); }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-5 bg-[#050505]/90 backdrop-blur-xl animate-in fade-in">
          <div className="glass-premium p-8 md:p-12 w-full max-w-2xl rounded-[2rem] md:rounded-[3rem] relative border border-[#D4AF37]/30 shadow-2xl">
            <button onClick={onClose} className="absolute top-6 right-6 md:top-8 md:right-8 text-gray-500 hover:text-white"><X size={28}/></button>
            <h2 className="serif text-3xl md:text-5xl mb-2 text-white italic">Schedule Lecture</h2>
            <p className="text-[#D4AF37] text-xs md:text-[10px] uppercase tracking-widest font-bold mb-8">Add to Course Itinerary</p>
            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                 <div>
                   <label className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-2 block">Lecture Date</label>
                   <input name="date" type="date" required className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                 </div>
                 <div>
                   <label className="text-xs md:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-2 block">Lecture Time</label>
                   <input name="time" type="time" required className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
                 </div>
              </div>
              <div>
                <input name="title" type="text" placeholder="LECTURE TITLE" required className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-sm tracking-widest uppercase outline-none focus:border-[#D4AF37] transition-all text-white placeholder:text-gray-600" />
              </div>
              <div>
                <textarea name="desc" placeholder="BRIEF LECTURE DESCRIPTION..." required rows={4} className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-sm md:text-sm outline-none focus:border-[#D4AF37] transition-all text-white font-light resize-none custom-scrollbar placeholder:text-gray-600" />
              </div>
              <div className="flex gap-4 pt-4">
                <button type="button" onClick={onClose} className="flex-1 py-4 md:py-5 border border-white/10 rounded-2xl text-xs md:text-[11px] font-bold tracking-widest uppercase text-gray-400 hover:text-white transition-colors">Cancel</button>
                <button type="submit" className="flex-1 bg-[#D4AF37] text-black rounded-2xl text-xs md:text-[11px] font-bold tracking-widest uppercase hover:bg-[#F9E29D] transition-colors shadow-xl">Schedule</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // Initialize React
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
