<!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Musicoul - Login/Signup</title>
     <link rel="stylesheet" href="login.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
 </head>
 <body>
     <main class="login-page">
         <div class="login-container">
             <div class="form-container">
                 <div class="login-form">
                     <h1>Login</h1>
                     <input type="email" id="loginEmail" placeholder="Email">
                     <input type="password" id="loginPassword" placeholder="Password">
                     <button id="submitLogin">Submit</button>
                     <button id="googleSignInBtn">Sign in with Google</button>
                     <p class="form-message" id="loginMessage"></p>
                     <button id="toggleButton">Signup</button>
                 </div>
                 <div class="signup-form">
                     <h1>Signup</h1>
                     <input type="email" id="signupEmail" placeholder="Email">
                     <input type="password" id="signupPassword" placeholder="Password">
                     <button id="submitSignup">Submit</button>
                     <p class="form-message" id="signupMessage"></p>
                     <button id="toggleButtonLogin">Login</button>
                 </div>
             </div>
         </div>
     </main>
     <script src="login.js" type="module"></script>
     <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
     <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
     <script src="./firebase-config.js" type="module"></script>
 </body>
 </html>
